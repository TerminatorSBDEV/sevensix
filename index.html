<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezbridge Test | Online AI Moderated Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --error: #ff7b72;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 90%;
            max-width: 400px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px;
            background: #21262d;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff7b72;
        }

        .dot.online {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
        }

        .messages-log {
            height: 300px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .msg {
            padding: 8px 12px;
            border-radius: 6px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            transition: all 0.2s;
        }

        .msg.me {
            align-self: flex-end;
            background: #238636;
            color: white;
        }

        .msg.other {
            align-self: flex-start;
            background: #30363d;
            color: var(--text);
        }

        /* Status de pendente (Moderação em andamento) */
        .msg.pending {
            opacity: 0.55;
            filter: grayscale(40%);
        }

        /* Status de bloqueado */
        .msg.blocked {
            align-self: flex-end;
            background: #44161b !important;
            border: 1px solid var(--error);
            color: var(--error);
        }

        .msg .username {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .status-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
            margin-top: 4px;
            display: block;
        }

        .input-bar {
            display: flex;
            padding: 10px;
            background: #0d1117;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            background: #010409;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        button:hover {
            background: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <span style="font-weight: bold;">Ezbridge Chat (AI Moderated)</span>
            <div class="status">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Offline</span>
            </div>
        </div>
        
        <div class="messages-log" id="log">
            <div class="msg other">
                <div class="username">System</div>
                Insira seu apelido abaixo para começar.
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="user-input" placeholder="Seu apelido..." autocomplete="off">
            <button id="action-btn" onclick="handleAction()">Join</button>
        </div>
    </div>

<script>
    // --- CONFIGURAÇÃO ---
    const TUNNEL = "https://considers-scheduling-cities-reseller.trycloudflare.com";
    const AUTH_KEY = "ExJ3icrmh";

    const socket = io(TUNNEL, { auth: { token: AUTH_KEY } });
    
    let username = "";
    const log = document.getElementById('log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('action-btn');
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    // Dicionário para gerenciar mensagens aguardando aprovação da IA
    const pendingMessages = {};

    // --- SOCKET EVENTS ---
    socket.on('connect', () => {
        dot.classList.add('online');
        statusText.innerText = "Online";
    });

    socket.on('connect_error', (err) => {
        dot.classList.remove('online');
        statusText.innerText = "Error";
        console.error(err);
    });

    socket.on('RemoteEvent', (packet) => {
        if (packet.type === 'chat') {
            appendMessage(packet.user, packet.text, false);
        }
    });

    // Escuta a resposta de moderação da IA
    socket.on('ai_response', (data) => {
        if (data.reqId && data.reqId.startsWith('mod_')) {
            const pending = pendingMessages[data.reqId];
            if (!pending) return;

            const decision = data.text.trim().toUpperCase();

            // Se aprovado, retira o estilo cinza e envia aos outros via Socket
            if (decision.includes('APPROVED')) {
                pending.div.classList.remove('pending');
                const tag = pending.div.querySelector('.status-tag');
                if (tag) tag.remove();

                socket.emit('RemoteEvent', {
                    type: 'chat',
                    user: username,
                    text: pending.text
                });
            } else {
                // Se reprovado, transforma o balão em vermelho avisando do bloqueio
                pending.div.classList.remove('pending');
                pending.div.classList.add('blocked');
                pending.div.innerHTML = `
                    <div class="username">System / Moderator</div>
                    <div>⚠️ Mensagem bloqueada por conter conteúdo impróprio ou tóxico.</div>
                `;
            }
            delete pendingMessages[data.reqId];
        }
    });

    socket.on('ai_error', (data) => {
        if (data.reqId && data.reqId.startsWith('mod_')) {
            const pending = pendingMessages[data.reqId];
            if (pending) {
                pending.div.classList.remove('pending');
                const tag = pending.div.querySelector('.status-tag');
                if (tag) tag.innerText = "⚠️ Erro ao verificar";
                delete pendingMessages[data.reqId];
            }
        }
    });

    // --- CHAT LOGIC ---
    function handleAction() {
        if (!username) {
            const val = input.value.trim();
            if (!val) return;
            username = val;
            input.value = "";
            input.placeholder = "Escreva uma mensagem...";
            btn.innerText = "Send";
            appendMessage("System", `Você entrou como "${username}"`, false);
        } else {
            sendMsg();
        }
    }

    function sendMsg() {
        const text = input.value.trim();
        if (!text) return;

        // Cria id único para requisição de moderação
        const reqId = 'mod_' + Date.now() + Math.random().toString(36).substr(2, 4);

        // Exibe o balão localmente com status de "Moderando"
        const messageDiv = appendMessage(username, text, true, true);

        // Salva na fila pendente
        pendingMessages[reqId] = {
            text: text,
            div: messageDiv
        };

        // Solicita avaliação da IA local
        socket.emit('callai', {
            reqId: reqId,
            prompt: `Message to evaluate: "${text}"`,
            config: {
                instruction: "You are a real-time chat moderator. Check if the message contains toxic insults, explicit hate speech, or harassment. If it is safe, reply with only the word APPROVED. If it is toxic, offensive or unsafe, reply with only the word REJECTED. Do not write anything else.",
                temp: 0.1,
                tokens: 10,
                stream: false
            }
        });

        input.value = "";
    }

    function appendMessage(user, text, isMe, isPending) {
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'other'} ${isPending ? 'pending' : ''}`;
        
        div.innerHTML = `
            <div class="username">${user}</div>
            <div class="text-content">${text}</div>
            ${isPending ? '<span class="status-tag">⏳ Moderando...</span>' : ''}
        `;
        
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        return div;
    }

    // Tecla Enter para enviar
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleAction();
    });
</script>
</body>
</html>
