<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Html snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #menuUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .menu-card {
            background: #121214;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            text-align: center;
        }
        .menu-card h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #1e1e24;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .color-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        .color-row input[type="range"] {
            flex: 1;
        }
        .color-preview {
            width: 100%;
            height: 20px;
            border-radius: 4px;
            margin-top: 8px;
            border: 1px solid #555;
        }
        button.btn-spawn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #28a745;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.btn-spawn:hover {
            background: #218838;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #555;
            border-radius: 8px;
            z-index: 5;
            pointer-events: none;
        }
        #statusText {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 5;
            font-size: 0.9rem;
            color: #00ff88;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap" width="150" height="150"></canvas>
    <div id="statusText">Conectando ao servidor...</div>

    <div id="menuUI">
        <div class="menu-card">
            <h1>Html snakes</h1>
            <div class="form-group">
                <label for="pName">Nome de jogador:</label>
                <input type="text" id="pName" maxlength="10" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Cor da sua cobra:</label>
                <div class="color-sliders">
                    <div class="color-row">
                        <span>Vermelho:</span>
                        <input type="range" id="rColor" min="0" max="255" value="128">
                        <span id="rVal">50%</span>
                    </div>
                    <div class="color-row">
                        <span>Verde:</span>
                        <input type="range" id="gColor" min="0" max="255" value="128">
                        <span id="gVal">50%</span>
                    </div>
                    <div class="color-row">
                        <span>Azul:</span>
                        <input type="range" id="bColor" min="0" max="255" value="128">
                        <span id="bVal">50%</span>
                    </div>
                </div>
                <div class="color-preview" id="colorPreview"></div>
            </div>
            <button class="btn-spawn" id="spawnBtn">Surgir</button>
        </div>
    </div>

    <script>
        const SERVER_KEY = "146cf8ce56";
        const SERVER_LINK = "https://boc-psi-displays-expensive.trycloudflare.com";
        const MAP_SIZE = 4000;
        const GRID_SIZE = 100;

        // Elementos DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const mctx = minimapCanvas.getContext('2d');
        const menuUI = document.getElementById('menuUI');
        const statusText = document.getElementById('statusText');

        const rInput = document.getElementById('rColor');
        const gInput = document.getElementById('gColor');
        const bInput = document.getElementById('bColor');
        const rVal = document.getElementById('rVal');
        const gVal = document.getElementById('gVal');
        const bVal = document.getElementById('bVal');
        const colorPreview = document.getElementById('colorPreview');
        const nameInput = document.getElementById('pName');
        const spawnBtn = document.getElementById('spawnBtn');

        let socket = null;
        let isConnected = false;
        let isAlive = false;
        let myPlayerColor = "#808080";

        // Estado do Jogo (Enviado pelo Servidor)
        let snakesState = {};
        let foodsState = [];
        let cameraTarget = { x: MAP_SIZE / 2, y: MAP_SIZE / 2 };

        // Entrada do usuário
        let currentInput = { targetAngle: 0, wantSprint: false };

        // Controles Mobile / PC
        let touchMoveId = null;
        let touchMovePos = { x: 0, y: 0 };
        let touchSprintId = null;
        let isSpacePressed = false;
        let isEPressed = false;
        let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        function updateColorPreview() {
            const r = parseInt(rInput.value);
            const g = parseInt(gInput.value);
            const b = parseInt(bInput.value);
            rVal.innerText = Math.round((r / 255) * 100) + '%';
            gVal.innerText = Math.round((g / 255) * 100) + '%';
            bVal.innerText = Math.round((b / 255) * 100) + '%';
            myPlayerColor = `rgb(${r},${g},${b})`;
            colorPreview.style.backgroundColor = myPlayerColor;
        }

        rInput.addEventListener('input', updateColorPreview);
        gInput.addEventListener('input', updateColorPreview);
        bInput.addEventListener('input', updateColorPreview);
        updateColorPreview();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- WebSocket Setup ---
        socket = io(SERVER_LINK, { auth: { token: "default_key" } });

        socket.on("connect", () => {
            statusText.innerText = "Conectado. Autenticando...";
            socket.emit("join_virtual_server", { key: SERVER_KEY });
        });

        socket.on("joined_successfully", () => {
            isConnected = true;
            statusText.innerText = "Conectado ao Servidor do Jogo.";
        });

        socket.on("join_error", (err) => {
            statusText.innerText = "Erro ao entrar: " + err.error;
        });

        function sendRemoteEvent(type, data) {
            if (!isConnected) return;
            socket.emit("RemoteEvent", { type, data });
        }

        socket.on("RemoteEvent", (packet) => {
            if (!packet.type) return;

            // Sincronização do Mundo Enviada pelo Servidor
            if (packet.type === "world_tick") {
                const world = packet.data;
                foodsState = world.foods || [];

                // Interpolação Linear (LERP) das Posições das Cobras para Suavizar Latência
                for (let id in world.snakes) {
                    const serverSnake = world.snakes[id];
                    if (!snakesState[id]) {
                        snakesState[id] = serverSnake;
                    } else {
                        let localSnake = snakesState[id];
                        localSnake.x += (serverSnake.x - localSnake.x) * 0.4;
                        localSnake.y += (serverSnake.y - localSnake.y) * 0.4;
                        localSnake.angle += (serverSnake.angle - localSnake.angle) * 0.4;
                        localSnake.score = serverSnake.score;
                        localSnake.color = serverSnake.color;
                        localSnake.name = serverSnake.name;
                        localSnake.dead = serverSnake.dead;
                        localSnake.fadeAlpha = serverSnake.fadeAlpha;
                        localSnake.trail = serverSnake.trail;
                    }
                }

                // Limpa cobras deletadas do estado local
                for (let id in snakesState) {
                    if (!world.snakes[id]) {
                        delete snakesState[id];
                    }
                }

                // Câmera focaliza no jogador local
                if (snakesState[socket.id]) {
                    cameraTarget.x = snakesState[socket.id].x;
                    cameraTarget.y = snakesState[socket.id].y;
                }
            }

            if (packet.type === "player_died") {
                if (packet.data.id === socket.id) {
                    // Câmera fica fixa onde morreu por 2 segundos
                    setTimeout(() => {
                        isAlive = false;
                        menuUI.style.display = "flex";
                    }, 2000);
                }
            }
        });

        // --- Botão de Spawn ---
        spawnBtn.addEventListener('click', () => {
            if (!isConnected) return;
            const name = nameInput.value.trim() || "Snake";
            sendRemoteEvent("request_spawn", {
                name: name,
                color: myPlayerColor
            });
            menuUI.style.display = "none";
            isAlive = true;
        });

        // --- Gerenciamento de Entradas (Teclado, Mouse, Touch) ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') isSpacePressed = true;
            if (e.key.toLowerCase() === 'e') isEPressed = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') isSpacePressed = false;
            if (e.key.toLowerCase() === 'e') isEPressed = false;
        });

        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (touchMoveId === null) {
                    touchMoveId = t.identifier;
                    touchMovePos = { x: t.clientX, y: t.clientY };
                } else if (touchSprintId === null) {
                    touchSprintId = t.identifier;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === touchMoveId) {
                    touchMovePos = { x: t.clientX, y: t.clientY };
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === touchMoveId) touchMoveId = null;
                if (t.identifier === touchSprintId) touchSprintId = null;
            }
        });

        // Envia as entradas do cliente para o servidor 30 vezes por segundo
        setInterval(() => {
            if (!isAlive || !isConnected) return;

            let targetX = mousePos.x;
            let targetY = mousePos.y;

            if (touchMoveId !== null) {
                targetX = touchMovePos.x;
                targetY = touchMovePos.y;
            }

            const screenCenterX = canvas.width / 2;
            const screenCenterY = canvas.height / 2;
            const dx = targetX - screenCenterX;
            const dy = targetY - screenCenterY;

            currentInput.targetAngle = Math.atan2(dy, dx);
            currentInput.wantSprint = isSpacePressed || isEPressed || (touchSprintId !== null);

            sendRemoteEvent("client_input", currentInput);
        }, 33);

        // --- Loop Principal de Renderização ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camX = cameraTarget.x - canvas.width / 2;
            const camY = cameraTarget.y - canvas.height / 2;

            ctx.save();
            ctx.translate(-camX, -camY);

            // Mapa Preto e Grade Cinza
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

            ctx.strokeStyle = "#222222";
            ctx.lineWidth = 1;
            for (let x = 0; x <= MAP_SIZE; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, MAP_SIZE);
                ctx.stroke();
            }
            for (let y = 0; y <= MAP_SIZE; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(MAP_SIZE, y);
                ctx.stroke();
            }

            // Borda Vermelha Quadrada
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

            // Renderizar Comidas do Servidor
            for (let f of foodsState) {
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x, f.y, 4 + f.val, 0, Math.PI * 2);
                ctx.fill();
            }

            // Renderizar Cobras do Servidor
            for (let id in snakesState) {
                drawSnake(snakesState[id]);
            }

            ctx.restore();

            // Minimapa
            renderMinimap();

            requestAnimationFrame(render);
        }

        function drawSnake(p) {
            if (!p.trail || p.trail.length === 0) return;
            if (p.dead && p.fadeAlpha <= 0) return;

            ctx.save();
            if (p.dead) {
                ctx.globalAlpha = p.fadeAlpha || 0.5;
            }

            const size = 10 + p.score * 0.1;

            // Corpo
            ctx.fillStyle = p.color;
            for (let i = p.trail.length - 1; i >= 0; i--) {
                let seg = p.trail[i];
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Cabeça e Olhos direcionais
            const head = p.trail[0] || { x: p.x, y: p.y };
            ctx.save();
            ctx.translate(head.x, head.y);
            ctx.rotate(p.angle);

            // Olho Esquerdo
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(size * 0.5, -size * 0.5, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(size * 0.65, -size * 0.5, size * 0.18, 0, Math.PI * 2);
            ctx.fill();

            // Olho Direito
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(size * 0.5, size * 0.5, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(size * 0.65, size * 0.5, size * 0.18, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Nome
            ctx.fillStyle = "#ffffff";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(p.name || "", head.x, head.y - size - 8);

            ctx.restore();
        }

        function renderMinimap() {
            mctx.clearRect(0, 0, 150, 150);
            const scale = 150 / MAP_SIZE;

            for (let id in snakesState) {
                let p = snakesState[id];
                if (!p.dead) {
                    mctx.fillStyle = p.color;
                    mctx.beginPath();
                    mctx.arc(p.x * scale, p.y * scale, 3, 0, Math.PI * 2);
                    mctx.fill();
                }
            }
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
