<!DOCTYPE html>
<html>
<head>
    <title>Global Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #030712; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        h2 { margin-top: 0; text-align: center; }
        #chat-box { flex: 1; background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: #1e293b; padding: 10px; border-radius: 6px; word-break: break-word; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #1e293b; background: #0f172a; color: #fff; font-size: 1rem; }
        button { padding: 12px 20px; border-radius: 6px; border: none; background: #06b6d4; color: #030712; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:active { background: #0891b2; }
    </style>
</head>
<body>
    <h2>Global Chat</h2>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const key = "146cf8ce56";
        const link = "https://vegetarian-aim-ability-almost.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            console.log("Connected to chat server");
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "chat_message") {
                const chatBox = document.getElementById("chat-box");
                const msgDiv = document.createElement("div");
                msgDiv.className = "message";
                msgDiv.innerText = `${pkt.data.sender}: ${pkt.data.text}`;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text) return;

            socket.emit("RemoteEvent", { type: "send_message", data: { text } });
            input.value = "";
        }
    </script>
</body>
</html>
