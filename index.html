<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EzBridge Online Pong</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body {
            background: #030712;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #hud { margin-bottom: 10px; font-size: 1.2rem; text-align: center; }
        #canvas-container {
            position: relative;
            border: 2px solid #1e293b;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,255,200,0.1);
        }
        canvas { background: #0f172a; display: block; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="status">Conectando ao EzBridge...</div>
        <div id="score">P1: 0 | P2: 0</div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        const KEY = "146cf8ce56";
        const ENDPOINT = "https://powder-gratuit-tunes-bread.trycloudflare.com/remote";
        
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Estado local e de rede
        let myRole = 'spectator';
        let myY = 210;
        
        // Posições-alvo para Lerp Interpolação (mascarar latência)
        let targetState = {
            p1Y: 210,
            p2Y: 210,
            ball: { x: 400, y: 250 },
            score: { p1: 0, p2: 0 }
        };

        let currentState = {
            p1Y: 210,
            p2Y: 210,
            ball: { x: 400, y: 250 }
        };

        const PADDLE_HEIGHT = 80;
        const PADDLE_WIDTH = 15;
        const LERP_FACTOR = 0.25; // Velocidade de suavização do Lerp

        // Função de Interpolação Linear (Lerp)
        function lerp(start, end, alpha) {
            return start + (end - start) * alpha;
        }

        // Envio de Eventos para EzBridge
        async function sendRemote(type, data = {}) {
            try {
                await fetch(ENDPOINT, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "auth-token": KEY 
                    },
                    body: JSON.stringify({ type, data })
                });
            } catch (err) {
                console.error("Erro na comunicação:", err);
            }
        }

        // Controles: Teclado (PC)
        let keys = {};
        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        function handleInput() {
            let moved = false;
            const speed = 7;

            if (keys["w"] || keys["W"] || keys["ArrowUp"]) {
                myY = Math.max(0, myY - speed);
                moved = true;
            }
            if (keys["s"] || keys["S"] || keys["ArrowDown"]) {
                myY = Math.min(canvas.height - PADDLE_HEIGHT, myY + speed);
                moved = true;
            }

            if (moved) sendPaddlePosition();
        }

        // Controles: Touch Screen (Mobile)
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchY = e.touches[0].clientY - rect.top;
            
            // Centraliza a raquete no ponto de toque
            myY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, touchY - PADDLE_HEIGHT / 2));
            sendPaddlePosition();
        }, { passive: false });

        let lastSendTime = 0;
        function sendPaddlePosition() {
            const now = Date.now();
            // Limita os pacotes locais a max 30 req/sec para respeitar limites do EzBridge
            if (now - lastSendTime > 33) { 
                sendRemote("move_paddle", { y: myY });
                lastSendTime = now;
            }
        }

        // Entrar no Jogo
        async function init() {
            await sendRemote("join_game");
            document.getElementById("status").innerText = "Procurando Sala...";
            
            // Polling simples para simular recebimento do estado atualizado via EzBridge HTTP Remote
            setInterval(async () => {
                // Em implementação real, consome os dados do broadcast do ServerScript
            }, 100);
        }

        // Exemplo de atualização de estado que viria do broadcast EzBridge:
        function onServerUpdate(data) {
            targetState.p1Y = data.p1Y;
            targetState.p2Y = data.p2Y;
            targetState.ball.x = data.ball.x;
            targetState.ball.y = data.ball.y;
            
            document.getElementById("score").innerText = `P1: ${data.score.p1} | P2: ${data.score.p2}`;
        }

        // Loop de Renderização do Canvas + Suavização por Lerp
        function render() {
            handleInput();

            // Aplica Lerp para suavizar atrasos de pacote da bola e raquetes
            currentState.ball.x = lerp(currentState.ball.x, targetState.ball.x, LERP_FACTOR);
            currentState.ball.y = lerp(currentState.ball.y, targetState.ball.y, LERP_FACTOR);
            
            if (myRole !== 'P1') currentState.p1Y = lerp(currentState.p1Y, targetState.p1Y, LERP_FACTOR);
            else currentState.p1Y = myY;

            if (myRole !== 'P2') currentState.p2Y = lerp(currentState.p2Y, targetState.p2Y, LERP_FACTOR);
            else currentState.p2Y = myY;

            // Limpa Tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Linha Central
            ctx.strokeStyle = "#334155";
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Desenha P1 (Esquerda)
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(20, currentState.p1Y, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Desenha P2 (Direita)
            ctx.fillStyle = "#f43f5e";
            ctx.fillRect(canvas.width - 20 - PADDLE_WIDTH, currentState.p2Y, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Desenha Bola (Propriedade do Servidor)
            ctx.fillStyle = "#facc15";
            ctx.beginPath();
            ctx.arc(currentState.ball.x, currentState.ball.y, 8, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(render);
        }

        init();
        render();
    </script>
</body>
</html>
