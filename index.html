<!-- Test Your Guns - Client Script -->
<!DOCTYPE html>
<html>
<head>
    <title>Test Your Guns</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; background: #1e293b; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; font-weight: bold; font-size: 1.2rem; text-shadow: 1px 1px 2px #000; z-index: 10; }
        #controls-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); pointer-events: none; font-size: 0.85rem; color: rgba(255,255,255,0.7); background: rgba(15, 23, 42, 0.8); padding: 8px 16px; border-radius: 8px; border: 1px solid #475569; z-index: 10; text-align: center; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; touch-action: none; z-index: 10; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; }
        
        #chat-btn { position: absolute; bottom: 40px; right: 40px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; z-index: 10; }
        #build-btn { position: absolute; bottom: 40px; right: 100px; width: 50px; height: 50px; background: rgba(56, 189, 248, 0.2); border: 2px solid rgba(56, 189, 248, 0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; z-index: 10; }
        #mic-btn { position: absolute; bottom: 40px; right: 160px; width: 50px; height: 50px; background: rgba(239, 68, 68, 0.2); border: 2px solid rgba(239, 68, 68, 0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; z-index: 10; }
        #shop-top-btn { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); padding: 8px 16px; background: #facc15; color: #0f172a; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; z-index: 10; }

        .mob-weapon-btn { position: absolute; bottom: 100px; width: 45px; height: 45px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; cursor: pointer; z-index: 10; color: #fff; }
        #mob-w1 { right: 40px; }
        #mob-w2 { right: 90px; }
        #mob-w3 { right: 140px; }
        #mob-w4 { right: 190px; display: none; }
        #mob-radio-btn { right: 240px; display: none; background: rgba(234, 179, 8, 0.3); border-color: #eab308; }
        .mob-weapon-btn.active { background: rgba(56, 189, 248, 0.4); border-color: #38bdf8; }

        /* Floating GUI Chat Panel */
        #chat-panel { position: absolute; bottom: 160px; left: 20px; width: 320px; height: 220px; background: rgba(15, 23, 42, 0.85); border: 2px solid #38bdf8; border-radius: 8px; display: none; flex-direction: column; z-index: 20; }
        #chat-messages { flex: 1; padding: 8px; overflow-y: auto; font-size: 0.85rem; word-break: break-word; }
        #chat-messages div { margin-bottom: 4px; }
        #chat-input-container { display: flex; border-top: 1px solid #334155; }
        #chat-input { flex: 1; padding: 8px; background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; }

        /* Shop Modal */
        #shop-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 360px; background: #0f172a; border: 2px solid #facc15; border-radius: 12px; padding: 16px; display: none; z-index: 30; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .shop-item { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 8px; background: #1e293b; border-radius: 6px; font-size: 0.85rem; }
        .shop-btn { background: #facc15; color: #0f172a; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Radio Panel Modal */
        #radio-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #0f172a; border: 2px solid #eab308; border-radius: 12px; padding: 16px; display: none; z-index: 30; }

        #minimap-container { position: absolute; top: 10px; right: 10px; width: 150px; height: 150px; background: rgba(15, 23, 42, 0.8); border: 2px solid #475569; border-radius: 8px; overflow: hidden; pointer-events: none; z-index: 10; }
        #minimapCanvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="ui">Health: <span id="hp">100</span> | Points: <span id="pts">0</span> | Weapon: <span id="wname">Rifle</span> | Mic: <span id="mic-status" style="color:#ef4444;">OFF</span></div>
    <div id="controls-hint">E: Wall | Y: Chat | M: Mic | H: Shop | R: Radio | 1-3: Guns | WASD: Move | Right Click: Shoot</div>
    
    <div id="joystick"><div id="stick"></div></div>
    <div id="chat-btn">💬</div>
    <div id="build-btn">🧱</div>
    <div id="mic-btn">🎙️</div>
    <div id="shop-top-btn">🛒 SHOP</div>

    <div id="mob-w1" class="mob-weapon-btn active">W1</div>
    <div id="mob-w2" class="mob-weapon-btn">W2</div>
    <div id="mob-w3" class="mob-weapon-btn">W3</div>
    <div id="mob-w4" class="mob-weapon-btn">Phys</div>
    <div id="mob-radio-btn" class="mob-weapon-btn">📻</div>

    <!-- Floating Chat -->
    <div id="chat-panel">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100" />
        </div>
    </div>

    <!-- Shop GUI -->
    <div id="shop-modal">
        <h3 style="margin:0 0 10px 0;">Playtime points: <span id="shop-pts">0</span> | Shop</h3>
        <hr style="border-color:#334155;">
        <div class="shop-item">
            <div>Custom death sound</div>
            <button id="buy-ds-btn" class="shop-btn">100 pts</button>
        </div>
        <div class="shop-item">
            <div>Radio</div>
            <button id="buy-radio-btn" class="shop-btn">350 pts</button>
        </div>
        <div class="shop-item">
            <div>Physics gun</div>
            <button id="buy-phys-btn" class="shop-btn">500 pts</button>
        </div>
        <button onclick="toggleShop()" style="width:100%; padding:8px; margin-top:10px; background:#475569; color:#fff; border:none; border-radius:6px; cursor:pointer;">Close</button>
    </div>

    <!-- Radio Panel GUI -->
    <div id="radio-modal">
        <h3 style="margin:0 0 10px 0; color:#eab308;">Radio Panel</h3>
        <p style="font-size:0.75rem; color:#94a3b8;">Max 10MB, under 5 mins. Supports any audio.</p>
        <input type="file" id="radio-file-input" accept="audio/*" style="margin-bottom:12px; width:100%; font-size:0.8rem;">
        <div style="display:flex; gap:10px;">
            <button id="radio-play-btn" style="flex:1; padding:8px; background:#22c55e; color:#fff; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Play</button>
            <button id="radio-stop-btn" style="flex:1; padding:8px; background:#ef4444; color:#fff; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Stop</button>
        </div>
        <button onclick="toggleRadioModal()" style="width:100%; padding:6px; margin-top:10px; background:#475569; color:#fff; border:none; border-radius:6px; cursor:pointer;">Close</button>
    </div>

    <input type="file" id="ds-file-input" accept="audio/*" style="display:none;">

    <div id="minimap-container">
        <canvas id="minimapCanvas" width="150" height="150"></canvas>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const minimapCanvas = document.getElementById("minimapCanvas");
        const mCtx = minimapCanvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            document.getElementById("joystick").style.display = "block";
            document.getElementById("chat-btn").style.display = "flex";
            document.getElementById("build-btn").style.display = "flex";
            document.getElementById("mic-btn").style.display = "flex";
            document.getElementById("shop-top-btn").style.display = "block";
            document.getElementById("mob-w1").style.display = "flex";
            document.getElementById("mob-w2").style.display = "flex";
            document.getElementById("mob-w3").style.display = "flex";
            document.getElementById("controls-hint").style.display = "none";
        }

        const link = "https://bras-spas-associated-cashiers.trycloudflare.com";
        const key = "146cf8ce56";
        const socket = io(link, { auth: { token: "default_key" } });

        let myId = Math.random().toString(36).substring(2, 7);
        let myColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        let myPos = { x: Math.random() * 1500, y: Math.random() * 1500 };
        let myHp = 100;
        let myPoints = 0;
        let isDead = false;
        let lastShot = 0;
        let lastBuild = 0;
        let aimAngle = 0;
        let currentWeapon = 1; // 1: Rifle, 2: SMG, 3: Sniper, 4: Physics Gun
        let isMouseDown = false;
        let isMicOn = false;
        let radioEquipped = false;
        let isDragging = false;

        const weaponStats = {
            1: { name: "Rifle", rate: 200 },
            2: { name: "SMG", rate: 50 },
            3: { name: "Sniper", rate: 2500 },
            4: { name: "Physics Gun", rate: 100 }
        };

        const keys = { w: false, a: false, s: false, d: false };
        let players = {};
        let renderPlayers = {};
        let bullets = [];
        let renderBullets = {};
        let walls = [];
        let chatBubbles = {};
        let audioCache = {}; // { id: AudioBuffer / HTMLAudioElement }
        let playingAudios = {}; // active playing sources

        let joyActive = false;
        let joyVector = { x: 0, y: 0 };
        let chatOpen = false;
        let shopOpen = false;
        let radioOpen = false;

        // Sound Synthesis Web Audio API Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSynthesizedSound(type, x, y) {
            const dist = Math.hypot(x - myPos.x, y - myPos.y);
            const maxDist = 1200;
            if (dist > maxDist) return;
            const vol = Math.max(0, 1 - dist / maxDist);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            gain.gain.setValueAtTime(vol * 0.3, audioCtx.currentTime);

            if (type === 'shoot_1') {
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'shoot_2') {
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'shoot_3') {
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hit_player') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'hit_wall') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'build') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            document.getElementById("status").innerText = "Connected";
            socket.emit("RemoteEvent", { type: "player_join", data: { id: myId, color: myColor, x: myPos.x, y: myPos.y, weapon: currentWeapon } });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "state_update") {
                const serverPlayers = pkt.data.players;
                bullets = pkt.data.bullets || [];
                walls = pkt.data.walls || [];

                for (let id in serverPlayers) {
                    const sp = serverPlayers[id];
                    if (id === myId) {
                        myHp = sp.hp;
                        myPos.x = sp.x;
                        myPos.y = sp.y;
                        myPoints = sp.points || 0;
                        document.getElementById("hp").innerText = myHp;
                        document.getElementById("pts").innerText = myPoints;
                        document.getElementById("shop-pts").innerText = myPoints;
                        updateShopUI(sp.items || {});

                        if (myHp <= 0 && !isDead) {
                            isDead = true;
                            setTimeout(() => {
                                isDead = false;
                                socket.emit("RemoteEvent", { type: "respawn", data: { id: myId } });
                            }, 3000);
                        }
                    }

                    if (!renderPlayers[id]) {
                        renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp, weapon: sp.weapon || 1, draggedBy: sp.draggedBy };
                    }
                    players[id] = sp;
                }
            } else if (pkt.type === "chat_message") {
                appendChatMessage(pkt.data.id, pkt.data.text);
                chatBubbles[pkt.data.id] = {
                    text: pkt.data.text,
                    expireTime: Date.now() + 14000
                };
            } else if (pkt.type === "chat_history") {
                pkt.data.history.forEach(m => appendChatMessage(m.id, m.text));
            } else if (pkt.type === "sound_effect") {
                playSynthesizedSound(pkt.data.soundType, pkt.data.x, pkt.data.y);
            } else if (pkt.type === "audio_chunk") {
                handleAudioChunk(pkt.data);
            } else if (pkt.type === "play_audio") {
                playSpatialAudio(pkt.data);
            } else if (pkt.type === "voice_chunk") {
                playVoiceChunk(pkt.data);
            }
        });

        function appendChatMessage(id, text) {
            const container = document.getElementById("chat-messages");
            const div = document.createElement("div");
            div.innerHTML = `<span style="color:#38bdf8; font-weight:bold;">${id}:</span> ${text}`;
            container.appendChild(div);
            if (container.children.length > 50) {
                container.removeChild(container.firstChild);
            }
            container.scrollTop = container.scrollHeight;
        }

        const chatInput = document.getElementById("chat-input");
        const chatPanel = document.getElementById("chat-panel");
        const chatBtn = document.getElementById("chat-btn");
        const buildBtn = document.getElementById("build-btn");
        const micBtn = document.getElementById("mic-btn");

        function toggleChat() {
            chatOpen = !chatOpen;
            chatPanel.style.display = chatOpen ? "flex" : "none";
            if (chatOpen) chatInput.focus();
            else chatInput.blur();
        }

        function toggleShop() {
            shopOpen = !shopOpen;
            document.getElementById("shop-modal").style.display = shopOpen ? "block" : "none";
        }

        function toggleRadioModal() {
            radioOpen = !radioOpen;
            document.getElementById("radio-modal").style.display = radioOpen ? "block" : "none";
        }

        function toggleMic() {
            isMicOn = !isMicOn;
            const el = document.getElementById("mic-status");
            el.innerText = isMicOn ? "ON" : "OFF";
            el.style.color = isMicOn ? "#22c55e" : "#ef4444";
            if (isMicOn) startVoiceRecording();
            else stopVoiceRecording();
        }

        function setWeapon(wId) {
            currentWeapon = wId;
            document.getElementById("wname").innerText = weaponStats[wId].name;
            document.querySelectorAll(".mob-weapon-btn").forEach(btn => btn.classList.remove("active"));
            if (document.getElementById(`mob-w${wId}`)) {
                document.getElementById(`mob-w${wId}`).classList.add("active");
            }
            socket.emit("RemoteEvent", { type: "switch_weapon", data: { id: myId, weapon: currentWeapon } });
        }

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === 'y' && !chatOpen) {
                e.preventDefault();
                toggleChat();
            } else if (e.key === 'Enter' && chatOpen) {
                sendChat();
            } else if (e.key.toLowerCase() === 'e' && !chatOpen && !isDead) {
                buildWall();
            } else if (e.key.toLowerCase() === 'm' && !chatOpen) {
                toggleMic();
            } else if (e.key.toLowerCase() === 'h' && !chatOpen) {
                toggleShop();
            } else if (e.key.toLowerCase() === 'r' && !chatOpen && radioEquipped) {
                toggleRadioModal();
            } else if (!chatOpen) {
                if (e.key === '1') setWeapon(1);
                if (e.key === '2') setWeapon(2);
                if (e.key === '3') setWeapon(3);
                if (e.key === '4' && players[myId]?.items?.physGun) setWeapon(4);
            }

            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = true;
                if (e.key.toLowerCase() === 'a') keys.a = true;
                if (e.key.toLowerCase() === 's') keys.s = true;
                if (e.key.toLowerCase() === 'd') keys.d = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = false;
                if (e.key.toLowerCase() === 'a') keys.a = false;
                if (e.key.toLowerCase() === 's') keys.s = false;
                if (e.key.toLowerCase() === 'd') keys.d = false;
            }
        });

        chatBtn.addEventListener("click", toggleChat);
        buildBtn.addEventListener("click", () => { if (!isDead && !chatOpen) buildWall(); });
        micBtn.addEventListener("click", toggleMic);
        document.getElementById("shop-top-btn").addEventListener("click", toggleShop);

        document.getElementById("mob-w1").addEventListener("click", () => setWeapon(1));
        document.getElementById("mob-w2").addEventListener("click", () => setWeapon(2));
        document.getElementById("mob-w3").addEventListener("click", () => setWeapon(3));
        document.getElementById("mob-w4").addEventListener("click", () => setWeapon(4));
        document.getElementById("mob-radio-btn").addEventListener("click", toggleRadioModal);

        function sendChat() {
            const text = chatInput.value.trim();
            if (text.length > 0) {
                socket.emit("RemoteEvent", { type: "send_chat", data: { id: myId, text } });
            }
            chatInput.value = "";
            toggleChat();
        }

        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        window.addEventListener("mousemove", (e) => {
            if (chatOpen) return;
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
            if (isMouseDown && currentWeapon === 4) {
                updatePhysicsDrag();
            }
        });

        window.addEventListener("mousedown", (e) => {
            if (chatOpen || isDead) return;
            if (e.button === 2) {
                isMouseDown = true;
                if (currentWeapon === 4) startPhysicsDrag();
                else tryShoot();
            }
        });
        window.addEventListener("mouseup", (e) => {
            if (e.button === 2) {
                isMouseDown = false;
                if (currentWeapon === 4) stopPhysicsDrag();
            }
        });
        window.addEventListener("contextmenu", (e) => e.preventDefault());

        // Physics Gun Dragging
        function getCursorWorldPos() {
            const zoom = (currentWeapon === 3) ? 0.5 : 1.0;
            return {
                x: myPos.x + (mousePos.x - canvas.width / 2) / zoom,
                y: myPos.y + (mousePos.y - canvas.height / 2) / zoom
            };
        }

        function startPhysicsDrag() {
            const target = getCursorWorldPos();
            socket.emit("RemoteEvent", { type: "start_drag", data: { id: myId, target } });
            isDragging = true;
        }

        function updatePhysicsDrag() {
            if (!isDragging) return;
            const target = getCursorWorldPos();
            socket.emit("RemoteEvent", { type: "update_drag", data: { id: myId, target } });
        }

        function stopPhysicsDrag() {
            isDragging = false;
            socket.emit("RemoteEvent", { type: "stop_drag", data: { id: myId } });
        }

        const joystickEl = document.getElementById("joystick");
        const stickEl = document.getElementById("stick");
        let joyCenter = { x: 0, y: 0 };

        joystickEl.addEventListener("touchstart", (e) => {
            if (chatOpen) return;
            joyActive = true;
            const rect = joystickEl.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        });

        window.addEventListener("touchmove", (e) => {
            if (!joyActive || chatOpen) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joyCenter.x;
            const dy = touch.clientY - joyCenter.y;
            const dist = Math.min(50, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);

            joyVector.x = Math.cos(angle) * (dist / 50);
            joyVector.y = Math.sin(angle) * (dist / 50);

            stickEl.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        });

        window.addEventListener("touchend", (e) => {
            if (joyActive) {
                joyActive = false;
                joyVector = { x: 0, y: 0 };
                isMouseDown = false;
                stickEl.style.transform = `translate(0px, 0px)`;
            }
        });

        window.addEventListener("touchstart", (e) => {
            if (isDead || chatOpen) return;
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth - 200 && touch.clientY > window.innerHeight - 120) return;
            if (touch.clientX > 220 || touch.clientY < canvas.height - 180) {
                mousePos.x = touch.clientX;
                mousePos.y = touch.clientY;
                isMouseDown = true;
                if (currentWeapon === 4) startPhysicsDrag();
                else tryShoot();
            }
        });

        window.addEventListener("touchend", () => {
            isMouseDown = false;
            if (currentWeapon === 4) stopPhysicsDrag();
        });

        function tryShoot() {
            const now = Date.now();
            const stat = weaponStats[currentWeapon];
            if (now - lastShot < stat.rate) return;
            lastShot = now;

            socket.emit("RemoteEvent", { type: "fire_bullet", data: { id: myId, angle: aimAngle, weapon: currentWeapon } });
        }

        function buildWall() {
            const now = Date.now();
            if (now - lastBuild < 1000) return;
            lastBuild = now;

            socket.emit("RemoteEvent", { type: "build_wall", data: { id: myId, angle: aimAngle } });
        }

        // --- Voice Recording & Audio Streaming ---
        let mediaRecorder;
        function startVoiceRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0 && isMicOn) {
                        e.data.arrayBuffer().then(buf => {
                            socket.emit("RemoteEvent", { type: "voice_chunk", data: { id: myId, chunk: buf, x: myPos.x, y: myPos.y } });
                        });
                    }
                };
                mediaRecorder.start(100); // Send chunks continuously
            }).catch(() => {
                isMicOn = false;
                document.getElementById("mic-status").innerText = "OFF";
            });
        }

        function stopVoiceRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }

        function playVoiceChunk(data) {
            if (data.id === myId) return;
            const dist = Math.hypot(data.x - myPos.x, data.y - myPos.y);
            const maxDist = 1000;
            if (dist > maxDist) return;

            const blob = new Blob([data.chunk], { type: 'audio/webm;codecs=opus' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.volume = Math.max(0, 1 - dist / maxDist);
            audio.play();
        }

        // --- File Uploading Engine (150KB Chunks) ---
        function uploadAudioFile(file, category) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const buffer = e.target.result;
                const audioTemp = new Audio();
                audioTemp.src = URL.createObjectURL(file);
                audioTemp.onloadedmetadata = function() {
                    const duration = audioTemp.duration;
                    socket.emit("RemoteEvent", {
                        type: "request_upload",
                        data: { id: myId, category, size: buffer.byteLength, duration }
                    });

                    socket.once("upload_approved", () => {
                        const chunkSize = 150 * 1024;
                        let offset = 0;
                        while (offset < buffer.byteLength) {
                            const chunk = buffer.slice(offset, offset + chunkSize);
                            socket.emit("RemoteEvent", {
                                type: "audio_chunk",
                                data: { id: myId, category, chunk, offset, total: buffer.byteLength }
                            });
                            offset += chunkSize;
                        }
                    });
                };
            };
            reader.readAsArrayBuffer(file);
        }

        let pendingChunks = {};
        function handleAudioChunk(data) {
            if (!pendingChunks[data.id]) pendingChunks[data.id] = [];
            pendingChunks[data.id].push(data.chunk);

            let currentSize = pendingChunks[data.id].reduce((acc, c) => acc + c.byteLength, 0);
            if (currentSize >= data.total) {
                const blob = new Blob(pendingChunks[data.id], { type: 'audio/mp3' });
                audioCache[data.id + "_" + data.category] = URL.createObjectURL(blob);
                delete pendingChunks[data.id];
            }
        }

        function playSpatialAudio(data) {
            const key = data.id + "_" + data.category;
            const url = audioCache[key] || data.url;
            if (!url) return;

            const audio = new Audio(url);
            const dist = Math.hypot(data.x - myPos.x, data.y - myPos.y);
            const maxDist = 1500;
            audio.volume = Math.max(0, 1 - dist / maxDist);
            if (data.timestamp) {
                audio.currentTime = (Date.now() - data.timestamp) / 1000;
            }
            if (data.loop) audio.loop = true;
            audio.play();

            playingAudios[data.id + "_" + data.category] = { audio, x: data.x, y: data.y };
        }

        // Update spatial volume for loop/playing audio
        setInterval(() => {
            for (let k in playingAudios) {
                let item = playingAudios[k];
                const dist = Math.hypot(item.x - myPos.x, item.y - myPos.y);
                const maxDist = 1500;
                item.audio.volume = Math.max(0, 1 - dist / maxDist);
            }
        }, 100);

        // Shop Buttons & Actions
        document.getElementById("buy-ds-btn").onclick = () => {
            if (players[myId]?.items?.deathSound) {
                document.getElementById("ds-file-input").click();
            } else {
                socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item: "deathSound", cost: 100 } });
            }
        };

        document.getElementById("ds-file-input").onchange = (e) => {
            const file = e.target.files[0];
            if (file) uploadAudioFile(file, "deathSound");
        };

        document.getElementById("buy-radio-btn").onclick = () => {
            if (players[myId]?.items?.radio) {
                radioEquipped = true;
                document.getElementById("mob-radio-btn").style.display = "flex";
            } else {
                socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item: "radio", cost: 350 } });
            }
        };

        document.getElementById("buy-phys-btn").onclick = () => {
            if (!players[myId]?.items?.physGun) {
                socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item: "physGun", cost: 500 } });
            }
        };

        document.getElementById("radio-play-btn").onclick = () => {
            const file = document.getElementById("radio-file-input").files[0];
            if (file) uploadAudioFile(file, "radio");
        };

        document.getElementById("radio-stop-btn").onclick = () => {
            socket.emit("RemoteEvent", { type: "stop_radio", data: { id: myId } });
        };

        function updateShopUI(items) {
            const dsBtn = document.getElementById("buy-ds-btn");
            if (items.deathSound) dsBtn.innerText = "OWNED | change death sound";

            const radioBtn = document.getElementById("buy-radio-btn");
            if (items.radio) {
                radioBtn.innerText = "OWNED | Equip";
                document.getElementById("mob-radio-btn").style.display = "flex";
                radioEquipped = true;
            }

            const physBtn = document.getElementById("buy-phys-btn");
            if (items.physGun) {
                physBtn.innerText = "OWNED | PRESS 4 ON PC OR MOBILE TO EQUIP";
                document.getElementById("mob-w4").style.display = "flex";
            }
        }

        let lastInputEmit = 0;
        function update() {
            if (!isDead && !chatOpen) {
                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2;
                aimAngle = Math.atan2(mousePos.y - screenCenterY, mousePos.x - screenCenterX);

                if (isMouseDown && currentWeapon !== 4) tryShoot();

                let inputData = { w: false, a: false, s: false, d: false };
                if (isMobile) inputData.vector = joyVector;
                else inputData = { w: keys.w, a: keys.a, s: keys.s, d: keys.d };

                const now = Date.now();
                if (now - lastInputEmit >= 1000 / 50) {
                    lastInputEmit = now;
                    socket.emit("RemoteEvent", { type: "player_input", data: { id: myId, input: inputData, angle: aimAngle, color: myColor, weapon: currentWeapon } });
                }
            }
        }

        function drawBubble(x, y, text) {
            ctx.save();
            ctx.font = "14px sans-serif";
            const metrics = ctx.measureText(text);
            const w = metrics.width + 16;
            const h = 28;

            ctx.translate(x, y - 75);
            ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, 6);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        function drawMinimap() {
            mCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            const scale = 150 / 3000;

            mCtx.strokeStyle = "#475569";
            mCtx.lineWidth = 1;
            mCtx.strokeRect(0, 0, 150, 150);

            mCtx.fillStyle = "#64748b";
            walls.forEach(w => {
                mCtx.fillRect(w.x * scale - 1, w.y * scale - 1, 2, 2);
            });

            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                let mx = p.x * scale;
                let my = p.y * scale;

                mCtx.fillStyle = (id === myId) ? "#38bdf8" : (p.color || "#ef4444");
                mCtx.beginPath();
                mCtx.arc(mx, my, (id === myId) ? 3.5 : 2.5, 0, Math.PI * 2);
                mCtx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Linear LERP for smooth player network interpolation
            for (let id in players) {
                let sp = players[id];
                if (!renderPlayers[id]) {
                    renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp, weapon: sp.weapon || 1 };
                } else {
                    renderPlayers[id].x += (sp.x - renderPlayers[id].x) * 0.3;
                    renderPlayers[id].y += (sp.y - renderPlayers[id].y) * 0.3;
                    renderPlayers[id].angle = sp.angle;
                    renderPlayers[id].color = sp.color;
                    renderPlayers[id].hp = sp.hp;
                    renderPlayers[id].weapon = sp.weapon || 1;
                }
            }

            // Bullet Linear LERP Interpolation to completely hide lag
            bullets.forEach(b => {
                if (!renderBullets[b.id]) {
                    renderBullets[b.id] = { x: b.x, y: b.y };
                } else {
                    renderBullets[b.id].x += (b.x - renderBullets[b.id].x) * 0.5;
                    renderBullets[b.id].y += (b.y - renderBullets[b.id].y) * 0.5;
                }
            });

            ctx.save();
            if (!isDead && renderPlayers[myId]) {
                const isSniperActive = (currentWeapon === 3);
                const zoomFactor = isSniperActive ? 0.5 : 1.0;
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(zoomFactor, zoomFactor);
                ctx.translate(-renderPlayers[myId].x, -renderPlayers[myId].y);
            }

            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 3000, 3000);

            // Draw Walls & Cyan Outline if dragged
            walls.forEach((w, idx) => {
                ctx.save();
                ctx.translate(w.x, w.y);
                ctx.rotate(w.angle + Math.PI / 2);
                
                if (w.dragged) {
                    ctx.shadowColor = "#06b6d4";
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = "#06b6d4";
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = "#94a3b8";
                    ctx.lineWidth = 2;
                }

                ctx.fillStyle = "#334155";
                ctx.fillRect(-60, -10, 120, 20);
                ctx.strokeRect(-60, -10, 120, 20);
                ctx.restore();
            });

            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                ctx.save();
                ctx.translate(p.x, p.y);

                // Cyan outline if dragged by physics gun
                if (p.draggedBy) {
                    ctx.shadowColor = "#06b6d4";
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = "#06b6d4";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(-22, -22, 44, 44);
                }

                // Player Body
                ctx.fillStyle = p.color || '#fff';
                ctx.fillRect(-20, -20, 40, 40);

                // Health bar
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(-20, -32, 40, 6);
                ctx.fillStyle = "#22c55e";
                ctx.fillRect(-20, -32, 40 * (p.hp / 100), 6);

                // Client ID Name on Top of Head
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(id, 0, -40);

                // Yellow Radio on Player's Back
                if (players[id]?.items?.radio) {
                    ctx.fillStyle = "#eab308";
                    ctx.fillRect(-12, -25, 24, 6);
                }

                ctx.rotate(p.angle);
                
                // Weapon Render
                const wType = p.weapon;
                if (wType === 1) {
                    ctx.fillStyle = "#64748b";
                    ctx.fillRect(5, -5, 34, 10);
                } else if (wType === 2) {
                    ctx.fillStyle = "#475569";
                    ctx.fillRect(4, -4, 22, 8);
                } else if (wType === 3) {
                    ctx.fillStyle = "#334155";
                    ctx.fillRect(2, -4, 45, 8);
                    ctx.fillStyle = "#ef4444";
                    ctx.fillRect(15, -9, 10, 5);
                } else if (wType === 4) {
                    // Gmod Physics Gun Model
                    ctx.fillStyle = "#0284c7";
                    ctx.fillRect(5, -4, 30, 8);
                    ctx.fillStyle = "#06b6d4";
                    ctx.fillRect(30, -7, 6, 14);
                }

                ctx.restore();

                // Sniper Aiming Laser
                if (id === myId && currentWeapon === 3 && !isDead) {
                    ctx.save();
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.7)";
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(p.angle) * 1200, p.y + Math.sin(p.angle) * 1200);
                    ctx.stroke();
                    ctx.restore();
                }

                if (chatBubbles[id] && chatBubbles[id].expireTime > Date.now()) {
                    drawBubble(p.x, p.y, chatBubbles[id].text);
                }
            }

            // Draw Smooth LERP Bullets
            ctx.fillStyle = "#facc15";
            for (let bId in renderBullets) {
                let rb = renderBullets[bId];
                ctx.beginPath();
                ctx.arc(rb.x, rb.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();

            drawMinimap();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
