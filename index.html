<!-- Test Your Guns - Client Script -->
<!DOCTYPE html>
<html>
<head>
    <title>Test Your Guns</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; background: #1e293b; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; font-weight: bold; font-size: 1.2rem; text-shadow: 1px 1px 2px #000; z-index: 10; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; touch-action: none; z-index: 10; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; }
        #chat-btn { position: absolute; bottom: 40px; right: 40px; width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 10; }
        #chat-container { position: absolute; bottom: 120px; left: 40px; display: none; z-index: 10; }
        #chat-input { width: 250px; padding: 10px; background: rgba(15, 23, 42, 0.9); border: 2px solid #38bdf8; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
        #minimap-container { position: absolute; top: 10px; right: 10px; width: 150px; height: 150px; background: rgba(15, 23, 42, 0.8); border: 2px solid #475569; border-radius: 8px; overflow: hidden; pointer-events: none; z-index: 10; }
        #minimapCanvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="ui">Health: <span id="hp">100</span> | Status: <span id="status">Connecting...</span></div>
    <div id="joystick"><div id="stick"></div></div>
    <div id="chat-btn">💬</div>
    <div id="chat-container">
        <input type="text" id="chat-input" placeholder="Type a message..." maxlength="60" />
    </div>
    <div id="minimap-container">
        <canvas id="minimapCanvas" width="150" height="150"></canvas>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const minimapCanvas = document.getElementById("minimapCanvas");
        const mCtx = minimapCanvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            document.getElementById("joystick").style.display = "block";
            document.getElementById("chat-btn").style.display = "flex";
        }

        const link = "https://interim-preference-audience-duties.trycloudflare.com";
        const key = "146cf8ce56";
        const socket = io(link, { auth: { token: "default_key" } });

        let myId = Math.random().toString(36).substring(2, 7);
        let myColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        let myPos = { x: Math.random() * 1500, y: Math.random() * 1500 };
        let myHp = 100;
        let isDead = false;
        let lastShot = 0;
        let aimAngle = 0;

        const keys = { w: false, a: false, s: false, d: false };
        let players = {};
        let renderPlayers = {};
        let bullets = [];
        let chatBubbles = {};

        let joyActive = false;
        let joyVector = { x: 0, y: 0 };
        let chatOpen = false;

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            document.getElementById("status").innerText = "Connected";
            socket.emit("RemoteEvent", { type: "player_join", data: { id: myId, color: myColor, x: myPos.x, y: myPos.y } });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "state_update") {
                const serverPlayers = pkt.data.players;
                bullets = pkt.data.bullets || [];

                for (let id in serverPlayers) {
                    const sp = serverPlayers[id];
                    if (id === myId) {
                        myHp = sp.hp;
                        myPos.x = sp.x;
                        myPos.y = sp.y;
                        document.getElementById("hp").innerText = myHp;
                        if (myHp <= 0 && !isDead) {
                            isDead = true;
                            setTimeout(() => {
                                isDead = false;
                                socket.emit("RemoteEvent", { type: "respawn", data: { id: myId } });
                            }, 3000);
                        }
                    }

                    if (!renderPlayers[id]) {
                        renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp };
                    }
                    players[id] = sp;
                }
            } else if (pkt.type === "chat_message") {
                chatBubbles[pkt.data.id] = {
                    text: pkt.data.text,
                    expireTime: Date.now() + 4000
                };
            }
        });

        const chatInput = document.getElementById("chat-input");
        const chatContainer = document.getElementById("chat-container");
        const chatBtn = document.getElementById("chat-btn");

        function toggleChat() {
            chatOpen = !chatOpen;
            chatContainer.style.display = chatOpen ? "block" : "none";
            if (chatOpen) {
                chatInput.focus();
            } else {
                chatInput.blur();
            }
        }

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === 'y' && !chatOpen) {
                e.preventDefault();
                toggleChat();
            } else if (e.key === 'Enter' && chatOpen) {
                sendChat();
            }

            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = true;
                if (e.key.toLowerCase() === 'a') keys.a = true;
                if (e.key.toLowerCase() === 's') keys.s = true;
                if (e.key.toLowerCase() === 'd') keys.d = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = false;
                if (e.key.toLowerCase() === 'a') keys.a = false;
                if (e.key.toLowerCase() === 's') keys.s = false;
                if (e.key.toLowerCase() === 'd') keys.d = false;
            }
        });

        chatBtn.addEventListener("click", () => {
            toggleChat();
        });

        function sendChat() {
            const text = chatInput.value.trim();
            if (text.length > 0) {
                socket.emit("RemoteEvent", { type: "send_chat", data: { id: myId, text } });
                chatBubbles[myId] = {
                    text: text,
                    expireTime: Date.now() + 4000
                };
            }
            chatInput.value = "";
            toggleChat();
        }

        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        window.addEventListener("mousemove", (e) => {
            if (chatOpen) return;
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener("mousedown", (e) => {
            if (chatOpen || isDead) return;
            if (e.button === 2) {
                shoot();
            }
        });
        window.addEventListener("contextmenu", (e) => e.preventDefault());

        const joystickEl = document.getElementById("joystick");
        const stickEl = document.getElementById("stick");
        let joyCenter = { x: 0, y: 0 };

        joystickEl.addEventListener("touchstart", (e) => {
            if (chatOpen) return;
            joyActive = true;
            const rect = joystickEl.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        });

        window.addEventListener("touchmove", (e) => {
            if (!joyActive || chatOpen) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joyCenter.x;
            const dy = touch.clientY - joyCenter.y;
            const dist = Math.min(50, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);

            joyVector.x = Math.cos(angle) * (dist / 50);
            joyVector.y = Math.sin(angle) * (dist / 50);

            stickEl.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        });

        window.addEventListener("touchend", (e) => {
            if (joyActive) {
                joyActive = false;
                joyVector = { x: 0, y: 0 };
                stickEl.style.transform = `translate(0px, 0px)`;
            }
        });

        window.addEventListener("touchstart", (e) => {
            if (isDead || chatOpen) return;
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth - 120 && touch.clientY > window.innerHeight - 120) return;
            if (touch.clientX > 180 || touch.clientY < canvas.height - 180) {
                mousePos.x = touch.clientX;
                mousePos.y = touch.clientY;
                shoot();
            }
        });

        function shoot() {
            const now = Date.now();
            if (now - lastShot < 200) return;
            lastShot = now;

            socket.emit("RemoteEvent", { type: "fire_bullet", data: { id: myId, angle: aimAngle } });
        }

        // Throttle input networking to exactly 30 requests per second (~33.3ms)
        let lastInputEmit = 0;
        function update() {
            if (!isDead && !chatOpen) {
                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2;
                aimAngle = Math.atan2(mousePos.y - screenCenterY, mousePos.x - screenCenterX);

                let inputData = { w: false, a: false, s: false, d: false };
                if (isMobile) {
                    inputData.vector = joyVector;
                } else {
                    inputData = { w: keys.w, a: keys.a, s: keys.s, d: keys.d };
                }

                const now = Date.now();
                if (now - lastInputEmit >= 1000 / 30) {
                    lastInputEmit = now;
                    socket.emit("RemoteEvent", { type: "player_input", data: { id: myId, input: inputData, angle: aimAngle, color: myColor } });
                }
            }
        }

        function drawBubble(x, y, text) {
            ctx.save();
            ctx.font = "14px sans-serif";
            const metrics = ctx.measureText(text);
            const w = metrics.width + 16;
            const h = 28;

            ctx.translate(x, y - 55);
            ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, 6);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        function drawMinimap() {
            mCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);

            // World bounds scale factor (Map size is 3000x3000, minimap is 150x150)
            const scale = 150 / 3000;

            // Draw world boundary box on minimap
            mCtx.strokeStyle = "#475569";
            mCtx.lineWidth = 1;
            mCtx.strokeRect(0, 0, 150, 150);

            // Draw all players on minimap
            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                let mx = p.x * scale;
                let my = p.y * scale;

                mCtx.fillStyle = (id === myId) ? "#38bdf8" : (p.color || "#ef4444");
                mCtx.beginPath();
                mCtx.arc(mx, my, (id === myId) ? 3.5 : 2.5, 0, Math.PI * 2);
                mCtx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let id in players) {
                let sp = players[id];
                if (!renderPlayers[id]) {
                    renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp };
                } else {
                    renderPlayers[id].x += (sp.x - renderPlayers[id].x) * 0.25;
                    renderPlayers[id].y += (sp.y - renderPlayers[id].y) * 0.25;
                    renderPlayers[id].angle = sp.angle;
                    renderPlayers[id].color = sp.color;
                    renderPlayers[id].hp = sp.hp;
                }
            }

            ctx.save();
            if (!isDead && renderPlayers[myId]) {
                ctx.translate(canvas.width / 2 - renderPlayers[myId].x, canvas.height / 2 - renderPlayers[myId].y);
            }

            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 3000, 3000);

            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.fillStyle = p.color || '#fff';
                ctx.fillRect(-20, -20, 40, 40);

                ctx.fillStyle = "#ef4444";
                ctx.fillRect(-20, -32, 40, 6);
                ctx.fillStyle = "#22c55e";
                ctx.fillRect(-20, -32, 40 * (p.hp / 100), 6);

                ctx.rotate(p.angle);
                ctx.fillStyle = "#94a3b8";
                ctx.fillRect(0, -6, 30, 12);
                ctx.restore();

                if (chatBubbles[id] && chatBubbles[id].expireTime > Date.now()) {
                    drawBubble(p.x, p.y, chatBubbles[id].text);
                }
            }

            ctx.fillStyle = "#facc15";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();

            drawMinimap();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
