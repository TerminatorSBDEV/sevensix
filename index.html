<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PC Controller | Remote Screen & Play</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --accent: #00ff88;
            --text: #ffffff;
            --border: #222;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; touch-action: none; user-select: none;
        }

        /* Telas de Configuração */
        .screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; position: fixed; inset: 0; z-index: 100; background: var(--bg);
        }

        .box {
            background: var(--panel); border: 2px solid var(--border); padding: 35px;
            border-radius: 16px; text-align: center; width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            width: 100%; padding: 12px; margin: 10px 0; background: var(--accent);
            border: none; color: black; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn:hover { background: #00cc6a; transform: scale(1.02); }
        .btn-secondary { background: #222; color: #fff; border: 1px solid var(--border); }
        .btn-secondary:hover { background: #333; }

        /* Configuração de Transmissão */
        .setup-group {
            text-align: left; margin: 15px 0; display: flex; flex-direction: column; gap: 5px;
        }
        .setup-group label { font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .setup-group select, .setup-group input {
            background: #000; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none;
        }

        /* Lista de Servidores Descobertos */
        .server-list {
            margin-top: 15px; max-height: 150px; overflow-y: auto;
            border: 1px solid var(--border); border-radius: 8px; background: #000;
        }
        .server-item {
            padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer;
            transition: 0.2s; font-family: monospace;
        }
        .server-item:hover { background: var(--accent); color: black; }

        /* Streaming Viewport */
        #viewport {
            display: none; width: 100vw; height: 100vh;
            position: fixed; inset: 0; z-index: 10; background: black;
            justify-content: center; align-items: center;
        }

        #remote-screen {
            max-width: 100%; max-height: 100%; object-fit: contain;
            cursor: none; 
        }

        /* Teclado Virtual Mobile */
        #mobile-keyboard {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: none; grid-template-columns: repeat(5, 1fr); gap: 6px;
            background: rgba(0,0,0,0.75); padding: 12px; border-radius: 12px; z-index: 1000;
        }
        .key {
            background: #2a2a2a; border: 1px solid #444; color: white;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; border-radius: 6px; font-size: 0.9rem;
        }
        .key:active { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <!-- Passo 1: Escolha do Dispositivo -->
    <div id="screen-device" class="screen">
        <div class="box">
            <h2 style="margin-top:0; color: var(--accent);">PC CONTROLLER</h2>
            <p style="color:#888;">What device are you on?</p>
            <button class="btn" onclick="setDevice('mobile')">Mobile</button>
            <button class="btn btn-secondary" onclick="setDevice('pc')">Computer</button>
        </div>
    </div>

    <!-- Passo 2: Menu de Ações -->
    <div id="screen-action" class="screen" style="display:none;">
        <div class="box">
            <h2 style="margin-top:0; color: var(--accent);">Whatchu wanna do?</h2>
            <button class="btn" onclick="openHostSetup()">Create Room</button>
            <button class="btn btn-secondary" onclick="openJoinMenu()">Join a Room</button>
        </div>
    </div>

    <!-- Passo 2.5: Configuração de Transmissão (Antes de criar a sala) -->
    <div id="screen-host-setup" class="screen" style="display:none;">
        <div class="box">
            <h3 style="margin-top:0; color: var(--accent);">Stream Setup</h3>
            <div class="setup-group">
                <label>Resolution</label>
                <select id="stream-quality">
                    <option value="720p">720p (1280x720)</option>
                    <option value="480p" selected>480p (854x480)</option>
                    <option value="360p">360p (640x360)</option>
                    <option value="240p">240p (426x240)</option>
                    <option value="144p">144p (256x144)</option>
                </select>
            </div>
            <div class="setup-group">
                <label>Frame Rate (FPS)</label>
                <input type="number" id="stream-fps" value="15" min="1" max="30">
            </div>
            <button class="btn" onclick="initHostFlow()">Share Screen & Start</button>
            <button class="btn btn-secondary" onclick="goBackToActionsFromSetup()">Cancel</button>
        </div>
    </div>

    <!-- Passo 3: Join Menu (Descoberta Ativa de Salas) -->
    <div id="screen-join" class="screen" style="display:none;">
        <div class="box">
            <h3 style="margin-top:0;">Available Rooms</h3>
            <div id="server-list" class="server-list">
                <div style="padding:15px; color:#666; font-size:0.8rem;">Searching rooms...</div>
            </div>
            <button class="btn btn-secondary" style="margin-top:15px;" onclick="goBackToActions()">Back</button>
        </div>
    </div>

    <!-- Tela do Host Ativo -->
    <div id="screen-hosting" class="screen" style="display:none;">
        <div class="box">
            <h2 style="color: var(--accent);">ROOM CREATED</h2>
            <div style="font-size:2rem; font-weight:bold; letter-spacing:4px; margin: 15px 0;" id="room-code-display">----</div>
            <p style="font-size:0.85rem; color:#888; line-height:1.4;">
                1. Share this code with your friend.<br>
                2. Open <b>controlpc.py</b> on your PC and enter this code.
            </p>
            <button class="btn btn-secondary" onclick="location.reload()">Stop Stream</button>
        </div>
    </div>

    <!-- Viewport da Transmissão (Client View) -->
    <div id="viewport">
        <img id="remote-screen" draggable="false">
    </div>

    <!-- Teclado Virtual para Mobile -->
    <div id="mobile-keyboard">
        <div class="key" onpointerdown="sendKey('w','down')" onpointerup="sendKey('w','up')">W</div>
        <div class="key" onpointerdown="sendKey('a','down')" onpointerup="sendKey('a','up')">A</div>
        <div class="key" onpointerdown="sendKey('s','down')" onpointerup="sendKey('s','up')">S</div>
        <div class="key" onpointerdown="sendKey('d','down')" onpointerup="sendKey('d','up')">D</div>
        <div class="key" onpointerdown="sendKey('e','down')" onpointerup="sendKey('e','up')">E</div>
        <div class="key" onpointerdown="sendKey('space','down')" onpointerup="sendKey('space','up')" style="grid-column: span 2; width:110px;">SPACE</div>
        <div class="key" onpointerdown="sendKey('shift','down')" onpointerup="sendKey('shift','up')">SHIFT</div>
        <div class="key" onpointerdown="sendKey('escape','down')" onpointerup="sendKey('escape','up')">ESC</div>
    </div>

<script>
    // --- CREDENCIAIS ---
    const TUNNEL = "https://auburn-november-shortly-log.trycloudflare.com";
    const AUTH_KEY = "eS21DOtld";
    const socket = io(TUNNEL, { auth: { token: AUTH_KEY }, transports: ['websocket'] });

    let deviceSelected = "";
    let myRoom = "";
    let isHostActive = false;
    let activeRooms = new Set();
    
    const myId = "usr_" + Math.random().toString(36).substr(2, 5);
    const guestColor = getRandomNeonColor();

    let escCount = 0;
    let escTimer = null;
    let lastMoveTime = 0;

    // Gerenciadores de cache de imagem
    let lastFrameUrl = null;
    let frameCount = 0;
    let heartbeatInterval = null;

    // Configuração Dinâmica da Stream
    let selectedQuality = "480p";
    let selectedFPS = 15;
    let bgWorker = null; // Ticker de segundo plano que evita throttling

    const qualityResolutionMap = {
        "720p": { w: 1280, h: 720 },
        "480p": { w: 854, h: 480 },
        "360p": { w: 640, h: 360 },
        "240p": { w: 426, h: 240 },
        "144p": { w: 256, h: 144 }
    };

    // Helper para converter base64 para binário Blob nativo
    function dataURItoBlob(dataURI) {
        const byteString = atob(dataURI.split(',')[1]);
        const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
        }
        return new Blob([ab], {type: mimeString});
    }

    function getRandomNeonColor() {
        const neonColors = ["#00ff88", "#ff3366", "#3399ff", "#ff9933", "#cc33ff", "#ffff33"];
        return neonColors[Math.floor(Math.random() * neonColors.length)];
    }

    // --- MENU CONTROLS ---
    function setDevice(device) {
        deviceSelected = device;
        document.getElementById('screen-device').style.display = 'none';
        document.getElementById('screen-action').style.display = 'flex';
    }

    function openJoinMenu() {
        document.getElementById('screen-action').style.display = 'none';
        document.getElementById('screen-join').style.display = 'flex';
        activeRooms.clear();
        document.getElementById('server-list').innerHTML = `<div style="padding:15px; color:#666; font-size:0.8rem;">Searching rooms...</div>`;
        socket.emit('RemoteEvent', { type: 'room_ping' });
    }

    function goBackToActions() {
        document.getElementById('screen-join').style.display = 'none';
        document.getElementById('screen-action').style.display = 'flex';
    }

    function openSettings() {
        document.getElementById('settings-modal').style.display = 'flex';
    }

    function openChatSettings() {
        document.getElementById('chat-settings').style.display = 'block';
    }

    function toggleChatSettings() {
        const s = document.getElementById('chat-settings');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    function toggleChat() {
        const panel = document.getElementById('chat-panel');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function openHostSetup() {
        document.getElementById('screen-action').style.display = 'none';
        document.getElementById('screen-host-setup').style.display = 'flex';
    }

    function goBackToActionsFromSetup() {
        document.getElementById('screen-host-setup').style.display = 'none';
        document.getElementById('screen-action').style.display = 'flex';
    }

    // --- HOST FLOW & WEB WORKER TICKER (SOLUÇÃO DE 1 FPS EM SEGUNDO PLANO) ---
    async function initHostFlow() {
        selectedQuality = document.getElementById('stream-quality').value;
        selectedFPS = Math.min(Math.max(1, parseInt(document.getElementById('stream-fps').value) || 15), 30);
        const res = qualityResolutionMap[selectedQuality];

        myRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { 
                    width: { ideal: res.w, max: res.w }, 
                    height: { ideal: res.h, max: res.h }, 
                    frameRate: { ideal: selectedFPS, max: selectedFPS } 
                }
            });
            
            isHostActive = true;
            document.getElementById('screen-host-setup').style.display = 'none';
            document.getElementById('screen-hosting').style.display = 'flex';
            document.getElementById('room-code-display').innerText = myRoom;

            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            function captureAndSend() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = res.w; 
                    canvas.height = res.h;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    socket.emit('RemoteEvent', {
                        type: 'screen_frame',
                        room: myRoom,
                        img: canvas.toDataURL('image/jpeg', 0.45)
                    });
                }
            }

            // --- INLINE WEB WORKER (Garante envio fluido mesmo com a aba em segundo plano) ---
            const workerCode = `
                let timer = null;
                self.onmessage = function(e) {
                    if (e.data.cmd === 'start') {
                        clearInterval(timer);
                        timer = setInterval(() => {
                            self.postMessage('tick');
                        }, e.data.interval);
                    } else if (e.data.cmd === 'stop') {
                        clearInterval(timer);
                    }
                };
            `;
            const workerBlob = new Blob([workerCode], {type: 'application/javascript'});
            bgWorker = new Worker(URL.createObjectURL(workerBlob));
            
            bgWorker.onmessage = function() {
                captureAndSend();
            };

            // Inicia o metrônomo de tempo baseado no FPS selecionado
            bgWorker.postMessage({ cmd: 'start', interval: 1000 / selectedFPS });

            stream.getVideoTracks()[0].onended = () => {
                if (bgWorker) bgWorker.postMessage({ cmd: 'stop' });
                location.reload();
            };

        } catch (e) {
            alert("Screenshare error: " + e.message);
        }
    }

    // --- CLIENT RECEIVER WITH FLUSH SYSTEM ---
    socket.on('RemoteEvent', (packet) => {
        if (packet.type === 'room_ping' && isHostActive) {
            socket.emit('RemoteEvent', { type: 'room_pong', room: myRoom });
        }

        if (packet.type === 'room_pong' && !isHostActive) {
            if (!activeRooms.has(packet.room)) {
                activeRooms.add(packet.room);
                updateServerList();
            }
        }

        // Renderização livre de vazamento de memória (Memory Flush a cada frame + Refresh a cada 5)
        if (packet.type === 'screen_frame' && packet.room === myRoom && !isHostActive) {
            const imgElement = document.getElementById('remote-screen');
            
            // Revoga a URL do objeto anterior imediatamente para liberar a memória física do navegador
            if (lastFrameUrl) {
                URL.revokeObjectURL(lastFrameUrl);
            }

            const blob = dataURItoBlob(packet.img);
            const objectUrl = URL.createObjectURL(blob);
            
            imgElement.src = objectUrl;
            lastFrameUrl = objectUrl;

            // Limpa o cache visual forçando um reflow visual interno
            frameCount++;
            if (frameCount % 5 === 0) {
                imgElement.style.display = 'none';
                imgElement.offsetHeight; 
                imgElement.style.display = 'block';
            }
        }
    });

    // --- ENVIADOR DE HEARTBEAT (WATCHDOG DE 10S) ---
    function startWatcherHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if (isHostActive || !myRoom) return;
            
            socket.emit('RemoteEvent', {
                type: 'remote_input',
                action: 'heartbeat',
                room: myRoom,
                id: myId,
                name: 'guest_1',
                color: guestColor
            });
        }, 3000); 
    }

    function updateServerList() {
        const listDiv = document.getElementById('server-list');
        listDiv.innerHTML = "";
        activeRooms.forEach(room => {
            const item = document.createElement('div');
            item.className = 'server-item';
            item.innerText = `ROOM [ ${room} ]`;
            item.onclick = () => tryJoinRoom(room);
            listDiv.appendChild(item);
        });
    }

    function tryJoinRoom(room) {
        const pass = prompt("Digite o código da sala de 4 letras:");
        if (pass && pass.toUpperCase() === room) {
            myRoom = room;
            startClientView();
        } else {
            alert("Código incorreto!");
        }
    }

    function startClientView() {
        document.getElementById('screen-join').style.display = 'none';
        const viewport = document.getElementById('viewport');
        viewport.style.display = 'flex';

        startWatcherHeartbeat();

        if (deviceSelected === 'mobile') {
            document.getElementById('mobile-keyboard').style.display = 'grid';
            setupMobileDrivers();
        } else {
            setupPCDrivers();
        }
    }

    // --- INPUT SENDER COM LIMITADOR DE 20 REQS/S ---
    function sendInput(action, data) {
        if (isHostActive) return;

        if (action === 'mousemove') {
            const now = Date.now();
            if (now - lastMoveTime < 50) return; 
            lastMoveTime = now;
        }

        const payload = { type: 'remote_input', room: myRoom, action: action, id: myId, ...data };
        socket.emit('RemoteEvent', payload);
    }

    function sendKey(k, state) {
        sendInput(state === 'down' ? 'keydown' : 'keyup', { key: k });
    }

    // --- CONTROLES DE INPUT (DRIVER PC) ---
    function setupPCDrivers() {
        const screen = document.getElementById('remote-screen');
        
        screen.addEventListener('click', () => {
            document.documentElement.requestFullscreen().catch(()=>{});
            screen.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === screen) {
                const rect = screen.getBoundingClientRect();
                const x = Math.min(Math.max(0, (e.movementX + rect.width/2) / rect.width), 1);
                const y = Math.min(Math.max(0, (e.movementY + rect.height/2) / rect.height), 1);
                sendInput('mousemove', { x, y });
            }
        });

        screen.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement === screen) {
                const btn = e.button === 2 ? 'right' : 'left';
                sendInput('mousedown', { btn });
            }
        });

        screen.addEventListener('mouseup', (e) => {
            if (document.pointerLockElement === screen) {
                const btn = e.button === 2 ? 'right' : 'left';
                sendInput('mouseup', { btn });
            }
        });

        screen.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('keydown', (e) => {
            if (document.pointerLockElement === screen) {
                if (!e.repeat) {
                    sendInput('keydown', { key: e.key });
                }
                e.preventDefault();
            }
            
            if (e.key === 'Escape') {
                escCount++;
                clearTimeout(escTimer);
                if (escCount >= 2) {
                    location.reload(); 
                } else {
                    escTimer = setTimeout(() => { escCount = 0; }, 1000);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (document.pointerLockElement === screen) {
                sendInput('keyup', { key: e.key });
                e.preventDefault();
            }
        });
    }

    // --- CONTROLES DE INPUT (DRIVER MOBILE) ---
    function setupMobileDrivers() {
        const screen = document.getElementById('remote-screen');
        let lastTap = 0;
        let isDragging = false;

        screen.addEventListener('touchmove', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            const rect = screen.getBoundingClientRect();
            const x = Math.min(Math.max(0, (touch.clientX - rect.left) / rect.width), 1);
            const y = Math.min(Math.max(0, (touch.clientY - rect.top) / rect.height), 1);
            sendInput('mousemove', { x, y });
        });

        screen.addEventListener('touchend', (e) => {
            if (!isDragging) {
                const now = Date.now();
                const diff = now - lastTap;
                
                if (diff < 300 && diff > 0) {
                    sendInput('mousedown', { btn: 'right' });
                    setTimeout(() => sendInput('mouseup', { btn: 'right' }), 50);
                } else {
                    sendInput('mousedown', { btn: 'left' });
                    setTimeout(() => sendInput('mouseup', { btn: 'left' }), 50);
                }
                lastTap = now;
            }
            isDragging = false;
        });
    }
</script>
</body>
</html>
