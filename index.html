<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Html snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #menuUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .menu-card {
            background: #121214;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            text-align: center;
        }
        .menu-card h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #1e1e24;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .color-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        .color-row input[type="range"] {
            flex: 1;
        }
        .color-preview {
            width: 100%;
            height: 20px;
            border-radius: 4px;
            margin-top: 8px;
            border: 1px solid #555;
        }
        button.btn-spawn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #28a745;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.btn-spawn:hover {
            background: #218838;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #555;
            border-radius: 8px;
            z-index: 5;
            pointer-events: none;
        }
        #statusText {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 5;
            font-size: 0.9rem;
            color: #00ff88;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap" width="150" height="150"></canvas>
    <div id="statusText">Conectando ao servidor...</div>

    <div id="menuUI">
        <div class="menu-card">
            <h1>Html snakes</h1>
            <div class="form-group">
                <label for="pName">Nome de jogador:</label>
                <input type="text" id="pName" maxlength="10" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Cor da sua cobra:</label>
                <div class="color-sliders">
                    <div class="color-row">
                        <span>Vermelho:</span>
                        <input type="range" id="rColor" min="0" max="255" value="128">
                        <span id="rVal">50%</span>
                    </div>
                    <div class="color-row">
                        <span>Verde:</span>
                        <input type="range" id="gColor" min="0" max="255" value="128">
                        <span id="gVal">50%</span>
                    </div>
                    <div class="color-row">
                        <span>Azul:</span>
                        <input type="range" id="bColor" min="0" max="255" value="128">
                        <span id="bVal">50%</span>
                    </div>
                </div>
                <div class="color-preview" id="colorPreview"></div>
            </div>
            <button class="btn-spawn" id="spawnBtn">Surgir</button>
        </div>
    </div>

    <script>
        const SERVER_KEY = "ee02879679";
        const SERVER_LINK = "https://authentic-boss-temporal-shipped.trycloudflare.com";
        const MAP_SIZE = 4000;
        const GRID_SIZE = 100;
        const MAX_SERVERS = 100;
        const MAX_PLAYERS_PER_ROOM = 20;
        const MAX_NATURAL_FOOD = 500;
        const TURN_SPEED = 0.08; // Medium speed turning

        // DOM Elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const mctx = minimapCanvas.getContext('2d');
        const menuUI = document.getElementById('menuUI');
        const statusText = document.getElementById('statusText');

        const rInput = document.getElementById('rColor');
        const gInput = document.getElementById('gColor');
        const bInput = document.getElementById('bColor');
        const rVal = document.getElementById('rVal');
        const gVal = document.getElementById('gVal');
        const bVal = document.getElementById('bVal');
        const colorPreview = document.getElementById('colorPreview');
        const nameInput = document.getElementById('pName');
        const spawnBtn = document.getElementById('spawnBtn');

        let myId = Math.random().toString(36).substring(2, 9);
        let currentRoom = null;
        let isHost = false;
        let isAlive = false;
        let socket = null;

        // Local state
        let localPlayer = {
            id: myId,
            name: '',
            color: '#808080',
            x: 0,
            y: 0,
            angle: 0,
            targetAngle: 0,
            score: 5,
            sprinting: false,
            trail: [],
            dead: false,
            fadeAlpha: 1.0
        };

        let remotePlayers = {};
        let foods = [];
        let roomPlayersCount = {};

        // Mobile Controls Data
        let touchMoveId = null;
        let touchMovePos = { x: 0, y: 0 };
        let touchSprintId = null;
        let isSpacePressed = false;
        let isEPressed = false;

        function updateColorPreview() {
            const r = parseInt(rInput.value);
            const g = parseInt(gInput.value);
            const b = parseInt(bInput.value);
            rVal.innerText = Math.round((r / 255) * 100) + '%';
            gVal.innerText = Math.round((g / 255) * 100) + '%';
            bVal.innerText = Math.round((b / 255) * 100) + '%';
            const hex = `rgb(${r},${g},${b})`;
            colorPreview.style.backgroundColor = hex;
            localPlayer.color = hex;
        }

        rInput.addEventListener('input', updateColorPreview);
        gInput.addEventListener('input', updateColorPreview);
        bInput.addEventListener('input', updateColorPreview);
        updateColorPreview();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- WebSocket Setup ---
        socket = io(SERVER_LINK, { auth: { token: "default_key" } });

        socket.on("connect", () => {
            statusText.innerText = "Conectado. Entrando no cluster...";
            socket.emit("join_virtual_server", { key: SERVER_KEY });
        });

        socket.on("joined_successfully", () => {
            statusText.innerText = "Online. Buscando salas...";
            // Anuncia a própria presença para mapear salas existentes
            sendPacket("ping_rooms", { sender: myId });
        });

        socket.on("join_error", (err) => {
            statusText.innerText = "Erro: " + err.error;
        });

        function sendPacket(type, data) {
            socket.emit("RemoteEvent", { type, data, room: currentRoom, sender: myId });
        }

        socket.on("RemoteEvent", (packet) => {
            if (!packet.type) return;

            // Mapeamento de descoberta de salas ativas
            if (packet.type === "ping_rooms") {
                if (isHost && currentRoom) {
                    const count = Object.keys(remotePlayers).length + 1;
                    sendPacket("pong_room", { room: currentRoom, count });
                }
            }

            if (packet.type === "pong_room" && packet.data) {
                roomPlayersCount[packet.data.room] = packet.data.count;
            }

            if (packet.room !== currentRoom) return;

            // Eventos do jogo na sala atual
            if (packet.type === "state_update") {
                const data = packet.data;
                if (data.id === myId) return;

                if (!remotePlayers[data.id]) {
                    remotePlayers[data.id] = { ...data, targetX: data.x, targetY: data.y, targetAngle: data.angle };
                } else {
                    let p = remotePlayers[data.id];
                    p.targetX = data.x;
                    p.targetY = data.y;
                    p.targetAngle = data.angle;
                    p.score = data.score;
                    p.color = data.color;
                    p.name = data.name;
                    p.trail = data.trail;
                    p.sprinting = data.sprinting;
                    p.dead = data.dead;
                    p.fadeAlpha = data.fadeAlpha;
                }
            }

            if (packet.type === "food_sync") {
                foods = packet.data;
            }

            if (packet.type === "player_died") {
                if (packet.data.id === myId && isAlive) {
                    killLocalPlayer(packet.data.wall || false);
                }
            }

            if (packet.type === "leave_room") {
                delete remotePlayers[packet.data.id];
            }
        });

        // --- Room Matchmaking ---
        function matchmakeAndSpawn() {
            let selectedRoom = null;
            // Procura sala existente com vaga
            for (let r in roomPlayersCount) {
                if (roomPlayersCount[r] < MAX_PLAYERS_PER_ROOM) {
                    selectedRoom = r;
                    break;
                }
            }

            if (!selectedRoom) {
                selectedRoom = "room_" + Math.random().toString(36).substring(2, 9);
                isHost = true;
            } else {
                isHost = false;
            }

            currentRoom = selectedRoom;
            localPlayer.name = nameInput.value.trim() || "Snake";
            localPlayer.x = Math.random() * (MAP_SIZE - 400) + 200;
            localPlayer.y = Math.random() * (MAP_SIZE - 400) + 200;
            localPlayer.score = 5;
            localPlayer.trail = [];
            localPlayer.dead = false;
            localPlayer.fadeAlpha = 1.0;
            isAlive = true;

            menuUI.style.display = "none";
            statusText.innerText = `Sala: ${currentRoom}`;

            if (isHost && foods.length === 0) {
                spawnInitialFoods();
            }
        }

        spawnBtn.addEventListener('click', matchmakeAndSpawn);

        // --- Foods Spawner ---
        function spawnInitialFoods() {
            foods = [];
            for (let i = 0; i < 200; i++) {
                addFood();
            }
        }

        function addFood(x, y, val = 1) {
            foods.push({
                x: x !== undefined ? x : Math.random() * (MAP_SIZE - 40) + 20,
                y: y !== undefined ? y : Math.random() * (MAP_SIZE - 40) + 20,
                val: val,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`
            });
        }

        setInterval(() => {
            if (isHost && isAlive) {
                if (foods.length < MAX_NATURAL_FOOD) {
                    addFood();
                    sendPacket("food_sync", foods);
                }
            }
        }, 10); // 0.01s

        // --- Controls ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') isSpacePressed = true;
            if (e.key.toLowerCase() === 'e') isEPressed = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') isSpacePressed = false;
            if (e.key.toLowerCase() === 'e') isEPressed = false;
        });

        let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        // Touch Input
        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (touchMoveId === null) {
                    touchMoveId = t.identifier;
                    touchMovePos = { x: t.clientX, y: t.clientY };
                } else if (touchSprintId === null) {
                    touchSprintId = t.identifier;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === touchMoveId) {
                    touchMovePos = { x: t.clientX, y: t.clientY };
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === touchMoveId) touchMoveId = null;
                if (t.identifier === touchSprintId) touchSprintId = null;
            }
        });

        // --- Sprint Logic Timer ---
        setInterval(() => {
            if (isAlive && localPlayer.sprinting && localPlayer.score >= 6) {
                localPlayer.score -= 1;
                // Deixa comida pra trás
                if (localPlayer.trail.length > 0) {
                    const tail = localPlayer.trail[localPlayer.trail.length - 1];
                    addFood(tail.x, tail.y, 1);
                    sendPacket("food_sync", foods);
                }
            }
        }, 300);

        // --- Game Loop ---
        let lastTime = performance.now();

        function gameLoop(now) {
            let dt = (now - lastTime) / 1000;
            lastTime = now;

            update(dt);
            render();

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            if (isAlive && !localPlayer.dead) {
                // Direção / Ângulo
                let targetX = mousePos.x;
                let targetY = mousePos.y;

                if (touchMoveId !== null) {
                    targetX = touchMovePos.x;
                    targetY = touchMovePos.y;
                }

                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2;
                const dx = targetX - screenCenterX;
                const dy = targetY - screenCenterY;

                localPlayer.targetAngle = Math.atan2(dy, dx);

                // Lerp do ângulo para rotação suave (medium speed turning)
                let diff = localPlayer.targetAngle - localPlayer.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                localPlayer.angle += diff * TURN_SPEED;

                // Checagem de sprint
                const wantsSprint = isSpacePressed || isEPressed || (touchSprintId !== null);
                localPlayer.sprinting = wantsSprint && localPlayer.score >= 6;

                // Velocidade
                let speed = 180; // base speed
                if (localPlayer.sprinting) speed *= 1.5; // +50%

                // Movimentação
                localPlayer.x += Math.cos(localPlayer.angle) * speed * dt;
                localPlayer.y += Math.sin(localPlayer.angle) * speed * dt;

                // Histórico de rastro/corpo
                localPlayer.trail.unshift({ x: localPlayer.x, y: localPlayer.y });
                const maxLength = Math.floor(localPlayer.score * 5);
                if (localPlayer.trail.length > maxLength) {
                    localPlayer.trail.pop();
                }

                // Colisão com as bordas (Parede vermelha)
                if (localPlayer.x <= 0 || localPlayer.x >= MAP_SIZE || localPlayer.y <= 0 || localPlayer.y >= MAP_SIZE) {
                    killLocalPlayer(true);
                }

                // Colisão com alimentos
                const headRadius = 12 + localPlayer.score * 0.1;
                for (let i = foods.length - 1; i >= 0; i--) {
                    let f = foods[i];
                    let dist = Math.hypot(localPlayer.x - f.x, localPlayer.y - f.y);
                    if (dist < headRadius + 6) {
                        localPlayer.score += f.val;
                        foods.splice(i, 1);
                        sendPacket("food_sync", foods);
                    }
                }

                // Colisão de cabeça com o corpo de outros jogadores
                for (let id in remotePlayers) {
                    let p = remotePlayers[id];
                    if (p.dead) continue;
                    for (let seg of p.trail) {
                        let dist = Math.hypot(localPlayer.x - seg.x, localPlayer.y - seg.y);
                        if (dist < headRadius) {
                            killLocalPlayer(false);
                            break;
                        }
                    }
                }

                // Transmissão do Estado
                sendPacket("state_update", {
                    id: myId,
                    name: localPlayer.name,
                    color: localPlayer.color,
                    x: localPlayer.x,
                    y: localPlayer.y,
                    angle: localPlayer.angle,
                    score: localPlayer.score,
                    sprinting: localPlayer.sprinting,
                    trail: localPlayer.trail,
                    dead: localPlayer.dead,
                    fadeAlpha: localPlayer.fadeAlpha
                });
            } else if (localPlayer.dead) {
                // Efeito Fade-out do jogador local morto
                if (localPlayer.fadeAlpha > 0) {
                    localPlayer.fadeAlpha -= dt * 2; // 0.5s fade out
                    if (localPlayer.fadeAlpha < 0) localPlayer.fadeAlpha = 0;
                }
            }

            // Atualização e Interpolação Linear (LERP) dos outros jogadores em tempo real
            for (let id in remotePlayers) {
                let p = remotePlayers[id];
                if (p.targetX !== undefined) {
                    p.x += (p.targetX - p.x) * 0.3; // linear lerp
                    p.y += (p.targetY - p.y) * 0.3;
                    p.angle += (p.targetAngle - p.angle) * 0.3;
                }
            }
        }

        function killLocalPlayer(hitWall) {
            if (localPlayer.dead) return;
            localPlayer.dead = true;

            // Se morreu na parede, não dropa comida. Se colidiu em jogador, vira comida.
            if (!hitWall) {
                for (let i = 0; i < localPlayer.trail.length; i += 3) {
                    let seg = localPlayer.trail[i];
                    addFood(seg.x + (Math.random() * 10 - 5), seg.y + (Math.random() * 10 - 5), 1);
                }
                sendPacket("food_sync", foods);
            }

            sendPacket("state_update", {
                id: myId,
                name: localPlayer.name,
                color: localPlayer.color,
                x: localPlayer.x,
                y: localPlayer.y,
                angle: localPlayer.angle,
                score: localPlayer.score,
                trail: localPlayer.trail,
                dead: true,
                fadeAlpha: 1.0
            });

            // Mantém POV preso por 2 segundos e retorna ao menu sem refresh
            setTimeout(() => {
                isAlive = false;
                sendPacket("leave_room", { id: myId });
                currentRoom = null;
                menuUI.style.display = "flex";
            }, 2000);
        }

        // --- Rendering ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Câmera focalizada no jogador local
            const camX = localPlayer.x - canvas.width / 2;
            const camY = localPlayer.y - canvas.height / 2;

            ctx.save();
            ctx.translate(-camX, -camY);

            // Fundo e Grade Cinza
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

            ctx.strokeStyle = "#222222";
            ctx.lineWidth = 1;
            for (let x = 0; x <= MAP_SIZE; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, MAP_SIZE);
                ctx.stroke();
            }
            for (let y = 0; y <= MAP_SIZE; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(MAP_SIZE, y);
                ctx.stroke();
            }

            // Borda Vermelha Quadrada
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

            // Desenhar Comidas
            for (let f of foods) {
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x, f.y, 4 + f.val, 0, Math.PI * 2);
                ctx.fill();
            }

            // Desenhar Cobras Remotas
            for (let id in remotePlayers) {
                drawSnake(remotePlayers[id]);
            }

            // Desenhar Cobra Local
            if (isAlive || localPlayer.dead) {
                drawSnake(localPlayer);
            }

            ctx.restore();

            // Minimapa
            renderMinimap();
        }

        function drawSnake(p) {
            if (!p.trail || p.trail.length === 0) return;
            if (p.dead && p.fadeAlpha <= 0) return;

            ctx.save();
            if (p.dead) {
                ctx.globalAlpha = p.fadeAlpha || 0.5;
            }

            const size = 10 + p.score * 0.1;

            // Corpo
            ctx.fillStyle = p.color;
            for (let i = p.trail.length - 1; i >= 0; i--) {
                let seg = p.trail[i];
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Cabeça e Olhos orientados para a direção
            const head = p.trail[0] || { x: p.x, y: p.y };
            ctx.save();
            ctx.translate(head.x, head.y);
            ctx.rotate(p.angle);

            // Olho esquerdo
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(size * 0.5, -size * 0.5, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(size * 0.65, -size * 0.5, size * 0.18, 0, Math.PI * 2);
            ctx.fill();

            // Olho direito
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(size * 0.5, size * 0.5, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(size * 0.65, size * 0.5, size * 0.18, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Nome do Jogador
            ctx.fillStyle = "#ffffff";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(p.name || "", head.x, head.y - size - 8);

            ctx.restore();
        }

        function renderMinimap() {
            mctx.clearRect(0, 0, 150, 150);
            const scale = 150 / MAP_SIZE;

            // Jogador Local
            if (isAlive && !localPlayer.dead) {
                mctx.fillStyle = localPlayer.color;
                mctx.beginPath();
                mctx.arc(localPlayer.x * scale, localPlayer.y * scale, 3, 0, Math.PI * 2);
                mctx.fill();
            }

            // Outras Cobras
            for (let id in remotePlayers) {
                let p = remotePlayers[id];
                if (!p.dead) {
                    mctx.fillStyle = p.color;
                    mctx.beginPath();
                    mctx.arc(p.x * scale, p.y * scale, 3, 0, Math.PI * 2);
                    mctx.fill();
                }
            }
        }

        // Loop Inicial
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
