<!-- WebSocket Tic-Tac-Toe Client -->
<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Tic-Tac-Toe</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background:#09090b; color:#fff; font-family:sans-serif; text-align:center; }
        .grid { display:grid; grid-template-columns:repeat(3,90px); gap:8px; justify-content:center; margin-top:20px; }
        .cell { width:90px; height:90px; background:#1e293b; display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:pointer; border-radius:8px; font-weight:bold; }
    </style>
</head>
<body>
    <h2>WebSocket Tic-Tac-Toe</h2>
    <div id="status">Connecting...</div>
    <div class="grid">
        <div class="cell" onclick="play(0)"></div><div class="cell" onclick="play(1)"></div><div class="cell" onclick="play(2)"></div>
        <div class="cell" onclick="play(3)"></div><div class="cell" onclick="play(4)"></div><div class="cell" onclick="play(5)"></div>
        <div class="cell" onclick="play(6)"></div><div class="cell" onclick="play(7)"></div><div class="cell" onclick="play(8)"></div>
    </div>
    <script>
        const key = "146cf8ce56";
        const link = "https://chest-manhattan-oval-affecting.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });
        let mySymbol = "";

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            document.getElementById("status").innerText = "Waiting for game start...";
            socket.emit("RemoteEvent", { type: "join_game" });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "board_update") {
                const cells = document.querySelectorAll(".cell");
                pkt.data.board.forEach((val, i) => cells[i].innerText = val || "");
                if (pkt.data.winner) {
                    document.getElementById("status").innerText = "Winner: " + pkt.data.winner;
                } else {
                    document.getElementById("status").innerText = "Turn: " + pkt.data.currentTurn;
                }
            }
        });

        function play(idx) {
            socket.emit("RemoteEvent", { type: "make_move", data: { idx } });
        }
    </script>
</body>
</html>
