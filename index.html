<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Online Pong (EzBridge)</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #030712;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 10px;
            text-align: center;
        }
        #score {
            font-size: 2rem;
            font-weight: bold;
        }
        #role-info {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        canvas {
            background-color: #0f172a;
            border: 2px solid #1e293b;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0 - 0</div>
        <div id="role-info">Conectando...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const KEY = "146cf8ce56";
        const TUNNEL_URL = "https://powder-gratuit-tunes-bread.trycloudflare.com";

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const roleEl = document.getElementById("role-info");

        // Ajuste de tamanho dinâmico para telas mobile/PC
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth - 20, 800);
            canvas.width = maxW;
            canvas.height = maxW * 0.6;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        let myRole = 'spectator';
        let serverState = {
            p1Y: 0.5,
            p2Y: 0.5,
            ball: { x: 0.5, y: 0.5 },
            score: { p1: 0, p2: 0 }
        };

        let targetBall = { x: 0.5, y: 0.5 };
        let renderBall = { x: 0.5, y: 0.5 };

        let localPaddleY = 0.5;

// Conexão WebSocket via Socket.io
const socket = io(TUNNEL_URL, {
    transports: ['websocket']
});

socket.on('connect', () => {
    roleEl.innerText = "Conectado. Autenticando...";
    
    // Autentica na sala virtual do EzBridge
    socket.emit('join_virtual_server', { key: KEY });
    
    // Entra no jogo após autenticar
    setTimeout(() => {
        socket.emit('RemoteEvent', { type: 'join_game', data: {} });
    }, 200);
});

// O EzBridge redireciona eventos do ServerScript como 'RemoteEvent' para os clientes
socket.on('RemoteEvent', (packet) => {
    if (!packet || !packet.type) return;

    if (packet.type === 'player_assigned') {
        myRole = packet.data.role;
        if (myRole === 'p1') roleEl.innerText = "Você é o Jogador 1 (Esquerda)";
        else if (myRole === 'p2') roleEl.innerText = "Você é o Jogador 2 (Direita)";
        else roleEl.innerText = "Você é um Espectador";
    }

    if (packet.type === 'state_update') {
        serverState = packet.data;
        targetBall.x = packet.data.ball.x;
        targetBall.y = packet.data.ball.y;
        scoreEl.innerText = `${packet.data.score.p1} - ${packet.data.score.p2}`;
    }
});
        // Controles de entrada (Touch e Mouse/Teclado)
        function sendInput(yRatio) {
            if (myRole === 'spectator') return;
            localPaddleY = Math.max(0.1, Math.min(0.9, yRatio));
            socket.emit('RemoteEvent', {
                type: 'move_paddle',
                data: { y: localPaddleY }
            });
        }

        function handlePointerMove(e) {
            const rect = canvas.getBoundingClientRect();
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const yRatio = (clientY - rect.top) / rect.height;
            sendInput(yRatio);
        }

        canvas.addEventListener('mousemove', handlePointerMove);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handlePointerMove(e);
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w') sendInput(localPaddleY - 0.05);
            if (e.key === 'ArrowDown' || e.key === 's') sendInput(localPaddleY + 0.05);
        });

        // Função de interpolação Lerp
        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        // Loop de Renderização no Cliente
        function render() {
            // Suavização da bola com Lerp para mascarar latência
            renderBall.x = lerp(renderBall.x, targetBall.x, 0.3);
            renderBall.y = lerp(renderBall.y, targetBall.y, 0.3);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Linha Central
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = "#334155";
            ctx.stroke();
            ctx.setLineDash([]);

            const paddleW = canvas.width * 0.02;
            const paddleH = canvas.height * 0.2;

            // Raquete P1
            const p1Y = myRole === 'p1' ? localPaddleY : serverState.p1Y;
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(canvas.width * 0.03, p1Y * canvas.height - paddleH / 2, paddleW, paddleH);

            // Raquete P2
            const p2Y = myRole === 'p2' ? localPaddleY : serverState.p2Y;
            ctx.fillStyle = "#f43f5e";
            ctx.fillRect(canvas.width * 0.95 - paddleW, p2Y * canvas.height - paddleH / 2, paddleW, paddleH);

            // Bola (Network ownership total do servidor)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(renderBall.x * canvas.width, renderBall.y * canvas.height, canvas.width * 0.012, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
