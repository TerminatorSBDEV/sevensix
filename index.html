<!DOCTYPE html>
<html>
<head>
    <title>Authoritative Tic-Tac-Toe</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h2 id="status">Connecting to Host...</h2>
    <div id="board"></div>

    <script>
        const socket = io("https://incorporate-dude-elimination-engines.trycloudflare.com");
        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key: "ec5f7a2dde" });
        });

        // Clique no tabuleiro de forma simples (O processamento e validação de turnos rodam no ServerScript)
        function makeMove(idx) {
            socket.emit("RemoteEvent", { type: "player_move", cellIndex: idx });
        }

        socket.on("RemoteEvent", (packet) => {
            if (packet.type === "board_update") {
                renderBoard(packet.board);
                document.getElementById("status").innerText = "Turn: " + packet.turnSymbol;
            }
            if (packet.type === "game_over") {
                alert("Winner is: " + packet.winner);
            }
        });
    </script>
</body>
</html>
