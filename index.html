<!DOCTYPE html>
<html>
<head>
    <title>Random Number Generator (HTTP)</title>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; user-select: none; }
        button { padding: 15px 30px; font-size: 1.5rem; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; touch-action: manipulation; }
        button:active { background: #2563eb; }
        #result { margin-top: 20px; font-size: 2rem; font-weight: bold; }
        #status { margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>
    <button id="generateBtn">Generate Number</button>
    <div id="result">-</div>
    <div id="status">Ready</div>

    <script>
        const link = "https://anyway-accessory-initiated-creating.trycloudflare.com/remote";
        const key = "146cf8ce56";

        document.getElementById("generateBtn").addEventListener("click", async () => {
            document.getElementById("status").innerText = "Generating...";
            try {
                const response = await fetch(link, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "auth-token": key },
                    body: JSON.stringify({ type: "request_number" })
                });
                
                const result = await response.json();
                if (result && result.number) {
                    document.getElementById("result").innerText = result.number;
                    document.getElementById("status").innerText = "Ready";
                }
            } catch (err) {
                document.getElementById("status").innerText = "Error connecting to server";
            }
        });
    </script>
</body>
</html>
