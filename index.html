<!DOCTYPE html>
<html>
<head>
    <title>Server Replication Test - Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            background: #09090b; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
        }
        #status { 
            padding: 10px; 
            font-size: 1rem; 
            background: #18181b; 
        }
        #canvas-container { 
            position: relative; 
            width: 100vw; 
            height: calc(100vh - 45px); 
            background: #121214; 
            cursor: crosshair; 
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div id="status">Connecting to EzBridge...</div>
    <div id="canvas-container">
        <canvas id="testCanvas"></canvas>
    </div>

    <script>
        const key = "146cf8ce56";
        const link = "https://beijing-accessories-grounds-field.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });

        const canvas = document.getElementById("testCanvas");
        const ctx = canvas.getContext("2d");
        const statusEl = document.getElementById("status");

        let isDragging = false;
        let mouseX = 0;
        let mouseY = 0;
        
        // Dictionary to store all players' server positions: { senderId: { x, y } }
        let serverPositions = {};

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            statusEl.innerText = "Connected! Drag anywhere to test multiplayer latency.";
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "positions_update") {
                serverPositions = pkt.data;
            }
        });

        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrag(e) {
            isDragging = true;
            const pos = getEventPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
        }

        function moveDrag(e) {
            if (!isDragging) return;
            const pos = getEventPos(e);
            mouseX = pos.x;
            mouseY = pos.y;

            socket.emit("RemoteEvent", {
                type: "update_position",
                data: { x: mouseX, y: mouseY }
            });
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            socket.emit("RemoteEvent", {
                type: "update_position",
                data: { x: null, y: null }
            });
        }

        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => { startDrag(e); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { moveDrag(e); e.preventDefault(); });
        window.addEventListener('touchend', (e) => { endDrag(); e.preventDefault(); });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Render local user's active drag (50% transparent white circle)
            if (isDragging) {
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 30, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                ctx.fill();
            }

            // 2. Render all replicated server positions for everyone (yellow circles)
            for (let id in serverPositions) {
                const pos = serverPositions[id];
                if (pos && pos.x !== null && pos.y !== null) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
                    ctx.fillStyle = "yellow";
                    ctx.fill();
                }
            }

            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
