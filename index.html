<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Html snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #menuUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .menu-card {
            background: #121214;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }
        .menu-card h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #1e1e24;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .color-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        .color-row input[type="range"] {
            flex: 1;
        }
        .color-preview {
            width: 100%;
            height: 20px;
            border-radius: 4px;
            margin-top: 8px;
            border: 1px solid #555;
        }
        button.btn-spawn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #28a745;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.btn-spawn:hover {
            background: #218838;
        }
        #serverTestDisplay {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00e1ff;
            min-height: 25px;
        }
        #statusText {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 5;
            font-size: 0.9rem;
            color: #00ff88;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="statusText">Conectando...</div>

    <div id="menuUI">
        <div class="menu-card">
            <h1>Html snakes</h1>
            <div class="form-group">
                <label for="pName">Nome de jogador:</label>
                <input type="text" id="pName" maxlength="10" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Cor da sua cobra:</label>
                <div class="color-sliders">
                    <div class="color-row">
                        <span>Vermelho:</span>
                        <input type="range" id="rColor" min="0" max="255" value="128">
                        <span id="rVal">50%</span>
                    </div>
                    <div class="color-row">
                        <span>Verde:</span>
                        <input type="range" id="gColor" min="0" max="255" value="128">
                        <span id="gVal">50%</span>
                    </div>
                    <div class="color-row">
                        <span>Azul:</span>
                        <input type="range" id="bColor" min="0" max="255" value="128">
                        <span id="bVal">50%</span>
                    </div>
                </div>
                <div class="color-preview" id="colorPreview"></div>
            </div>
            <button class="btn-spawn" id="spawnBtn">Surgir</button>

            <!-- MOSTRADOR DO NÚMERO DE TESTE DO SERVIDOR -->
            <div id="serverTestDisplay">Pressione 'E' para testar ServerScript</div>
        </div>
    </div>

    <script>
        const SERVER_KEY = "146cf8ce56";
        const SERVER_LINK = "https://chest-manhattan-oval-affecting.trycloudflare.com";

        const menuUI = document.getElementById('menuUI');
        const statusText = document.getElementById('statusText');
        const testDisplay = document.getElementById('serverTestDisplay');

        const rInput = document.getElementById('rColor');
        const gInput = document.getElementById('gColor');
        const bInput = document.getElementById('bColor');
        const rVal = document.getElementById('rVal');
        const gVal = document.getElementById('gVal');
        const bVal = document.getElementById('bVal');
        const colorPreview = document.getElementById('colorPreview');

        let socket = null;
        let testTimeout = null;

        function updateColorPreview() {
            const r = parseInt(rInput.value);
            const g = parseInt(gInput.value);
            const b = parseInt(bInput.value);
            rVal.innerText = Math.round((r / 255) * 100) + '%';
            gVal.innerText = Math.round((g / 255) * 100) + '%';
            bVal.innerText = Math.round((b / 255) * 100) + '%';
            colorPreview.style.backgroundColor = `rgb(${r},${g},${b})`;
        }

        rInput.addEventListener('input', updateColorPreview);
        gInput.addEventListener('input', updateColorPreview);
        bInput.addEventListener('input', updateColorPreview);
        updateColorPreview();

        // WebSocket Setup
        socket = io(SERVER_LINK, { auth: { token: SERVER_KEY } });

        socket.on("connect", () => {
            statusText.innerText = "Conectado. Autenticando...";
            socket.emit("join_virtual_server", { key: SERVER_KEY });
        });

        socket.on("joined_successfully", () => {
            statusText.innerText = "Online. Pressione E no menu para testar.";
        });

        // Escutando eventos do servidor EzBridge
        socket.on("RemoteEvent", (packet) => {
            if (packet.type === "random_number_response") {
                testDisplay.innerText = "Número do Servidor: " + packet.data.number;
                
                if (testTimeout) clearTimeout(testTimeout);
                testTimeout = setTimeout(() => {
                    testDisplay.innerText = "Pressione 'E' para testar ServerScript";
                }, 3000);
            }
        });

        // Captura da tecla E no menu
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'e') {
                if (menuUI.style.display !== "none") {
                    testDisplay.innerText = "Solicitando ao servidor...";
                    socket.emit("RemoteEvent", {
                        type: "request_random_number",
                        data: {}
                    });
                }
            }
        });
    </script>
</body>
</html>
