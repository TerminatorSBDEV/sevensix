<!-- === CLIENTE MULTIPLAYER (index.html) === -->
<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Hybrid</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #0c0c0e; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1e1e24; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Tic-Tac-Toe</h2>
    <div id="status">Connecting...</div>
    <div class="grid">
        <div class="cell" onclick="triggerMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <script>
        const socket = io("https://responsibility-mike-borders-phones.trycloudflare.com");
        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key: "d5b39a94cf" });
        });
        socket.on("joined_successfully", () => {
            document.getElementById("status").innerText = "Aguardando início...";
        });
        socket.on("RemoteEvent", (packet) => {
            if (packet.type === "board_update") {
                const cells = document.querySelectorAll(".cell");
                packet.board.forEach((val, i) => cells[i].innerText = val || "");
                document.getElementById("status").innerText = packet.msg;
            }
        });
        function triggerMove(idx) {
            // Apenas envia a solicitação do clique. A validação real é feita do lado do Servidor!
            socket.emit("RemoteEvent", { type: "client_move_request", index: idx });
        }
    </script>
</body>
</html>
