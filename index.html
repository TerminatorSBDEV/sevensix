<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Termux Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }
        #status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            min-height: 2rem;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
        }
        .cell {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            /* Prevents zoom/double-tap delays on mobile touchscreens */
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }
        .cell:active {
            background-color: #2a2a2a;
        }
        .cell.X { color: #3498db; }
        .cell.O { color: #e74c3c; }
    </style>
</head>
<body>

    <div id="status">Connecting to server...</div>
    <div id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <script>
        // Use the secure WebSocket protocol (wss) for Cloudflare tunnels
        const wsUrl = "wss://misc-removing-sharon-prozac.trycloudflare.com";
        const socket = new WebSocket(wsUrl);

        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');
        
        let playerSymbol = null;
        let isMyTurn = false;

        socket.onopen = () => {
            statusDisplay.innerText = "Connected! Waiting for opponent...";
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'init') {
                playerSymbol = data.symbol;
                statusDisplay.innerText = `You are Player ${playerSymbol}. Waiting for match...`;
            }

            if (data.type === 'start') {
                isMyTurn = data.turn === playerSymbol;
                statusDisplay.innerText = isMyTurn ? "Your turn!" : "Opponent's turn...";
                updateBoard(data.board);
            }

            if (data.type === 'update') {
                isMyTurn = data.turn === playerSymbol;
                statusDisplay.innerText = isMyTurn ? "Your turn!" : "Opponent's turn...";
                updateBoard(data.board);
            }

            if (data.type === 'gameover') {
                updateBoard(data.board);
                if (data.winner === 'Draw') {
                    statusDisplay.innerText = "It's a Draw! Refresh to play again.";
                } else {
                    statusDisplay.innerText = data.winner === playerSymbol ? "You Win!" : "You Lose!";
                }
                isMyTurn = false;
                socket.close();
            }

            if (data.type === 'opponent_disconnected') {
                statusDisplay.innerText = "Opponent disconnected. Refresh to restart.";
                isMyTurn = false;
            }
        };

        socket.onerror = (error) => {
            statusDisplay.innerText = "Connection error.";
            console.error(error);
        };

        socket.onclose = () => {
            if (statusDisplay.innerText !== "Opponent disconnected. Refresh to restart." && !statusDisplay.innerText.includes("Win")) {
                statusDisplay.innerText = "Disconnected from server.";
            }
        };

        function updateBoard(boardState) {
            cells.forEach((cell, index) => {
                cell.innerText = boardState[index];
                cell.className = `cell ${boardState[index]}`;
            });
        }

        // Handle touchscreen taps / clicks
        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');
                
                if (!isMyTurn || cell.innerText !== '') {
                    return; 
                }

                // Send the move to the server
                socket.send(JSON.stringify({
                    type: 'move',
                    index: parseInt(index)
                }));
            });
        });
    </script>
</body>
</html>
