<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HTML Snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: #fff; }
        
        #gameCanvas { width: 100vw; height: 100vh; display: block; }

        /* HUD & UI */
        #menuUI {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95); padding: 25px; border-radius: 12px;
            width: 320px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #menuUI h1 { margin-bottom: 15px; font-size: 1.8rem; color: #38bdf8; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        .input-group input[type="text"] {
            width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155;
            color: #fff; border-radius: 6px; outline: none; font-size: 1rem;
        }
        .color-sliders { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .slider-row input { width: 60%; }

        button {
            width: 100%; padding: 12px; background: #22c55e; border: none; color: #fff;
            font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:disabled { background: #475569; cursor: not-allowed; }

        #progressBarContainer {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px; background: #1e293b; border-radius: 10px; padding: 4px;
            border: 1px solid #334155; display: none; z-index: 10;
        }
        #progressBar { height: 12px; background: #38bdf8; border-radius: 8px; width: 0%; transition: width 0.3s; }
        #progressText { font-size: 0.75rem; text-align: center; margin-top: 4px; color: #94a3b8; }

        #logs {
            margin-top: 15px; background: #020617; font-family: monospace; font-size: 0.75rem;
            color: #22c55e; padding: 8px; height: 80px; overflow-y: auto; text-align: left;
            border-radius: 4px; border: 1px solid #1e293b;
        }

        #radar {
            position: absolute; bottom: 20px; right: 20px; width: 120px; height: 120px;
            background: rgba(15, 23, 42, 0.7); border: 2px solid #334155; border-radius: 8px;
            display: none; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="progressBarContainer">
        <div id="progressBar"></div>
        <div id="progressText">Gerando Mapa... 0%</div>
    </div>

    <div id="menuUI">
        <h1>Html snakes</h1>
        <div class="input-group">
            <label>Nome do jogador (Max 10):</label>
            <input type="text" id="playerName" maxlength="10" value="Snake">
        </div>
        <div class="color-sliders">
            <div class="slider-row"><span>Vermelho:</span> <input type="range" id="rColor" min="0" max="255" value="128"><span id="rVal">50%</span></div>
            <div class="slider-row"><span>Verde:</span> <input type="range" id="gColor" min="0" max="255" value="128"><span id="gVal">50%</span></div>
            <div class="slider-row"><span>Azul:</span> <input type="range" id="bColor" min="0" max="255" value="128"><span id="bVal">50%</span></div>
        </div>
        <button id="btnSpawn" onclick="requestSpawn()">Surgir</button>
        <div id="logs">> Conectando ao servidor...</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <canvas id="radar"></canvas>

    <script>
        const key = "146cf8ce56";
        const link = "https://vegetarian-aim-ability-almost.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const radarCanvas = document.getElementById("radar");
        const radarCtx = radarCanvas.getContext("2d");

        let myId = null;
        let gameState = { snakes: {}, foods: [], mapSize: 3000, mapReady: false };
        let interpolatedSnakes = {}; 
        let camera = { x: 0, y: 0 };
        let isSpawning = false;
        let spawnPollInterval = null;

        // Controles Touch/Teclado
        let inputAngle = 0;
        let isBoosting = false;
        let touchStartPos = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radarCanvas.width = 120;
            radarCanvas.height = 120;
        }
        window.addEventListener("resize", resize);
        resize();

        function addLog(msg) {
            const logs = document.getElementById("logs");
            logs.innerHTML += `<div>> ${msg}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        // Sliders de Cor
        ['r', 'g', 'b'].forEach(c => {
            const el = document.getElementById(`${c}Color`);
            el.addEventListener('input', () => {
                document.getElementById(`${c}Val`).innerText = Math.round((el.value / 255) * 100) + "%";
            });
        });

        // Conexão EzBridge
        socket.on("connect", () => {
            addLog("Socket conectado!");
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            addLog("Entrou no servidor virtual!");
            socket.emit("RemoteEvent", { type: "ebuserid_get" });
            socket.emit("RemoteEvent", { type: "check_map_status" });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "ebuserid_get_res") {
                myId = pkt.data.userId;
            }

            if (pkt.type === "map_progress") {
                const pContainer = document.getElementById("progressBarContainer");
                const pBar = document.getElementById("progressBar");
                const pText = document.getElementById("progressText");
                const btn = document.getElementById("btnSpawn");

                pContainer.style.display = "block";
                pBar.style.width = pkt.data.progress + "%";
                pText.innerText = `Gerando Mapa (${pkt.data.created}/${pkt.data.total})... ${pkt.data.progress}%`;

                if (pkt.data.ready) {
                    pContainer.style.display = "none";
                    gameState.mapReady = true;
                    if (!isSpawning) btn.disabled = false;
                } else {
                    btn.disabled = true;
                }
            }

            if (pkt.type === "spawn_status") {
                addLog(`Status: ${pkt.data.msg}`);
                if (pkt.data.status === "ready") {
                    clearInterval(spawnPollInterval);
                    document.getElementById("menuUI").style.display = "none";
                    document.getElementById("radar").style.display = "block";
                    isSpawning = false;
                }
            }

            if (pkt.type === "state_update") {
                gameState = pkt.data;
                // Inicializa / limpa lerp das cobras
                for (let id in gameState.snakes) {
                    const s = gameState.snakes[id];
                    if (!interpolatedSnakes[id]) {
                        interpolatedSnakes[id] = JSON.parse(JSON.stringify(s));
                    }
                }
            }

            if (pkt.type === "player_died" && pkt.data.id === myId) {
                setTimeout(() => {
                    document.getElementById("menuUI").style.display = "block";
                    document.getElementById("radar").style.display = "none";
                    document.getElementById("btnSpawn").disabled = false;
                }, 2000);
            }
        });

        function requestSpawn() {
            if (!gameState.mapReady) return;
            isSpawning = true;
            document.getElementById("btnSpawn").disabled = true;

            const name = document.getElementById("playerName").value.substring(0, 10) || "Snake";
            const color = `rgb(${document.getElementById("rColor").value},${document.getElementById("gColor").value},${document.getElementById("bColor").value})`;

            addLog("Enviando requisição de spawn...");
            socket.emit("RemoteEvent", { type: "request_spawn", data: { name, color } });

            // Polling de verificação a cada 1s
            if (spawnPollInterval) clearInterval(spawnPollInterval);
            spawnPollInterval = setInterval(() => {
                socket.emit("RemoteEvent", { type: "poll_spawn_status" });
            }, 1000);
        }

        // --- Controles ---
        let keys = {};
        window.addEventListener("keydown", (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.code === "Space" || e.key.toLowerCase() === "e") isBoosting = true;
            updateInputAngle();
        });
        window.addEventListener("keyup", (e) => {
            keys[e.key.toLowerCase()] = false;
            if (e.code === "Space" || e.key.toLowerCase() === "e") isBoosting = false;
            updateInputAngle();
        });

        function updateInputAngle() {
            let dx = 0, dy = 0;
            if (keys["w"] || keys["arrowup"]) dy -= 1;
            if (keys["s"] || keys["arrowdown"]) dy += 1;
            if (keys["a"] || keys["arrowleft"]) dx -= 1;
            if (keys["d"] || keys["arrowright"]) dx += 1;

            if (dx !== 0 || dy !== 0) {
                inputAngle = Math.atan2(dy, dx);
                sendInput();
            }
        }

        // Celular & Mouse
        window.addEventListener("pointerdown", (e) => {
            if (document.getElementById("menuUI").style.display !== "none") return;
            if (e.pointerType === "touch" && e.isPrimary === false) {
                isBoosting = true;
            } else {
                handlePointerMove(e);
            }
        });

        window.addEventListener("pointermove", (e) => {
            if (document.getElementById("menuUI").style.display !== "none") return;
            if (e.isPrimary) handlePointerMove(e);
        });

        window.addEventListener("pointerup", (e) => {
            if (!e.isPrimary) isBoosting = false;
        });

        function handlePointerMove(e) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            inputAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            sendInput();
        }

        function sendInput() {
            if (document.getElementById("menuUI").style.display === "none") {
                socket.emit("RemoteEvent", { type: "player_input", data: { angle: inputAngle, boosting: isBoosting } });
            }
        }

        // --- Loop de Renderização & LERP ---
        let lastTime = performance.now();
        function gameLoop() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Interpolador Linear (LERP)
            for (let id in gameState.snakes) {
                const target = gameState.snakes[id];
                if (!interpolatedSnakes[id]) continue;

                let curr = interpolatedSnakes[id];
                curr.alpha = target.alpha; // Para Fade out
                curr.angle = target.angle;

                // Garante array de segmentos
                while (curr.body.length < target.body.length) curr.body.push({ ...target.body[0] });
                while (curr.body.length > target.body.length) curr.body.pop();

                // LERP nos segmentos
                for (let i = 0; i < target.body.length; i++) {
                    curr.body[i].x += (target.body[i].x - curr.body[i].x) * 15 * dt;
                    curr.body[i].y += (target.body[i].y - curr.body[i].y) * 15 * dt;
                }
            }

            // Atualiza câmera no jogador
            if (myId && interpolatedSnakes[myId] && interpolatedSnakes[myId].alpha > 0) {
                const myHead = interpolatedSnakes[myId].body[0];
                camera.x = myHead.x - canvas.width / 2;
                camera.y = myHead.y - canvas.height / 2;
            }

            render();
            renderRadar();
            requestAnimationFrame(gameLoop);
        }

        function render() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Grade Cinza
            const gridSize = 100;
            const mapSize = gameState.mapSize;
            ctx.strokeStyle = "#1a1a1a";
            ctx.lineWidth = 1;

            for (let x = 0; x <= mapSize; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, mapSize); ctx.stroke();
            }
            for (let y = 0; y <= mapSize; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(mapSize, y); ctx.stroke();
            }

            // Borda Vermelha Quadrada
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, mapSize, mapSize);

            // Bolas de Comida
            for (let food of gameState.foods) {
                ctx.fillStyle = food.color || "#00ffcc";
                ctx.beginPath();
                ctx.arc(food.x, food.y, food.size || 5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Cobras
            for (let id in interpolatedSnakes) {
                const snake = interpolatedSnakes[id];
                if (snake.alpha <= 0) continue;

                ctx.globalAlpha = snake.alpha;
                const radius = 12 + (snake.score * 0.1);

                // Desenha Corpo
                for (let i = snake.body.length - 1; i >= 0; i--) {
                    const seg = snake.body[i];
                    ctx.fillStyle = snake.color;
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Desenha Cabeça e Olhos
                const head = snake.body[0];
                ctx.fillStyle = snake.color;
                ctx.beginPath();
                ctx.arc(head.x, head.y, radius, 0, Math.PI * 2);
                ctx.fill();

                // Olhos focados no ângulo de movimento
                const eyeOffset = radius * 0.5;
                const eyeRadius = radius * 0.3;
                const pupilRadius = radius * 0.15;

                const leftEyeX = head.x + Math.cos(snake.angle - 0.5) * eyeOffset;
                const leftEyeY = head.y + Math.sin(snake.angle - 0.5) * eyeOffset;
                const rightEyeX = head.x + Math.cos(snake.angle + 0.5) * eyeOffset;
                const rightEyeY = head.y + Math.sin(snake.angle + 0.5) * eyeOffset;

                // Esclera
                ctx.fillStyle = "#ffffff";
                ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, eyeRadius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, eyeRadius, 0, Math.PI * 2); ctx.fill();

                // Pupila
                ctx.fillStyle = "#000000";
                ctx.beginPath(); ctx.arc(leftEyeX + Math.cos(snake.angle) * 2, leftEyeY + Math.sin(snake.angle) * 2, pupilRadius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(rightEyeX + Math.cos(snake.angle) * 2, rightEyeY + Math.sin(snake.angle) * 2, pupilRadius, 0, Math.PI * 2); ctx.fill();

                // Nome do Jogador
                ctx.fillStyle = "#ffffff";
                ctx.font = "12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(snake.name, head.x, head.y - radius - 8);
            }

            ctx.restore();
        }

        function renderRadar() {
            radarCtx.clearRect(0, 0, 120, 120);
            const scale = 120 / gameState.mapSize;

            for (let id in gameState.snakes) {
                const s = gameState.snakes[id];
                if (s.alpha <= 0) continue;
                const head = s.body[0];

                radarCtx.fillStyle = s.color;
                radarCtx.beginPath();
                radarCtx.arc(head.x * scale, head.y * scale, 3, 0, Math.PI * 2);
                radarCtx.fill();
            }
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
