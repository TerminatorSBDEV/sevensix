<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Client</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #0c0c0e; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1e1e24; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 8px; }
        #status { font-weight: bold; margin-top: 20px; color: #00ff88; }
    </style>
</head>
<body>
    <h2>Tic-Tac-Toe (Client)</h2>
    <div id="status">Connecting...</div>
    <div class="grid">
        <div class="cell" onclick="clickCell(0)"></div>
        <div class="cell" onclick="clickCell(1)"></div>
        <div class="cell" onclick="clickCell(2)"></div>
        <div class="cell" onclick="clickCell(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="clickCell(5)"></div>
        <div class="cell" onclick="clickCell(6)"></div>
        <div class="cell" onclick="clickCell(7)"></div>
        <div class="cell" onclick="clickCell(8)"></div>
    </div>

    <script>
        const key = "d5b39a94cf";
        const link = "https://passenger-intend-bite-jeremy.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });
        let mySymbol = "";
        let isMyTurn = false;

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Connecting...";
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            // Avisa o ServerScript que entramos na partida
            socket.emit("RemoteEvent", { type: "player_join" });
        });

        socket.on("RemoteEvent", (packet) => {
            // Renderiza atualização vinda do processamento do ServerScript
            if (packet.type === "init") {
                mySymbol = packet.symbol;
                isMyTurn = packet.turn;
                document.getElementById("status").innerText = isMyTurn ? "Your Turn (" + mySymbol + ")" : "Opponent's Turn...";
            }
            if (packet.type === "update") {
                const cells = document.querySelectorAll(".cell");
                packet.board.forEach((val, idx) => { cells[idx].innerText = val || ""; });
                isMyTurn = packet.turn;
                
                if (packet.winner) {
                    document.getElementById("status").innerText = packet.winner === "T" ? "Draw!" : "Winner: " + packet.winner;
                    isMyTurn = false;
                } else {
                    document.getElementById("status").innerText = isMyTurn ? "Your Turn (" + mySymbol + ")" : "Opponent's Turn...";
                }
            }
        });

        function clickCell(idx) {
            if (!isMyTurn) return;
            // O cliente apenas solicita uma interação bruta, o ServerScript valida
            socket.emit("RemoteEvent", { type: "client_click", index: idx, actionType: "interaction", isValidatedAction: true });
        }
    </script>
</body>
</html>
