<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezbridge Test | Online Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --text: #c9d1d9;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 90%;
            max-width: 400px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px;
            background: #21262d;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff7b72;
        }

        .dot.online {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
        }

        .messages-log {
            height: 300px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .msg {
            padding: 8px 12px;
            border-radius: 6px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg.me {
            align-self: flex-end;
            background: #238636;
            color: white;
        }

        .msg.other {
            align-self: flex-start;
            background: #30363d;
            color: var(--text);
        }

        .msg .username {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .input-bar {
            display: flex;
            padding: 10px;
            background: #0d1117;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            background: #010409;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        button:hover {
            background: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <span style="font-weight: bold;">Ezbridge Chat</span>
            <div class="status">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Offline</span>
            </div>
        </div>
        
        <div class="messages-log" id="log">
            <div class="msg other">
                <div class="username">System</div>
                Insira seu apelido abaixo para começar.
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="user-input" placeholder="Seu apelido..." autocomplete="off">
            <button id="action-btn" onclick="handleAction()">Join</button>
        </div>
    </div>

<script>
    // --- CONFIGURAÇÃO ATUALIZADA ---
    const TUNNEL = "https://packard-breathing-driver-occupational.trycloudflare.com";
    const AUTH_KEY = "2NXLpBxX9";

    const socket = io(TUNNEL, { auth: { token: AUTH_KEY } });
    
    let username = "";
    const log = document.getElementById('log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('action-btn');
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    // --- SOCKET EVENTS ---
    socket.on('connect', () => {
        dot.classList.add('online');
        statusText.innerText = "Online";
    });

    socket.on('connect_error', (err) => {
        dot.classList.remove('online');
        statusText.innerText = "Error";
        console.error(err);
    });

    socket.on('RemoteEvent', (packet) => {
        if (packet.type === 'chat') {
            appendMessage(packet.user, packet.text, false);
        }
    });

    // --- CHAT LOGIC ---
    function handleAction() {
        if (!username) {
            const val = input.value.trim();
            if (!val) return;
            username = val;
            input.value = "";
            input.placeholder = "Escreva uma mensagem...";
            btn.innerText = "Send";
            appendMessage("System", `Você entrou como "${username}"`, false);
        } else {
            sendMsg();
        }
    }

    function sendMsg() {
        const text = input.value.trim();
        if (!text) return;

        appendMessage(username, text, true);
        
        socket.emit('RemoteEvent', {
            type: 'chat',
            user: username,
            text: text
        });

        input.value = "";
    }

    function appendMessage(user, text, isMe) {
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'other'}`;
        
        div.innerHTML = `
            <div class="username">${user}</div>
            <div>${text}</div>
        `;
        
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    // Tecla Enter para facilitar o envio
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleAction();
    });
</script>
</body>
</html>
