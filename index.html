<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Html snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* UI Overlay */
        #progress-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            background: rgba(30, 30, 30, 0.8);
            border: 2px solid #555;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }
        #progress-bar-bg {
            width: 100%;
            height: 16px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00ff66;
            transition: width 0.3s linear;
        }
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #333;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 20;
        }
        #menu h1 {
            text-align: center;
            font-size: 24px;
            color: #fff;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-size: 14px;
            color: #ccc;
        }
        .input-group input[type="text"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            outline: none;
        }
        .color-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
        .slider-row input {
            width: 60%;
        }
        #btn-spawn {
            padding: 10px;
            background: #0088ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        #btn-spawn:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="progress-container">
        <span id="progress-text" style="font-size: 12px; color: #fff;">Criando mapa... (0%)</span>
        <div id="progress-bar-bg">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="menu">
        <h1>Html snakes</h1>
        <div class="input-group">
            <label for="player-name">Nome de jogador:</label>
            <input type="text" id="player-name" maxlength="10" placeholder="Seu nome">
        </div>
        <div class="color-sliders">
            <label>Cor da sua cobra:</label>
            <div class="slider-row">
                <span style="color:#ff5555;">Vermelho: <span id="val-r">50</span>%</span>
                <input type="range" id="slider-r" min="0" max="100" value="50">
            </div>
            <div class="slider-row">
                <span style="color:#55ff55;">Verde: <span id="val-g">50</span>%</span>
                <input type="range" id="slider-g" min="0" max="100" value="50">
            </div>
            <div class="slider-row">
                <span style="color:#5555ff;">Azul: <span id="val-b">50</span>%</span>
                <input type="range" id="slider-b" min="0" max="100" value="50">
            </div>
        </div>
        <button id="btn-spawn" disabled>Surgir</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const MAP_SIZE = 4000;
        const GRID_SIZE = 50;
        const KEY = "146cf8ce56";
        const LINK = "https://vegetarian-aim-ability-almost.trycloudflare.com";

        const socket = io(LINK, { auth: { token: "default_key" } });

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const progressContainer = document.getElementById("progress-container");
        const progressBar = document.getElementById("progress-bar");
        const progressText = document.getElementById("progress-text");
        const menu = document.getElementById("menu");
        const btnSpawn = document.getElementById("btn-spawn");

        const inputName = document.getElementById("player-name");
        const sliderR = document.getElementById("slider-r");
        const sliderG = document.getElementById("slider-g");
        const sliderB = document.getElementById("slider-b");
        const valR = document.getElementById("val-r");
        const valG = document.getElementById("val-g");
        const valB = document.getElementById("val-b");

        let mapReady = false;
        let myId = null;
        let isAlive = false;

        let playersData = {};
        let foodsData = {};

        let localSnake = {
            x: 0,
            y: 0,
            angle: 0,
            score: 5,
            body: [],
            isSprinting: false,
            color: "rgb(127,127,127)"
        };

        let keys = {};
        let mousePos = { x: 0, y: 0 };
        let activeTouches = 0;
        let touchTargetAngle = 0;
        let isMobile = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        sliderR.oninput = () => valR.innerText = sliderR.value;
        sliderG.oninput = () => valG.innerText = sliderG.value;
        sliderB.oninput = () => valB.innerText = sliderB.value;

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key: KEY });
        });

        socket.on("joined_successfully", () => {
            myId = socket.id;
            socket.emit("RemoteEvent", { type: "join_game" });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "map_progress") {
                const p = pkt.data.progress;
                progressBar.style.width = p + "%";
                progressText.innerText = `Criando mapa... (${p}%)`;
                if (p >= 100) {
                    mapReady = true;
                    btnSpawn.disabled = false;
                    progressContainer.style.display = "none";
                }
            } else if (pkt.type === "game_state") {
                foodsData = pkt.data.foods;
                const remotePlayers = pkt.data.players;

                for (let id in remotePlayers) {
                    if (id === socket.id) continue;
                    if (!playersData[id]) {
                        playersData[id] = remotePlayers[id];
                        playersData[id].renderX = remotePlayers[id].x;
                        playersData[id].renderY = remotePlayers[id].y;
                        playersData[id].renderAngle = remotePlayers[id].angle;
                    } else {
                        const target = remotePlayers[id];
                        playersData[id].name = target.name;
                        playersData[id].color = target.color;
                        playersData[id].score = target.score;
                        playersData[id].body = target.body;
                        playersData[id].isAlive = target.isAlive;
                        playersData[id].dying = target.dying;
                        playersData[id].fadeAlpha = target.fadeAlpha;

                        // Linear LERP para suavizar movimento da rede
                        playersData[id].renderX += (target.x - playersData[id].renderX) * 0.3;
                        playersData[id].renderY += (target.y - playersData[id].renderY) * 0.3;
                        
                        let diff = target.angle - playersData[id].renderAngle;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        playersData[id].renderAngle += diff * 0.3;
                    }
                }

                for (let id in playersData) {
                    if (!remotePlayers[id]) {
                        delete playersData[id];
                    }
                }

                if (isAlive && remotePlayers[socket.id]) {
                    if (!remotePlayers[socket.id].isAlive && !remotePlayers[socket.id].dying) {
                        isAlive = false;
                        setTimeout(() => {
                            menu.style.display = "flex";
                        }, 2000);
                    }
                }
            }
        });

        btnSpawn.onclick = () => {
            if (!mapReady) return;
            const name = inputName.value.trim() || "Player";
            const r = Math.round((sliderR.value / 100) * 255);
            const g = Math.round((sliderG.value / 100) * 255);
            const b = Math.round((sliderB.value / 100) * 255);
            const color = `rgb(${r},${g},${b})`;

            localSnake.x = Math.random() * (MAP_SIZE - 200) - (MAP_SIZE / 2 - 100);
            localSnake.y = Math.random() * (MAP_SIZE - 200) - (MAP_SIZE / 2 - 100);
            localSnake.score = 5;
            localSnake.color = color;
            localSnake.angle = 0;
            localSnake.body = [];

            isAlive = true;
            menu.style.display = "none";

            socket.emit("RemoteEvent", {
                type: "spawn",
                data: {
                    name: name,
                    color: color,
                    x: localSnake.x,
                    y: localSnake.y
                }
            });
        };

        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });
        window.addEventListener("mousemove", (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener("touchstart", (e) => {
            isMobile = true;
            activeTouches = e.touches.length;
            updateTouchAngle(e.touches[0]);
        }, { passive: false });

        window.addEventListener("touchmove", (e) => {
            isMobile = true;
            activeTouches = e.touches.length;
            updateTouchAngle(e.touches[0]);
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            activeTouches = e.touches.length;
        });

        function updateTouchAngle(touch) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            touchTargetAngle = Math.atan2(touch.clientY - cy, touch.clientX - cx);
        }

        let lastSprintConsume = 0;

        function updateLocalGame() {
            if (!isAlive) return;

            let targetAngle = localSnake.angle;

            if (isMobile) {
                targetAngle = touchTargetAngle;
                localSnake.isSprinting = activeTouches >= 2 && localSnake.score >= 6;
            } else {
                let dx = 0;
                let dy = 0;
                if (keys["w"] || keys["arrowup"]) dy -= 1;
                if (keys["s"] || keys["arrowdown"]) dy += 1;
                if (keys["a"] || keys["arrowleft"]) dx -= 1;
                if (keys["d"] || keys["arrowright"]) dx += 1;

                if (dx !== 0 || dy !== 0) {
                    targetAngle = Math.atan2(dy, dx);
                } else {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    targetAngle = Math.atan2(mousePos.y - cy, mousePos.x - cx);
                }

                const sprintKey = keys[" "] || keys["e"];
                localSnake.isSprinting = sprintKey && localSnake.score >= 6;
            }

            let diff = targetAngle - localSnake.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            localSnake.angle += diff * 0.15;

            const now = Date.now();
            if (localSnake.isSprinting) {
                if (now - lastSprintConsume >= 300) {
                    localSnake.score -= 1;
                    lastSprintConsume = now;
                    if (localSnake.score < 6) localSnake.isSprinting = false;
                }
            }

            const speed = localSnake.isSprinting ? 6 : 4;
            localSnake.x += Math.cos(localSnake.angle) * speed;
            localSnake.y += Math.sin(localSnake.angle) * speed;

            localSnake.body.unshift({ x: localSnake.x, y: localSnake.y });
            const targetLength = Math.floor(localSnake.score * 5);
            while (localSnake.body.length > targetLength) {
                localSnake.body.pop();
            }

            const half = MAP_SIZE / 2;
            if (Math.abs(localSnake.x) >= half || Math.abs(localSnake.y) >= half) {
                die(false);
                return;
            }

            for (let id in foodsData) {
                const food = foodsData[id];
                const dist = Math.hypot(localSnake.x - food.x, localSnake.y - food.y);
                if (dist < 15 + food.r) {
                    localSnake.score += 1;
                    socket.emit("RemoteEvent", {
                        type: "eat_food",
                        data: { foodId: id }
                    });
                }
            }
        }

        function die(dropFood = true) {
            if (!isAlive) return;
            isAlive = false;
            socket.emit("RemoteEvent", {
                type: "die",
                data: { dropFood: dropFood, body: localSnake.body }
            });
            setTimeout(() => {
                menu.style.display = "flex";
            }, 2000);
        }

        setInterval(() => {
            if (isAlive && socket.connected) {
                socket.emit("RemoteEvent", {
                    type: "update_position",
                    data: {
                        x: localSnake.x,
                        y: localSnake.y,
                        angle: localSnake.angle,
                        score: localSnake.score,
                        body: localSnake.body,
                        isSprinting: localSnake.isSprinting
                    }
                });
            }
        }, 1000 / 30);

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camX = isAlive ? localSnake.x : 0;
            const camY = isAlive ? localSnake.y : 0;

            ctx.save();
            ctx.translate(canvas.width / 2 - camX, canvas.height / 2 - camY);

            drawGrid();
            drawBorder();
            drawFoods();
            drawPlayers(camX, camY);

            if (isAlive) {
                drawSnake(localSnake.body, localSnake.color, localSnake.angle, inputName.value || "Player", 1);
            }

            ctx.restore();
            requestAnimationFrame(render);
        }

        function drawGrid() {
            const half = MAP_SIZE / 2;
            ctx.strokeStyle = "#333333";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = -half; x <= half; x += GRID_SIZE) {
                ctx.moveTo(x, -half);
                ctx.lineTo(x, half);
            }
            for (let y = -half; y <= half; y += GRID_SIZE) {
                ctx.moveTo(-half, y);
                ctx.lineTo(half, y);
            }
            ctx.stroke();
        }

        function drawBorder() {
            const half = MAP_SIZE / 2;
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 8;
            ctx.strokeRect(-half, -half, MAP_SIZE, MAP_SIZE);
        }

        function drawFoods() {
            for (let id in foodsData) {
                const f = foodsData[id];
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawPlayers() {
            for (let id in playersData) {
                if (id === socket.id) continue;
                const p = playersData[id];
                if (!p.isAlive && !p.dying) continue;
                const alpha = p.dying ? p.fadeAlpha : 1;
                drawSnake(p.body, p.color, p.renderAngle, p.name, alpha);
            }
        }

        function drawSnake(body, color, angle, name, alpha) {
            if (!body || body.length === 0) return;

            ctx.save();
            ctx.globalAlpha = alpha;

            const radius = 12;

            for (let i = body.length - 1; i >= 0; i--) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(body[i].x, body[i].y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.2)";
                ctx.stroke();
            }

            const head = body[0];
            ctx.save();
            ctx.translate(head.x, head.y);
            ctx.rotate(angle);

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(4, -5, 4, 0, Math.PI * 2);
            ctx.arc(4, 5, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(6, -5, 2, 0, Math.PI * 2);
            ctx.arc(6, 5, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 12px Arial";
            ctx.textAlign = "center";
            ctx.fillText(name, head.x, head.y - 18);

            ctx.restore();
        }

        function gameLoop() {
            updateLocalGame();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
        render();
    </script>
</body>
</html>
