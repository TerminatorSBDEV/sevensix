<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Global Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #030712; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #0f172a; padding: 15px; text-align: center; border-bottom: 1px solid #1e293b; font-weight: bold; font-size: 1.2rem; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #1e293b; padding: 10px 15px; border-radius: 8px; max-width: 80%; word-break: break-word; }
        .message.self { background: #0284c7; align-self: flex-end; }
        .message .user { font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; display: block; }
        form { display: flex; background: #0f172a; padding: 10px; border-top: 1px solid #1e293b; gap: 10px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 6px; font-size: 1rem; outline: none; }
        button { background: #06b6d4; color: #030712; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; touch-action: manipulation; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <header>Chat Global Online</header>
    <div id="chat-container"></div>
    <form id="chat-form" onsubmit="sendMessage(event)">
        <input type="text" id="message-input" placeholder="Digite sua mensagem..." autocomplete="off" required>
        <button type="submit">Enviar</button>
    </form>

    <script>
        const key = "146cf8ce56";
        const link = "https://vegetarian-aim-ability-almost.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });
        let myUserId = null;

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            socket.emit("RemoteEvent", { type: "ebuserid_get" });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "userid_response") {
                myUserId = pkt.data.userId;
            } else if (pkt.type === "chat_message") {
                appendMessage(pkt.data.senderId, pkt.data.text);
            }
        });

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;

            socket.emit("RemoteEvent", { type: "send_message", data: { text } });
            input.value = "";
        }

        function appendMessage(senderId, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = "message" + (senderId === myUserId ? " self" : "");
            
            const userSpan = document.createElement("span");
            userSpan.className = "user";
            userSpan.innerText = "Usuário: " + senderId.substring(0, 6);
            
            div.appendChild(userSpan);
            div.appendChild(document.createTextNode(text));
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
