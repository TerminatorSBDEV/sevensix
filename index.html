<!-- Test Your Guns - Client Script -->
<!DOCTYPE html>
<html>
<head>
    <title>Test Your Guns</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; background: #1e293b; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; font-weight: bold; font-size: 1.1rem; text-shadow: 1px 1px 2px #000; z-index: 10; }
        #controls-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); pointer-events: none; font-size: 0.85rem; color: rgba(255,255,255,0.7); background: rgba(15, 23, 42, 0.8); padding: 6px 14px; border-radius: 8px; border: 1px solid #475569; z-index: 10; text-align: center; }
        
        /* Mobile Controls */
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; touch-action: none; z-index: 10; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; }
        #chat-btn { position: absolute; bottom: 40px; right: 40px; width: 55px; height: 55px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; z-index: 10; }
        #mic-btn { position: absolute; bottom: 40px; right: 105px; width: 55px; height: 55px; background: rgba(239, 68, 68, 0.3); border: 2px solid rgba(239, 68, 68, 0.6); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; z-index: 10; }
        #mic-btn.active { background: rgba(34, 197, 94, 0.4); border-color: #22c55e; }
        #build-btn { position: absolute; bottom: 40px; right: 170px; width: 55px; height: 55px; background: rgba(56, 189, 248, 0.2); border: 2px solid rgba(56, 189, 248, 0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; z-index: 10; }
        #shop-btn-mob { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); padding: 6px 16px; background: #f59e0b; border: 2px solid #fbbf24; color: #fff; font-weight: bold; border-radius: 8px; display: none; cursor: pointer; z-index: 10; }

        /* Weapon Buttons */
        .mob-weapon-btn { position: absolute; bottom: 105px; width: 50px; height: 50px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; cursor: pointer; z-index: 10; color: #fff; }
        #mob-w1 { right: 40px; }
        #mob-w2 { right: 98px; }
        #mob-w3 { right: 156px; }
        #mob-w4 { right: 214px; display: none; }
        .mob-weapon-btn.active { background: rgba(56, 189, 248, 0.4); border-color: #38bdf8; }

        /* Floating Chat GUI */
        #floating-chat { position: absolute; bottom: 20px; left: 20px; width: 320px; height: 220px; background: rgba(15, 23, 42, 0.85); border: 1px solid #475569; border-radius: 8px; display: flex; flex-direction: column; z-index: 10; backdrop-filter: blur(4px); }
        #chat-messages { flex: 1; padding: 8px; overflow-y: auto; font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; word-break: break-word; }
        #chat-input-box { display: none; padding: 6px; border-top: 1px solid #475569; }
        #chat-input { width: 100%; box-sizing: border-box; padding: 6px 10px; background: #0f172a; border: 1px solid #38bdf8; color: #fff; border-radius: 4px; font-size: 0.85rem; outline: none; }

        /* Shop Modal */
        #shop-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: rgba(15, 23, 42, 0.95); border: 2px solid #f59e0b; border-radius: 12px; padding: 16px; display: none; z-index: 20; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .shop-item { margin-top: 12px; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 6px; }
        .shop-btn { padding: 6px 12px; background: #f59e0b; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; text-align: center; }

        /* Radio Panel Modal */
        #radio-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(15, 23, 42, 0.95); border: 2px solid #38bdf8; border-radius: 12px; padding: 16px; display: none; z-index: 20; text-align: center; }

        #minimap-container { position: absolute; top: 10px; right: 10px; width: 130px; height: 130px; background: rgba(15, 23, 42, 0.8); border: 2px solid #475569; border-radius: 8px; overflow: hidden; pointer-events: none; z-index: 10; }
        #minimapCanvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="ui">ID: <span id="my-id">...</span> | HP: <span id="hp">100</span> | Points: <span id="pts">0</span> | Wpn: <span id="wname">Rifle</span></div>
    <div id="controls-hint">E: Build | Y: Chat | M: Mic | H: Shop | 1-4: Switch Weapon | WASD: Move | Right Click: Shoot/Drag</div>
    <div id="shop-btn-mob">SHOP</div>
    <div id="joystick"><div id="stick"></div></div>
    <div id="chat-btn">💬</div>
    <div id="mic-btn">🎙️</div>
    <div id="build-btn">🧱</div>
    <div id="mob-w1" class="mob-weapon-btn active">1</div>
    <div id="mob-w2" class="mob-weapon-btn">2</div>
    <div id="mob-w3" class="mob-weapon-btn">3</div>
    <div id="mob-w4" class="mob-weapon-btn">4</div>

    <div id="floating-chat">
        <div id="chat-messages"></div>
        <div id="chat-input-box">
            <input type="text" id="chat-input" placeholder="Press Enter to send..." maxlength="100" />
        </div>
    </div>

    <div id="shop-modal">
        <h3 style="margin:0 0 10px 0; color:#f59e0b;">Playtime Points: <span id="shop-pts">0</span></h3>
        <div class="shop-item">
            <div>Custom Death Sound</div>
            <button id="buy-death" class="shop-btn">100 Points</button>
            <input type="file" id="death-file" accept="audio/*" style="display:none;" />
        </div>
        <div class="shop-item">
            <div>Radio</div>
            <button id="buy-radio" class="shop-btn">350 Points</button>
        </div>
        <div class="shop-item">
            <div>Physics Gun</div>
            <button id="buy-phys" class="shop-btn">500 Points</button>
        </div>
        <button id="close-shop" style="margin-top:12px; width:100%; padding:6px; background:#475569; border:none; color:#fff; border-radius:4px; cursor:pointer;">Close</button>
    </div>

    <div id="radio-modal">
        <h3 style="margin:0 0 10px 0; color:#38bdf8;">Radio Panel</h3>
        <p style="font-size:0.75rem; color:#94a3b8;">Max 10MB, under 5 mins</p>
        <input type="file" id="radio-file" accept="audio/*" style="margin: 10px 0; width: 100%;" />
        <div style="display:flex; gap:10px;">
            <button id="radio-play" class="shop-btn" style="flex:1;">Play</button>
            <button id="radio-stop" class="shop-btn" style="flex:1; background:#ef4444;">Stop</button>
        </div>
        <button id="close-radio" style="margin-top:12px; width:100%; padding:6px; background:#475569; border:none; color:#fff; border-radius:4px; cursor:pointer;">Close</button>
    </div>

    <div id="minimap-container">
        <canvas id="minimapCanvas" width="130" height="130"></canvas>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const minimapCanvas = document.getElementById("minimapCanvas");
        const mCtx = minimapCanvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            document.getElementById("joystick").style.display = "block";
            document.getElementById("chat-btn").style.display = "flex";
            document.getElementById("mic-btn").style.display = "flex";
            document.getElementById("build-btn").style.display = "flex";
            document.getElementById("mob-w1").style.display = "flex";
            document.getElementById("mob-w2").style.display = "flex";
            document.getElementById("mob-w3").style.display = "flex";
            document.getElementById("shop-btn-mob").style.display = "block";
            document.getElementById("controls-hint").style.display = "none";
        }

        const link = "https://bras-spas-associated-cashiers.trycloudflare.com";
        const key = "146cf8ce56";
        const socket = io(link, { auth: { token: "default_key" } });

        let myId = Math.random().toString(36).substring(2, 7);
        document.getElementById("my-id").innerText = myId;
        let myColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        let myPos = { x: Math.random() * 1500, y: Math.random() * 1500 };
        let myHp = 100;
        let myPoints = 0;
        let isDead = false;
        let lastShot = 0;
        let lastBuild = 0;
        let aimAngle = 0;
        let currentWeapon = 1;
        let isMouseDown = false;

        let inventory = { deathSound: false, radio: false, physGun: false };

        const weaponStats = {
            1: { name: "Rifle", rate: 200 },
            2: { name: "SMG", rate: 50 },
            3: { name: "Sniper", rate: 2500 },
            4: { name: "Phys Gun", rate: 100 }
        };

        const keys = { w: false, a: false, s: false, d: false };
        let players = {};
        let renderPlayers = {};
        let bullets = [];
        let renderBullets = [];
        let walls = [];
        let chatBubbles = {};

        let joyActive = false;
        let joyVector = { x: 0, y: 0 };
        let chatOpen = false;
        let micActive = false;

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let cachedAudios = {}; // id -> HTMLAudioElement
        let activeRadioSource = null;

        function playSynthesizedSound(type, x, y) {
            const dist = Math.hypot(x - myPos.x, y - myPos.y);
            const maxDist = 1200;
            if (dist > maxDist) return;
            const vol = Math.max(0, 1 - (dist / maxDist));

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            gain.gain.setValueAtTime(vol * 0.2, audioCtx.currentTime);

            if (type === 'rifle') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'smg') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'sniper') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hit_wall') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'hit_player') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'build') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            socket.emit("RemoteEvent", { type: "player_join", data: { id: myId, color: myColor, x: myPos.x, y: myPos.y, weapon: currentWeapon } });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "state_update") {
                const serverPlayers = pkt.data.players;
                bullets = pkt.data.bullets || [];
                walls = pkt.data.walls || [];

                for (let id in serverPlayers) {
                    const sp = serverPlayers[id];
                    if (id === myId) {
                        myHp = sp.hp;
                        myPos.x = sp.x;
                        myPos.y = sp.y;
                        myPoints = sp.points || 0;
                        inventory = sp.inventory || inventory;

                        document.getElementById("hp").innerText = myHp;
                        document.getElementById("pts").innerText = myPoints;
                        document.getElementById("shop-pts").innerText = myPoints;
                        updateShopUI();

                        if (myHp <= 0 && !isDead) {
                            isDead = true;
                            if (activeRadioSource) activeRadioSource.pause();
                            setTimeout(() => {
                                isDead = false;
                                socket.emit("RemoteEvent", { type: "respawn", data: { id: myId } });
                            }, 3000);
                        }
                    }

                    if (!renderPlayers[id]) {
                        renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp, weapon: sp.weapon || 1, radioEquipped: sp.radioEquipped, draggingId: sp.draggingId };
                    }
                    players[id] = sp;
                }
            } else if (pkt.type === "chat_sync") {
                const msgBox = document.getElementById("chat-messages");
                msgBox.innerHTML = "";
                pkt.data.forEach(m => addChatMessage(m.id, m.text));
            } else if (pkt.type === "chat_message") {
                addChatMessage(pkt.data.id, pkt.data.text);
                chatBubbles[pkt.data.id] = { text: pkt.data.text, expireTime: Date.now() + 14000 };
            } else if (pkt.type === "sound_effect") {
                playSynthesizedSound(pkt.data.sound, pkt.data.x, pkt.data.y);
            } else if (pkt.type === "audio_cache") {
                // Receive full audio blob cached on server
                const blob = new Blob([new Uint8Array(pkt.data.buffer)], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                cachedAudios[pkt.data.audioId] = { audio, duration: pkt.data.duration };
            } else if (pkt.type === "play_cached_sound") {
                playSpatialAudio(pkt.data.audioId, pkt.data.x, pkt.data.y, pkt.data.startTime || 0);
            } else if (pkt.type === "voice_chunk") {
                playVoiceChunk(pkt.data.id, pkt.data.chunk, pkt.data.x, pkt.data.y);
            }
        });

        function playSpatialAudio(audioId, x, y, startTime = 0) {
            if (!cachedAudios[audioId]) return;
            const item = cachedAudios[audioId];
            const dist = Math.hypot(x - myPos.x, y - myPos.y);
            const maxDist = 1200;
            if (dist > maxDist) return;

            const audio = item.audio.cloneNode();
            audio.volume = Math.max(0, 1 - (dist / maxDist));
            audio.currentTime = startTime;
            audio.play().catch(()=>{});
        }

        function addChatMessage(id, text) {
            const msgBox = document.getElementById("chat-messages");
            const div = document.createElement("div");
            div.innerHTML = `<strong style="color:#38bdf8;">${id}:</strong> ${escapeHtml(text)}`;
            msgBox.appendChild(div);
            if (msgBox.children.length > 50) msgBox.removeChild(msgBox.firstChild);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        const chatInput = document.getElementById("chat-input");
        const chatInputBox = document.getElementById("chat-input-box");

        function toggleChat() {
            chatOpen = !chatOpen;
            chatInputBox.style.display = chatOpen ? "block" : "none";
            if (chatOpen) chatInput.focus();
            else chatInput.blur();
        }

        function setWeapon(wId) {
            if (wId === 4 && !inventory.physGun) return;
            currentWeapon = wId;
            document.getElementById("wname").innerText = weaponStats[wId].name;
            if (isMobile) {
                document.querySelectorAll(".mob-weapon-btn").forEach(btn => btn.classList.remove("active"));
                document.getElementById(`mob-w${wId}`).classList.add("active");
            }
            socket.emit("RemoteEvent", { type: "switch_weapon", data: { id: myId, weapon: currentWeapon } });
        }

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === 'y' && !chatOpen) {
                e.preventDefault();
                toggleChat();
            } else if (e.key === 'Enter' && chatOpen) {
                sendChat();
            } else if (e.key.toLowerCase() === 'e' && !chatOpen && !isDead) {
                buildWall();
            } else if (e.key.toLowerCase() === 'm' && !chatOpen) {
                toggleMic();
            } else if (e.key.toLowerCase() === 'h' && !chatOpen) {
                toggleShop();
            } else if (e.key.toLowerCase() === 'r' && !chatOpen && inventory.radio) {
                toggleRadioModal();
            } else if (!chatOpen) {
                if (e.key === '1') setWeapon(1);
                if (e.key === '2') setWeapon(2);
                if (e.key === '3') setWeapon(3);
                if (e.key === '4') setWeapon(4);
            }

            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = true;
                if (e.key.toLowerCase() === 'a') keys.a = true;
                if (e.key.toLowerCase() === 's') keys.s = true;
                if (e.key.toLowerCase() === 'd') keys.d = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = false;
                if (e.key.toLowerCase() === 'a') keys.a = false;
                if (e.key.toLowerCase() === 's') keys.s = false;
                if (e.key.toLowerCase() === 'd') keys.d = false;
            }
        });

        // Mic Stream Setup
        let mediaRecorder;
        function toggleMic() {
            micActive = !micActive;
            const btn = document.getElementById("mic-btn");
            if (micActive) {
                btn.classList.add("active");
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: 70000 });
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0 && micActive) {
                            e.data.arrayBuffer().then(buffer => {
                                socket.emit("RemoteEvent", { type: "voice_chunk", data: { id: myId, chunk: buffer, x: myPos.x, y: myPos.y } });
                            });
                        }
                    };
                    mediaRecorder.start(200); // 70kb/s chunk stream
                }).catch(() => { micActive = false; btn.classList.remove("active"); });
            } else {
                btn.classList.remove("active");
                if (mediaRecorder) mediaRecorder.stop();
            }
        }

        function playVoiceChunk(id, chunk, x, y) {
            if (id === myId) return;
            const dist = Math.hypot(x - myPos.x, y - myPos.y);
            const maxDist = 1000;
            if (dist > maxDist) return;

            const blob = new Blob([chunk], { type: 'audio/webm;codecs=opus' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.volume = Math.max(0, 1 - (dist / maxDist));
            audio.play().catch(()=>{});
        }

        document.getElementById("chat-btn").addEventListener("click", toggleChat);
        document.getElementById("mic-btn").addEventListener("click", toggleMic);
        document.getElementById("build-btn").addEventListener("click", () => { if (!isDead && !chatOpen) buildWall(); });
        document.getElementById("shop-btn-mob").addEventListener("click", toggleShop);

        document.getElementById("mob-w1").addEventListener("click", () => setWeapon(1));
        document.getElementById("mob-w2").addEventListener("click", () => setWeapon(2));
        document.getElementById("mob-w3").addEventListener("click", () => setWeapon(3));
        document.getElementById("mob-w4").addEventListener("click", () => setWeapon(4));

        function sendChat() {
            const text = chatInput.value.trim();
            if (text.length > 0) {
                socket.emit("RemoteEvent", { type: "send_chat", data: { id: myId, text } });
            }
            chatInput.value = "";
            toggleChat();
        }

        // Shop System
        function toggleShop() {
            const modal = document.getElementById("shop-modal");
            modal.style.display = (modal.style.display === "block") ? "none" : "block";
        }
        document.getElementById("close-shop").addEventListener("click", toggleShop);

        function updateShopUI() {
            const buyDeath = document.getElementById("buy-death");
            const buyRadio = document.getElementById("buy-radio");
            const buyPhys = document.getElementById("buy-phys");

            if (inventory.deathSound) {
                buyDeath.innerText = "OWNED | Change Sound";
                buyDeath.onclick = () => document.getElementById("death-file").click();
            } else {
                buyDeath.onclick = () => buyItem("deathSound", 100);
            }

            if (inventory.radio) {
                buyRadio.innerText = "OWNED | Equip Radio";
                buyRadio.onclick = () => toggleRadioModal();
            } else {
                buyRadio.onclick = () => buyItem("radio", 350);
            }

            if (inventory.physGun) {
                buyPhys.innerText = "OWNED | Press 4 To Equip";
                document.getElementById("mob-w4").style.display = isMobile ? "flex" : "none";
            } else {
                buyPhys.onclick = () => buyItem("physGun", 500);
            }
        }

        function buyItem(item, cost) {
            socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item, cost } });
        }

        // Audio Upload Handler
        document.getElementById("death-file").addEventListener("change", (e) => uploadAudioFile(e.target.files[0], 'death'));
        document.getElementById("radio-file").addEventListener("change", (e) => uploadAudioFile(e.target.files[0], 'radio'));

        function uploadAudioFile(file, type) {
            if (!file) return;
            const maxMB = type === 'death' ? 4 : 10;
            if (file.size > maxMB * 1024 * 1024) return alert("File size too large!");

            const audioTemp = new Audio(URL.createObjectURL(file));
            audioTemp.onloadedmetadata = () => {
                const maxSec = type === 'death' ? 10 : 300;
                if (audioTemp.duration > maxSec) return alert("Audio too long!");

                // Request Upload Validation
                socket.emit("RemoteEvent", { 
                    type: "request_upload", 
                    data: { id: myId, size: file.size, duration: audioTemp.duration, audioType: type } 
                });

                // Listen once for approval
                const handleApproval = (pkt) => {
                    if (pkt.type === "upload_approved" && pkt.data.audioType === type) {
                        socket.off("RemoteEvent", handleApproval);
                        // Send in 150KB Chunks
                        const chunkSize = 150 * 1024;
                        let offset = 0;
                        const reader = new FileReader();

                        reader.onload = (evt) => {
                            socket.emit("RemoteEvent", { 
                                type: "upload_chunk", 
                                data: { id: myId, audioId: pkt.data.audioId, chunk: evt.target.result, offset, total: file.size } 
                            });
                            offset += chunkSize;
                            if (offset < file.size) readNext();
                        };

                        function readNext() {
                            const slice = file.slice(offset, offset + chunkSize);
                            reader.readAsArrayBuffer(slice);
                        }
                        readNext();
                    }
                };
                socket.on("RemoteEvent", handleApproval);
            };
        }

        function toggleRadioModal() {
            const modal = document.getElementById("radio-modal");
            modal.style.display = (modal.style.display === "block") ? "none" : "block";
        }
        document.getElementById("close-radio").addEventListener("click", toggleRadioModal);
        document.getElementById("radio-play").addEventListener("click", () => {
            socket.emit("RemoteEvent", { type: "trigger_radio", data: { id: myId, action: "play", x: myPos.x, y: myPos.y } });
        });
        document.getElementById("radio-stop").addEventListener("click", () => {
            socket.emit("RemoteEvent", { type: "trigger_radio", data: { id: myId, action: "stop" } });
        });

        // Dragging & Aiming
        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        let isDragging = false;

        window.addEventListener("mousemove", (e) => {
            if (chatOpen) return;
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener("mousedown", (e) => {
            if (chatOpen || isDead) return;
            if (e.button === 2) {
                isMouseDown = true;
                if (currentWeapon === 4) {
                    isDragging = true;
                } else {
                    tryShoot();
                }
            }
        });

        window.addEventListener("mouseup", (e) => {
            if (e.button === 2) {
                isMouseDown = false;
                if (currentWeapon === 4) {
                    isDragging = false;
                    socket.emit("RemoteEvent", { type: "stop_drag", data: { id: myId } });
                }
            }
        });
        window.addEventListener("contextmenu", (e) => e.preventDefault());

        const joystickEl = document.getElementById("joystick");
        const stickEl = document.getElementById("stick");
        let joyCenter = { x: 0, y: 0 };

        joystickEl.addEventListener("touchstart", (e) => {
            if (chatOpen) return;
            joyActive = true;
            const rect = joystickEl.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        });

        window.addEventListener("touchmove", (e) => {
            if (!joyActive || chatOpen) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joyCenter.x;
            const dy = touch.clientY - joyCenter.y;
            const dist = Math.min(50, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);

            joyVector.x = Math.cos(angle) * (dist / 50);
            joyVector.y = Math.sin(angle) * (dist / 50);

            stickEl.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        });

        window.addEventListener("touchend", () => {
            if (joyActive) {
                joyActive = false;
                joyVector = { x: 0, y: 0 };
                stickEl.style.transform = `translate(0px, 0px)`;
            }
        });

        function tryShoot() {
            const now = Date.now();
            const stat = weaponStats[currentWeapon];
            if (now - lastShot < stat.rate) return;
            lastShot = now;

            socket.emit("RemoteEvent", { type: "fire_bullet", data: { id: myId, angle: aimAngle, weapon: currentWeapon } });
        }

        function buildWall() {
            const now = Date.now();
            if (now - lastBuild < 1000) return;
            lastBuild = now;

            socket.emit("RemoteEvent", { type: "build_wall", data: { id: myId, angle: aimAngle } });
        }

        let lastInputEmit = 0;
        function update() {
            if (!isDead && !chatOpen) {
                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2;
                aimAngle = Math.atan2(mousePos.y - screenCenterY, mousePos.x - screenCenterX);

                if (isMouseDown && currentWeapon !== 4) tryShoot();

                // Convert Screen Mouse Position to World Target Position for Dragging
                const worldMouseX = myPos.x + (mousePos.x - screenCenterX) * (currentWeapon === 3 ? 2.0 : 1.0);
                const worldMouseY = myPos.y + (mousePos.y - screenCenterY) * (currentWeapon === 3 ? 2.0 : 1.0);

                if (currentWeapon === 4 && isDragging) {
                    socket.emit("RemoteEvent", { type: "drag_target", data: { id: myId, targetX: worldMouseX, targetY: worldMouseY } });
                }

                let inputData = isMobile ? { vector: joyVector } : { w: keys.w, a: keys.a, s: keys.s, d: keys.d };

                const now = Date.now();
                if (now - lastInputEmit >= 1000 / 50) { // Exact 50 Requests/Sec
                    lastInputEmit = now;
                    socket.emit("RemoteEvent", { type: "player_input", data: { id: myId, input: inputData, angle: aimAngle, color: myColor, weapon: currentWeapon } });
                }
            }
        }

        function drawBubble(x, y, text) {
            ctx.save();
            ctx.font = "14px sans-serif";
            const metrics = ctx.measureText(text);
            const w = metrics.width + 16;
            const h = 28;

            ctx.translate(x, y - 65);
            ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, 6);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        function drawMinimap() {
            mCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            const scale = 130 / 3000;

            mCtx.strokeStyle = "#475569";
            mCtx.lineWidth = 1;
            mCtx.strokeRect(0, 0, 130, 130);

            mCtx.fillStyle = "#64748b";
            walls.forEach(w => mCtx.fillRect(w.x * scale - 1, w.y * scale - 1, 2, 2));

            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;
                mCtx.fillStyle = (id === myId) ? "#38bdf8" : (p.color || "#ef4444");
                mCtx.beginPath();
                mCtx.arc(p.x * scale, p.y * scale, (id === myId) ? 3.5 : 2.5, 0, Math.PI * 2);
                mCtx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Interpolate Players
            for (let id in players) {
                let sp = players[id];
                if (!renderPlayers[id]) {
                    renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp, weapon: sp.weapon || 1, radioEquipped: sp.radioEquipped, draggingId: sp.draggingId };
                } else {
                    renderPlayers[id].x += (sp.x - renderPlayers[id].x) * 0.3; // Linear Lerp Smoothing
                    renderPlayers[id].y += (sp.y - renderPlayers[id].y) * 0.3;
                    renderPlayers[id].angle = sp.angle;
                    renderPlayers[id].color = sp.color;
                    renderPlayers[id].hp = sp.hp;
                    renderPlayers[id].weapon = sp.weapon || 1;
                    renderPlayers[id].radioEquipped = sp.radioEquipped;
                    renderPlayers[id].draggingId = sp.draggingId;
                }
            }

            // Interpolate Bullets with Linear Lerp to hide lag
            if (renderBullets.length !== bullets.length) {
                renderBullets = bullets.map(b => ({ ...b }));
            } else {
                for (let i = 0; i < bullets.length; i++) {
                    renderBullets[i].x += (bullets[i].x - renderBullets[i].x) * 0.4;
                    renderBullets[i].y += (bullets[i].y - renderBullets[i].y) * 0.4;
                }
            }

            ctx.save();
            if (!isDead && renderPlayers[myId]) {
                const zoomFactor = (currentWeapon === 3) ? 0.5 : 1.0;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(zoomFactor, zoomFactor);
                ctx.translate(-renderPlayers[myId].x, -renderPlayers[myId].y);
            }

            // Map Bounds
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 3000, 3000);

            // Draw Walls
            walls.forEach(w => {
                ctx.save();
                ctx.translate(w.x, w.y);
                ctx.rotate(w.angle + Math.PI / 2);

                if (w.isDragged) {
                    ctx.strokeStyle = "#00ffff";
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = "#94a3b8";
                    ctx.lineWidth = 2;
                }

                ctx.fillStyle = "#334155";
                ctx.fillRect(-60, -10, 120, 20);
                ctx.strokeRect(-60, -10, 120, 20);
                ctx.restore();
            });

            // Draw Players
            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                ctx.save();
                ctx.translate(p.x, p.y);

                // Cyan Outline if Dragged by PhysGun
                if (p.isDragged) {
                    ctx.strokeStyle = "#00ffff";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(-22, -22, 44, 44);
                }

                ctx.fillStyle = p.color || '#fff';
                ctx.fillRect(-20, -20, 40, 40);

                // Equipped Radio Model on Back
                if (p.radioEquipped) {
                    ctx.fillStyle = "#f59e0b";
                    ctx.fillRect(-12, 16, 24, 8);
                }

                // Name ID on top of head
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(id, 0, -45);

                // HP Bar
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(-20, -36, 40, 5);
                ctx.fillStyle = "#22c55e";
                ctx.fillRect(-20, -36, 40 * (p.hp / 100), 5);

                ctx.rotate(p.angle);

                // Weapon Models
                const wType = p.weapon;
                if (wType === 1) { // Rifle
                    ctx.fillStyle = "#64748b"; ctx.fillRect(5, -5, 34, 10);
                } else if (wType === 2) { // SMG
                    ctx.fillStyle = "#475569"; ctx.fillRect(4, -4, 22, 8);
                } else if (wType === 3) { // Sniper
                    ctx.fillStyle = "#334155"; ctx.fillRect(2, -4, 45, 8);
                    ctx.fillStyle = "#ef4444"; ctx.fillRect(15, -9, 10, 5);
                } else if (wType === 4) { // Physics Gun (Gmod Style Model)
                    ctx.fillStyle = "#0284c7"; ctx.fillRect(2, -5, 30, 10);
                    ctx.fillStyle = "#00ffff"; ctx.fillRect(20, -8, 6, 16);
                }

                ctx.restore();

                // Sniper Laser Sight
                if (id === myId && currentWeapon === 3 && !isDead) {
                    ctx.save();
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.7)";
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath(); ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(p.angle) * 1200, p.y + Math.sin(p.angle) * 1200);
                    ctx.stroke();
                    ctx.restore();
                }

                if (chatBubbles[id] && chatBubbles[id].expireTime > Date.now()) {
                    drawBubble(p.x, p.y, chatBubbles[id].text);
                }
            }

            // Draw Bullets
            ctx.fillStyle = "#facc15";
            renderBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
            drawMinimap();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
