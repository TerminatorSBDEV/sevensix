<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Client</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #0c0c0e; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1e1e24; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 8px; }
        #status { font-weight: bold; margin-top: 20px; color: #00ff88; }
    </style>
</head>
<body>
    <h2>Multiplayer Tic-Tac-Toe</h2>
    <div id="status">Connecting...</div>
    <div class="grid" id="grid">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <script>
        const key = "400e0a8efd";
        const link = "https://result-license-alphabetical-even.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });
        let myTurn = false;
        let symbol = "";

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Connected! Joining room...";
            socket.emit("join_virtual_server", { key });
        });

        socket.on("RemoteEvent", (packet) => {
            if (packet.type === "init") {
                symbol = packet.symbol;
                myTurn = packet.turn;
                document.getElementById("status").innerText = myTurn ? "Your turn (" + symbol + ")" : "Opponent turn...";
            }
            if (packet.type === "update") {
                const cells = document.querySelectorAll(".cell");
                packet.board.forEach((val, i) => cells[i].innerText = val || "");
                myTurn = packet.turn;
                
                if (packet.winner) {
                    myTurn = false;
                    if (packet.winner === "T") {
                        document.getElementById("status").innerText = "Tie!";
                    } else {
                        document.getElementById("status").innerText = packet.winner === symbol ? "You Won! 🎉" : "You Lost! ❌";
                    }
                } else {
                    document.getElementById("status").innerText = myTurn ? "Your turn (" + symbol + ")" : "Opponent turn...";
                }
            }
        });

        function makeMove(idx) {
            if (!myTurn) return;
            socket.emit("RemoteEvent", { type: "play_move", data: { index: idx } });
        }
    </script>
</body>
</html>
