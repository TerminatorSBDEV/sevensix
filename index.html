<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Html snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        /* Top Progress Bar */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: rgba(20, 20, 20, 0.9);
            border-bottom: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 0.3s linear;
        }
        #progress-text {
            position: relative;
            z-index: 101;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        /* Menu */
        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            z-index: 90;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #menu h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 5px;
            color: #fff;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-size: 13px;
            color: #aaa;
        }
        .input-group input[type="text"] {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .color-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #181818;
            padding: 10px;
            border-radius: 6px;
        }
        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
        .color-row input[type="range"] {
            width: 60%;
        }
        #color-preview {
            height: 15px;
            border-radius: 4px;
            margin-top: 5px;
            border: 1px solid #444;
        }
        #btn-spawn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #btn-spawn:disabled {
            background: #444;
            cursor: not-allowed;
            color: #888;
        }

        /* Canvas Game */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="progress-container">
        <div id="progress-bar"></div>
        <div id="progress-text">Gerando mapa... 0%</div>
    </div>

    <div id="menu">
        <h1>Html snakes</h1>
        <div class="input-group">
            <label for="player-name">Nome de jogador: (10 caracteres max)</label>
            <input type="text" id="player-name" maxlength="10" placeholder="Seu nome">
        </div>
        
        <div class="color-sliders">
            <div class="color-row">
                <label>Vermelho: <span id="val-r">50</span>%</label>
                <input type="range" id="slider-r" min="0" max="100" value="50">
            </div>
            <div class="color-row">
                <label>Verde: <span id="val-g">50</span>%</label>
                <input type="range" id="slider-g" min="0" max="100" value="50">
            </div>
            <div class="color-row">
                <label>Azul: <span id="val-b">50</span>%</label>
                <input type="range" id="slider-b" min="0" max="100" value="50">
            </div>
            <div id="color-preview"></div>
        </div>

        <button id="btn-spawn" disabled>Aguarde a criação do mapa...</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const key = "146cf8ce56";
        const link = "https://vegetarian-aim-ability-almost.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Configurações do Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Elementos da UI
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const menu = document.getElementById('menu');
        const btnSpawn = document.getElementById('btn-spawn');
        const inputName = document.getElementById('player-name');
        const sliderR = document.getElementById('slider-r');
        const sliderG = document.getElementById('slider-g');
        const sliderB = document.getElementById('slider-b');
        const valR = document.getElementById('val-r');
        const valG = document.getElementById('val-g');
        const valB = document.getElementById('val-b');
        const colorPreview = document.getElementById('color-preview');

        // Estado do Jogo
        let mapReady = false;
        let MAP_SIZE = 5000;
        let myId = null;
        let isAlive = false;
        let isDeadCameraLocked = false;
        let deadCameraPos = { x: 0, y: 0 };
        let fadeOpacity = 1.0;
        let isFadingOut = false;

        // Entidades Locais
        let players = {}; 
        let foodBalls = {}; 
        
        // Dados locais da cobra do jogador
        let myData = {
            x: 0,
            y: 0,
            angle: 0,
            speed: 3,
            life: 5,
            segments: [],
            isSprinting: false,
            color: 'rgb(127,127,127)',
            name: ''
        };

        // Inputs
        let keys = {};
        let mousePos = { x: 0, y: 0 };
        let touchMove = false;
        let touchMovePos = { x: 0, y: 0 };
        let isTouchSprinting = false;

        // Atualização da UI do Menu de Cores
        function updateColorPreview() {
            valR.innerText = sliderR.value;
            valG.innerText = sliderG.value;
            valB.innerText = sliderB.value;
            const r = Math.round((sliderR.value / 100) * 255);
            const g = Math.round((sliderG.value / 100) * 255);
            const b = Math.round((sliderB.value / 100) * 255);
            colorPreview.style.background = `rgb(${r}, ${g}, ${b})`;
        }
        [sliderR, sliderG, sliderB].forEach(s => s.addEventListener('input', updateColorPreview));
        updateColorPreview();

        // Conexão WebSocket e EzBridge
        socket.on("connect", () => {
            myId = socket.id;
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            socket.emit("RemoteEvent", { type: "client_ready" });
        });

        socket.on("RemoteEvent", (pkt) => {
            switch(pkt.type) {
                case "map_progress":
                    let pct = pkt.data.progress;
                    progressBar.style.width = pct + "%";
                    progressText.innerText = `Gerando mapa... ${pct}%`;
                    if (pct >= 100) {
                        mapReady = true;
                        btnSpawn.disabled = false;
                        btnSpawn.innerText = "Surgir";
                        progressText.innerText = "Mapa Pronto!";
                        MAP_SIZE = pkt.data.mapSize || 5000;
                    }
                    break;

                case "init_food":
                    foodBalls = pkt.data.food;
                    break;

                case "food_spawn":
                    foodBalls[pkt.data.id] = pkt.data;
                    break;

                case "food_remove":
                    delete foodBalls[pkt.data.id];
                    break;

                case "player_update":
                    if (pkt.data.id !== myId) {
                        if (!players[pkt.data.id]) {
                            players[pkt.data.id] = pkt.data;
                        } else {
                            // Aplicar interpolação (LERP) para cobras de outros jogadores
                            let target = pkt.data;
                            let current = players[pkt.data.id];
                            
                            current.targetX = target.x;
                            current.targetY = target.y;
                            current.targetAngle = target.angle;
                            current.life = target.life;
                            current.color = target.color;
                            current.name = target.name;
                            current.targetSegments = target.segments;
                        }
                    }
                    break;

                case "player_died":
                    if (players[pkt.data.id]) {
                        delete players[pkt.data.id];
                    }
                    break;
            }
        });

        // Evento Surgir (Spawn)
        btnSpawn.addEventListener('click', () => {
            if (!mapReady) return;
            const r = Math.round((sliderR.value / 100) * 255);
            const g = Math.round((sliderG.value / 100) * 255);
            const b = Math.round((sliderB.value / 100) * 255);
            
            myData.name = inputName.value.substring(0, 10) || "Snake";
            myData.color = `rgb(${r},${g},${b})`;
            myData.x = Math.random() * (MAP_SIZE - 400) + 200;
            myData.y = Math.random() * (MAP_SIZE - 400) + 200;
            myData.life = 5;
            myData.angle = Math.random() * Math.PI * 2;
            myData.segments = [];
            for (let i = 0; i < myData.life; i++) {
                myData.segments.push({ x: myData.x - i * 10, y: myData.y });
            }

            isAlive = true;
            isDeadCameraLocked = false;
            fadeOpacity = 1.0;
            isFadingOut = false;
            menu.style.display = 'none';

            socket.emit("RemoteEvent", {
                type: "spawn",
                data: {
                    id: myId,
                    x: myData.x,
                    y: myData.y,
                    color: myData.color,
                    name: myData.name,
                    life: myData.life,
                    angle: myData.angle,
                    segments: myData.segments
                }
            });
        });

        // Inputs Teclado / Mouse / Touch
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        // Controles Touch
        window.addEventListener('touchstart', (e) => {
            if (!isAlive) return;
            if (e.touches.length === 1) {
                touchMove = true;
                touchMovePos.x = e.touches[0].clientX;
                touchMovePos.y = e.touches[0].clientY;
            } else if (e.touches.length >= 2) {
                isTouchSprinting = true;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isAlive) return;
            touchMovePos.x = e.touches[0].clientX;
            touchMovePos.y = e.touches[0].clientY;
        });

        window.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                touchMove = false;
                isTouchSprinting = false;
            } else if (e.touches.length === 1) {
                isTouchSprinting = false;
            }
        });

        // Temporizador para Sprint e consumo de comida
        let lastSprintBurnTime = Date.now();

        function updatePlayerLogic() {
            if (!isAlive) return;

            // Verificar Sprint
            let wantSprint = (keys[' '] || keys['e'] || isTouchSprinting);
            if (wantSprint && myData.life >= 6) {
                myData.isSprinting = true;
                myData.speed = 4.5; // +50% de velocidade (3 * 1.5)
                
                if (Date.now() - lastSprintBurnTime >= 300) {
                    myData.life -= 1;
                    myData.segments.pop();
                    lastSprintBurnTime = Date.now();
                }
            } else {
                myData.isSprinting = false;
                myData.speed = 3;
            }

            // Direção da cobra
            let targetAngle = myData.angle;

            // Teclado WASD / Setas
            let dx = 0, dy = 0;
            if (keys['w'] || keys['arrowup']) dy -= 1;
            if (keys['s'] || keys['arrowdown']) dy += 1;
            if (keys['a'] || keys['arrowleft']) dx -= 1;
            if (keys['d'] || keys['arrowright']) dx += 1;

            if (dx !== 0 || dy !== 0) {
                targetAngle = Math.atan2(dy, dx);
            } else if (touchMove) {
                let centerX = canvas.width / 2;
                let centerY = canvas.height / 2;
                targetAngle = Math.atan2(touchMovePos.y - centerY, touchMovePos.x - centerX);
            } else {
                let centerX = canvas.width / 2;
                let centerY = canvas.height / 2;
                targetAngle = Math.atan2(mousePos.y - centerY, mousePos.x - centerX);
            }

            // Mudar ângulo suavemente
            let diff = targetAngle - myData.angle;
            diff = Math.atan2(Math.sin(diff), Math.cos(diff));
            myData.angle += diff * 0.15;

            // Movimentação da cabeça
            myData.x += Math.cos(myData.angle) * myData.speed;
            myData.y += Math.sin(myData.angle) * myData.speed;

            // Atualização dos segmentos
            if (myData.segments.length > 0) {
                myData.segments[0] = { x: myData.x, y: myData.y };
                let segDistance = 10;
                for (let i = 1; i < myData.life; i++) {
                    if (!myData.segments[i]) {
                        myData.segments[i] = { ...myData.segments[i - 1] };
                    }
                    let prev = myData.segments[i - 1];
                    let curr = myData.segments[i];
                    let segAngle = Math.atan2(prev.y - curr.y, prev.x - curr.x);
                    curr.x = prev.x - Math.cos(segAngle) * segDistance;
                    curr.y = prev.y - Math.sin(segAngle) * segDistance;
                }
            }

            // Colisão com as bordas vermelhas do mapa
            if (myData.x <= 0 || myData.x >= MAP_SIZE || myData.y <= 0 || myData.y >= MAP_SIZE) {
                killPlayer(false); // Morre sem dropar comida
                return;
            }

            // Colisão com Bolas de Comida
            for (let id in foodBalls) {
                let ball = foodBalls[id];
                let dist = Math.hypot(myData.x - ball.x, myData.y - ball.y);
                if (dist < (12 + (ball.radius || 5))) {
                    // Comeu a bola
                    socket.emit("RemoteEvent", { type: "eat_food", data: { id: ball.id } });
                    delete foodBalls[ball.id];
                    myData.life += 1;
                    let lastSeg = myData.segments[myData.segments.length - 1] || { x: myData.x, y: myData.y };
                    myData.segments.push({ x: lastSeg.x, y: lastSeg.y });
                }
            }
        }

        function killPlayer(dropFood = true) {
            if (!isAlive) return;
            isAlive = false;
            isDeadCameraLocked = true;
            deadCameraPos = { x: myData.x, y: myData.y };
            isFadingOut = true;

            socket.emit("RemoteEvent", {
                type: "die",
                data: {
                    id: myId,
                    dropFood: dropFood,
                    segments: myData.segments
                }
            });

            // Animação de Fade Out e retorno ao menu após 2 segundos
            setTimeout(() => {
                menu.style.display = 'flex';
                isDeadCameraLocked = false;
            }, 2000);
        }

        // Loop de envio de rede (30 Requisitos por segundo)
        setInterval(() => {
            if (isAlive) {
                socket.emit("RemoteEvent", {
                    type: "update_position",
                    data: {
                        id: myId,
                        x: myData.x,
                        y: myData.y,
                        angle: myData.angle,
                        life: myData.life,
                        color: myData.color,
                        name: myData.name,
                        segments: myData.segments
                    }
                });
            }
        }, 1000 / 30);

        // Renderização Principal (Loop)
        function render() {
            updatePlayerLogic();

            // Posição de visualização da câmera
            let camX = isAlive ? myData.x : deadCameraPos.x;
            let camY = isAlive ? myData.y : deadCameraPos.y;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Centralizar a câmera no jogador
            ctx.translate(canvas.width / 2 - camX, canvas.height / 2 - camY);

            // Renderizar Grade Cinza do Mapa
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 1;
            let gridSize = 40;
            let startX = Math.max(0, Math.floor((camX - canvas.width / 2) / gridSize) * gridSize);
            let endX = Math.min(MAP_SIZE, Math.ceil((camX + canvas.width / 2) / gridSize) * gridSize);
            let startY = Math.max(0, Math.floor((camY - canvas.height / 2) / gridSize) * gridSize);
            let endY = Math.min(MAP_SIZE, Math.ceil((camY + canvas.height / 2) / gridSize) * gridSize);

            for (let x = startX; x <= endX; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, startY);
                ctx.lineTo(x, endY);
                ctx.stroke();
            }
            for (let y = startY; y <= endY; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(endX, y);
                ctx.stroke();
            }

            // Renderizar Bordas Vermelhas Quadradas do Mapa
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

            // Renderizar Bolas de Comida
            for (let id in foodBalls) {
                let ball = foodBalls[id];
                ctx.fillStyle = ball.color || '#00ffcc';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius || 5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Interpolação Linear (LERP) das Cobras dos Outros Jogadores
            for (let id in players) {
                let p = players[id];
                if (p.targetX !== undefined) {
                    p.x += (p.targetX - p.x) * 0.2;
                    p.y += (p.targetY - p.y) * 0.2;
                    p.angle += Math.atan2(Math.sin(p.targetAngle - p.angle), Math.cos(p.targetAngle - p.angle)) * 0.2;
                    
                    if (p.targetSegments) {
                        if (!p.segments) p.segments = [];
                        for (let i = 0; i < p.targetSegments.length; i++) {
                            if (!p.segments[i]) p.segments[i] = { ...p.targetSegments[i] };
                            p.segments[i].x += (p.targetSegments[i].x - p.segments[i].x) * 0.2;
                            p.segments[i].y += (p.targetSegments[i].y - p.segments[i].y) * 0.2;
                        }
                        p.segments.length = p.targetSegments.length;
                    }
                }
                drawSnake(p, 1.0);
            }

            // Renderizar Cobra Local com animação de Fade Out ao morrer
            if (isAlive) {
                drawSnake(myData, 1.0);
            } else if (isFadingOut) {
                fadeOpacity -= 0.033; // Desaparecer em ~0.5 segundos (30fps)
                if (fadeOpacity <= 0) {
                    fadeOpacity = 0;
                    isFadingOut = false;
                }
                drawSnake(myData, fadeOpacity);
            }

            ctx.restore();
            requestAnimationFrame(render);
        }

        // Função de Desenho das Cobras com Olhos voltados para a direção de movimento
        function drawSnake(s, opacity) {
            if (!s.segments || s.segments.length === 0) return;

            ctx.save();
            ctx.globalAlpha = opacity;

            let radius = 10 + Math.min(10, s.life * 0.1); // Escala levemente com o tamanho

            // Desenhar Segmentos do Corpo
            for (let i = s.segments.length - 1; i >= 0; i--) {
                let seg = s.segments[i];
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Desenhar Olhos na Cabeça
            let head = s.segments[0];
            let eyeOffset = radius * 0.5;
            let eyeRadius = radius * 0.35;
            let pupilRadius = eyeRadius * 0.5;

            // Ângulo perpendicular para afastar os dois olhos
            let leftEyeX = head.x + Math.cos(s.angle - Math.PI / 4) * eyeOffset;
            let leftEyeY = head.y + Math.sin(s.angle - Math.PI / 4) * eyeOffset;
            let rightEyeX = head.x + Math.cos(s.angle + Math.PI / 4) * eyeOffset;
            let rightEyeY = head.y + Math.sin(s.angle + Math.PI / 4) * eyeOffset;

            // Esclerótica dos Olhos (Branco)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, eyeRadius, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, eyeRadius, 0, Math.PI * 2); ctx.fill();

            // Pupilas (Pretas, olhando na direção para onde a cobra está indo)
            let pupilX = Math.cos(s.angle) * (eyeRadius - pupilRadius);
            let pupilY = Math.sin(s.angle) * (eyeRadius - pupilRadius);

            ctx.fillStyle = '#000000';
            ctx.beginPath(); ctx.arc(leftEyeX + pupilX, leftEyeY + pupilY, pupilRadius, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(rightEyeX + pupilX, rightEyeY + pupilY, pupilRadius, 0, Math.PI * 2); ctx.fill();

            // Nome do Jogador
            if (s.name) {
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(s.name, head.x, head.y - radius - 8);
            }

            ctx.restore();
        }

        // Iniciar loop do jogo
        requestAnimationFrame(render);
    </script>
</body>
</html>
