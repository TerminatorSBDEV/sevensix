<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Client</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #121214; color: #fff; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1a1a20; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Multiplayer Tic-Tac-Toe</h2>
    <div id="status">Connecting...</div>
    <div class="grid" id="grid">
        <div class="cell" onclick="sendMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <!-- ... cells from 0 to 8 ... -->
    </div>
    <script>
        const socket = io("https://theology-kay-vocal-plasma.trycloudflare.com", { auth: { token: "default_key" } });
        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key: "cba498a31f" });
        });
        socket.on("RemoteEvent", (p) => {
            if (p.type === "board_update") render(p.board, p.status);
        });
        function sendMove(idx) {
            socket.emit("RemoteEvent", { type: "player_move", idx: idx });
        }
    </script>
</body>
</html>
