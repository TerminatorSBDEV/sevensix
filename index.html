<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HTML Snakes</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #09090b;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #121216;
        }
        #menu h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #00ff88;
        }
        .menu-group {
            margin-bottom: 15px;
            text-align: left;
            width: 250px;
        }
        .menu-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .menu-group input[type="text"] {
            width: 100%;
            padding: 8px;
            background: #1e1e24;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .color-options {
            display: flex;
            justify-content: space-between;
        }
        .color-btn {
            flex: 1;
            padding: 8px;
            margin: 0 2px;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
        }
        .color-btn.selected { border-color: #fff; }
        #btnRed { background: #ff4444; }
        #btnGreen { background: #44ff44; color: #000; }
        #btnBlue { background: #4444ff; }
        #spawnBtn {
            width: 250px;
            padding: 10px;
            background: #00ff88;
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }
        #spawnBtn:disabled { background: #555; cursor: not-allowed; }
        #loadingScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #progressBarContainer {
            width: 300px;
            height: 20px;
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: #00ff88;
            transition: width 0.5s linear;
        }
        #gameCanvas {
            display: none;
            background: #000;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Html snakes</h1>
        <div class="menu-group">
            <label>Nome de jogador: (10 max)</label>
            <input type="text" id="playerName" maxlength="10" placeholder="SeuNome">
        </div>
        <div class="menu-group">
            <label>Cor da sua cobra:</label>
            <div class="color-options">
                <div class="color-btn selected" id="btnRed" onclick="setColor('#ff4444')">Vermelho</div>
                <div class="color-btn" id="btnGreen" onclick="setColor('#44ff44')">Verde</div>
                <div class="color-btn" id="btnBlue" onclick="setColor('#4444ff')">Azul</div>
            </div>
        </div>
        <button id="spawnBtn" onclick="requestSpawn()">Surgir</button>
    </div>

    <div id="loadingScreen">
        <h2 id="loadingText">Criando mapa...</h2>
        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const key = "146cf8ce56";
        const link = "https://powder-gratuit-tunes-bread.trycloudflare.com";
        const socket = io(link, { auth: { token: "default_key" } });

        let selectedColor = "#ff4444";
        let isConnecting = true;
        let mapInitializing = false;
        let inGame = false;

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function setColor(color) {
            selectedColor = color;
            document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("selected"));
            if(color === "#ff4444") document.getElementById("btnRed").classList.add("selected");
            if(color === "#44ff44") document.getElementById("btnGreen").classList.add("selected");
            if(color === "#4444ff") document.getElementById("btnBlue").classList.add("selected");
        }

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            isConnecting = false;
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "map_init_status") {
                mapInitializing = pkt.data.initializing;
                const progress = pkt.data.progress;
                document.getElementById("progressBar").style.width = progress + "%";
                document.getElementById("spawnBtn").disabled = mapInitializing;
                
                if (mapInitializing) {
                    document.getElementById("menu").style.display = "none";
                    document.getElementById("loadingScreen").style.display = "flex";
                } else if (!inGame) {
                    document.getElementById("loadingScreen").style.display = "none";
                    document.getElementById("menu").style.display = "flex";
                }
            }
            if (pkt.type === "game_start") {
                mapInitializing = false;
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("menu").style.display = "none";
                canvas.style.display = "block";
                inGame = true;
                initGameClient(pkt.data);
            }
            if (pkt.type === "sync_world") {
                if (inGame) updateWorldState(pkt.data);
            }
            if (pkt.type === "player_died") {
                if (pkt.data.id === myId) handleMyDeath();
            }
        });

        function requestSpawn() {
            if (mapInitializing || isConnecting) return;
            const name = document.getElementById("playerName").value || "Cobra";
            socket.emit("RemoteEvent", { type: "spawn_request", data: { name, color: selectedColor } });
        }

        let myId = null;
        let gameState = { players: {}, foods: [] };
        let camera = { x: 0, y: 0 };
        let myInput = { x: 0, y: 0, sprint: false };
        let lastSprintTime = 0;

        function initGameClient(data) {
            myId = data.id;
            gameState = data.state;
        }

        function updateWorldState(state) {
            gameState = state;
        }

        function handleMyDeath() {
            setTimeout(() => {
                inGame = false;
                canvas.style.display = "none";
                document.getElementById("menu").style.display = "flex";
            }, 2000);
        }

        window.addEventListener("keydown", (e) => {
            if (!inGame) return;
            if (e.code === "Space" || e.code === "KeyE") myInput.sprint = true;
        });
        window.addEventListener("keyup", (e) => {
            if (!inGame) return;
            if (e.code === "Space" || e.code === "KeyE") myInput.sprint = false;
        });

        window.addEventListener("mousemove", (e) => {
            if (!inGame) return;
            myInput.x = e.clientX - canvas.width / 2;
            myInput.y = e.clientY - canvas.height / 2;
        });

        window.addEventListener("touchmove", (e) => {
            if (!inGame) return;
            const touch = e.touches[0];
            myInput.x = touch.clientX - canvas.width / 2;
            myInput.y = touch.clientY - canvas.height / 2;
            if (e.touches.length > 1) myInput.sprint = true;
            else myInput.sprint = false;
        });
        window.addEventListener("touchend", (e) => {
            if (e.touches.length <= 1) myInput.sprint = false;
        });

        setInterval(() => {
            if (!inGame) return;
            socket.emit("RemoteEvent", { type: "player_input", data: myInput });
        }, 1000 / 30);

        function drawGrid(ox, oy) {
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 1;
            const gridSize = 50;
            let startX = - (ox % gridSize);
            let startY = - (oy % gridSize);
            for (let x = startX; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = startY; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function render() {
            if (inGame) {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let me = gameState.players[myId];
                if (me && me.body.length > 0) {
                    camera.x = me.body[0].x - canvas.width / 2;
                    camera.y = me.body[0].y - canvas.height / 2;
                }

                drawGrid(camera.x, camera.y);

                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 5;
                ctx.strokeRect(-camera.x, -camera.y, 5000, 5000);

                if (gameState.foods) {
                    for (let f of gameState.foods) {
                        ctx.fillStyle = f.color;
                        ctx.beginPath();
                        ctx.arc(f.x - camera.x, f.y - camera.y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let id in gameState.players) {
                    let p = gameState.players[id];
                    if (!p.alive) continue;
                    for (let seg of p.body) {
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(seg.x - camera.x, seg.y - camera.y, 10, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    if (p.body.length > 0) {
                        let head = p.body[0];
                        ctx.fillStyle = "#fff";
                        ctx.beginPath();
                        ctx.arc(head.x - camera.x + 4, head.y - camera.y - 3, 3, 0, Math.PI * 2);
                        ctx.arc(head.x - camera.x + 4, head.y - camera.y + 3, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
