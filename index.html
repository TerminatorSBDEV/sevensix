<!-- Test Your Guns - Client Script -->
<!DOCTYPE html>
<html>
<head>
    <title>Test Your Guns</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; background: #1e293b; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; font-weight: bold; font-size: 1.1rem; text-shadow: 1px 1px 2px #000; z-index: 10; }
        #controls-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); pointer-events: none; font-size: 0.85rem; color: rgba(255,255,255,0.7); background: rgba(15, 23, 42, 0.85); padding: 6px 14px; border-radius: 8px; border: 1px solid #475569; z-index: 10; text-align: center; }
        
        #top-btns { position: absolute; top: 10px; right: 170px; z-index: 10; display: flex; gap: 8px; }
        .top-btn { background: #3b82f6; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .top-btn:hover { background: #2563eb; }

        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; touch-action: none; z-index: 10; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; }
        
        #action-btns { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 10px; z-index: 10; }
        .action-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; color: #fff; }
        .action-btn.active { background: #22c55e; border-color: #4ade80; }
        
        .mob-weapon-btn { position: absolute; bottom: 105px; width: 50px; height: 50px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; cursor: pointer; z-index: 10; color: #fff; }
        #mob-w1 { right: 40px; }
        #mob-w2 { right: 98px; }
        #mob-w3 { right: 156px; }
        #mob-w4 { right: 214px; display: none; }
        .mob-weapon-btn.active { background: rgba(56, 189, 248, 0.4); border-color: #38bdf8; }

        /* Floating Chat Box */
        #chat-box { position: absolute; top: 80px; left: 10px; width: 280px; height: 220px; background: rgba(15, 23, 42, 0.85); border: 1px solid #475569; border-radius: 8px; display: flex; flex-direction: column; z-index: 10; overflow: hidden; }
        #chat-messages { flex: 1; padding: 8px; overflow-y: auto; font-size: 0.85rem; word-break: break-word; }
        #chat-messages p { margin: 2px 0; }
        #chat-container { display: none; padding: 6px; background: rgba(30, 41, 59, 0.9); }
        #chat-input { width: 93%; padding: 6px; background: rgba(15, 23, 42, 0.9); border: 1px solid #38bdf8; color: #fff; border-radius: 4px; font-size: 0.85rem; outline: none; }

        /* Shop Modal */
        #shop-modal, #radio-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #0f172a; border: 2px solid #38bdf8; border-radius: 12px; padding: 16px; z-index: 20; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #334155; padding-bottom: 6px; text-align: center; }
        .shop-item { margin-bottom: 12px; padding: 8px; background: #1e293b; border-radius: 6px; }
        .shop-item button { width: 100%; padding: 6px; margin-top: 6px; background: #38bdf8; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #0f172a; }
        .shop-item button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        /* Upload Progress Bar */
        #progress-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; background: #0f172a; border: 2px solid #38bdf8; padding: 15px; border-radius: 8px; z-index: 30; display: none; text-align: center; }
        #progress-bar { width: 100%; height: 16px; background: #1e293b; border-radius: 8px; overflow: hidden; margin-top: 8px; }
        #progress-fill { width: 0%; height: 100%; background: #22c55e; transition: width 0.1s; }

        #minimap-container { position: absolute; top: 10px; right: 10px; width: 150px; height: 150px; background: rgba(15, 23, 42, 0.8); border: 2px solid #475569; border-radius: 8px; overflow: hidden; pointer-events: none; z-index: 10; }
        #minimapCanvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="ui">
        HP: <span id="hp">100</span> | Points: <span id="pts">0</span> | Gun: <span id="wname">Rifle</span> | <span id="status">Connecting...</span>
    </div>

    <div id="top-btns">
        <button id="shop-btn-top" class="top-btn">Shop [H]</button>
    </div>

    <div id="controls-hint">E: Wall | Y: Chat | M: Mic | H: Shop | 1-4: Select Weapon/Tool | WASD: Move | Right Click: Shoot/Use</div>
    
    <div id="chat-box">
        <div id="chat-messages"></div>
        <div id="chat-container">
            <input type="text" id="chat-input" placeholder="Type message (max 100)..." maxlength="100" />
        </div>
    </div>

    <div id="joystick"><div id="stick"></div></div>
    
    <div id="action-btns">
        <div id="mic-btn" class="action-btn">🎙️</div>
        <div id="chat-btn" class="action-btn">💬</div>
        <div id="build-btn" class="action-btn">🧱</div>
    </div>

    <div id="mob-w1" class="mob-weapon-btn active">W1</div>
    <div id="mob-w2" class="mob-weapon-btn">W2</div>
    <div id="mob-w3" class="mob-weapon-btn">W3</div>
    <div id="mob-w4" class="mob-weapon-btn">W4</div>

    <!-- Shop GUI -->
    <div id="shop-modal">
        <div class="modal-title">Playtime Points: <span id="shop-pts">0</span> | Shop</div>
        <div class="shop-item">
            <div><strong>Custom Death Sound</strong></div>
            <button id="btn-buy-death">Buy [100 pts]</button>
            <input type="file" id="file-death" accept="audio/*" style="display:none;" />
        </div>
        <div class="shop-item">
            <div><strong>Radio</strong></div>
            <button id="btn-buy-radio">Buy [350 pts]</button>
        </div>
        <div class="shop-item">
            <div><strong>Physics Gun</strong></div>
            <button id="btn-buy-phys">Buy [500 pts]</button>
        </div>
        <button onclick="document.getElementById('shop-modal').style.display='none'" style="width:100%; background:#ef4444; border:none; color:white; padding:6px; border-radius:4px; margin-top:8px; cursor:pointer;">Close</button>
    </div>

    <!-- Radio Panel GUI -->
    <div id="radio-modal">
        <div class="modal-title">Radio Panel</div>
        <div style="font-size:0.8rem; color:#94a3b8; margin-bottom:8px;">Max 10MB, &lt;5 mins audio file.</div>
        <input type="file" id="file-radio" accept="audio/*" style="margin-bottom:10px; width:100%;" />
        <div style="display:flex; gap:8px;">
            <button id="btn-radio-play" style="flex:1; background:#22c55e; border:none; padding:8px; border-radius:4px; font-weight:bold; cursor:pointer; color:white;">Play</button>
            <button id="btn-radio-stop" style="flex:1; background:#ef4444; border:none; padding:8px; border-radius:4px; font-weight:bold; cursor:pointer; color:white;">Stop</button>
        </div>
        <button onclick="document.getElementById('radio-modal').style.display='none'" style="width:100%; background:#475569; border:none; color:white; padding:6px; border-radius:4px; margin-top:10px; cursor:pointer;">Close</button>
    </div>

    <!-- Upload Progress Modal -->
    <div id="progress-container">
        <div id="progress-text" style="font-size:0.9rem;">Uploading Audio File...</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="minimap-container">
        <canvas id="minimapCanvas" width="150" height="150"></canvas>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const minimapCanvas = document.getElementById("minimapCanvas");
        const mCtx = minimapCanvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            document.getElementById("joystick").style.display = "block";
            document.getElementById("mob-w1").style.display = "flex";
            document.getElementById("mob-w2").style.display = "flex";
            document.getElementById("mob-w3").style.display = "flex";
            document.getElementById("controls-hint").style.display = "none";
        }

        const link = "https://bras-spas-associated-cashiers.trycloudflare.com";
        const key = "146cf8ce56";
        const socket = io(link, { auth: { token: "default_key" } });

        let myId = Math.random().toString(36).substring(2, 7);
        let myColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        let myPos = { x: Math.random() * 1500, y: Math.random() * 1500 };
        let myHp = 100;
        let myPoints = 0;
        let myItems = { deathSound: false, radio: false, physGun: false };
        let isDead = false;
        let lastShot = 0;
        let lastBuild = 0;
        let aimAngle = 0;
        let currentWeapon = 1; // 1: Rifle, 2: SMG, 3: Sniper, 4: Physics Gun
        let isMouseDown = false;
        let isMicActive = false;

        // Physics Gun state
        let physTarget = null; // { type: 'player'|'wall', id: string, wallIndex: number }

        const weaponStats = {
            1: { name: "Rifle", rate: 200 },
            2: { name: "SMG", rate: 50 },
            3: { name: "Sniper", rate: 2500 },
            4: { name: "PhysGun", rate: 100 }
        };

        const keys = { w: false, a: false, s: false, d: false };
        let players = {};
        let renderPlayers = {};
        let bullets = {}; // Object with interpolation targets
        let renderBullets = {};
        let walls = [];
        let chatBubbles = {};

        let joyActive = false;
        let joyVector = { x: 0, y: 0 };
        let chatOpen = false;

        // Audio Context & Sound Synthesizer Engine
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSfx(type, distanceScale = 1) {
            if (distanceScale <= 0) return;
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.gain.value = Math.min(1, distanceScale);
            gain.connect(audioCtx.destination);

            if (type === 'rifle') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'smg') {
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'sniper') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.4);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'hit_wall') {
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(20, now + 0.05);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'hit_player') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'build') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(400, now + 0.12);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.12);
            }
        }

        // Distance scale utility (0 to 1) max distance = 1200
        function getDistanceScale(x, y) {
            const dx = x - myPos.x;
            const dy = y - myPos.y;
            const dist = Math.hypot(dx, dy);
            return Math.max(0, 1 - dist / 1200);
        }

        // Audio Caching & Remote Audio Players
        const audioCache = {}; // base64 / blob urls
        const playingAudios = {}; // HTMLAudioElement or AudioContext sources

        function playRemoteAudio(keyId, srcUrl, x, y, loop = false, startOffset = 0) {
            if (playingAudios[keyId]) {
                playingAudios[keyId].pause();
            }
            const audio = new Audio(srcUrl);
            audio.loop = loop;
            if (startOffset > 0) audio.currentTime = startOffset;
            const distScale = getDistanceScale(x, y);
            audio.volume = Math.min(1, Math.max(0, distScale));
            audio.play().catch(() => {});
            playingAudios[keyId] = audio;
            return audio;
        }

        function stopRemoteAudio(keyId) {
            if (playingAudios[keyId]) {
                playingAudios[keyId].pause();
                delete playingAudios[keyId];
            }
        }

        socket.on("connect", () => {
            socket.emit("join_virtual_server", { key });
        });

        socket.on("joined_successfully", () => {
            document.getElementById("status").innerText = "Connected";
            socket.emit("RemoteEvent", { type: "player_join", data: { id: myId, color: myColor, x: myPos.x, y: myPos.y, weapon: currentWeapon } });
        });

        socket.on("RemoteEvent", (pkt) => {
            if (pkt.type === "state_update") {
                const serverPlayers = pkt.data.players;
                walls = pkt.data.walls || [];
                const serverBullets = pkt.data.bullets || [];

                // Match server bullets to local lerp bullet objects
                bullets = {};
                serverBullets.forEach(b => {
                    bullets[b.id] = b;
                    if (!renderBullets[b.id]) {
                        renderBullets[b.id] = { x: b.x, y: b.y, vx: b.vx, vy: b.vy };
                    }
                });

                for (let id in serverPlayers) {
                    const sp = serverPlayers[id];
                    if (id === myId) {
                        myHp = sp.hp;
                        myPos.x = sp.x;
                        myPos.y = sp.y;
                        myPoints = sp.points || 0;
                        myItems = sp.items || myItems;
                        
                        document.getElementById("hp").innerText = myHp;
                        document.getElementById("pts").innerText = myPoints;
                        document.getElementById("shop-pts").innerText = myPoints;
                        updateShopUI();

                        if (myHp <= 0 && !isDead) {
                            isDead = true;
                            stopRemoteAudio(`radio_${myId}`);
                            setTimeout(() => {
                                isDead = false;
                                socket.emit("RemoteEvent", { type: "respawn", data: { id: myId } });
                            }, 3000);
                        }
                    }

                    if (!renderPlayers[id]) {
                        renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp, weapon: sp.weapon || 1 };
                    }
                    players[id] = sp;
                }
            } else if (pkt.type === "chat_sync") {
                const container = document.getElementById("chat-messages");
                container.innerHTML = "";
                pkt.data.history.forEach(m => addChatMessage(m.id, m.text));
            } else if (pkt.type === "chat_message") {
                addChatMessage(pkt.data.id, pkt.data.text);
                chatBubbles[pkt.data.id] = {
                    text: pkt.data.text,
                    expireTime: Date.now() + 14000 // +10s duration = 14s
                };
            } else if (pkt.type === "sfx") {
                const scale = getDistanceScale(pkt.data.x, pkt.data.y);
                playSfx(pkt.data.sfxType, scale);
            } else if (pkt.type === "voice_chunk") {
                if (pkt.data.id !== myId) {
                    const scale = getDistanceScale(pkt.data.x, pkt.data.y);
                    if (scale > 0) {
                        playVoiceChunk(pkt.data.chunk, scale);
                    }
                }
            } else if (pkt.type === "audio_cache_chunk") {
                const { keyId, chunk, chunkIndex, totalChunks } = pkt.data;
                if (!audioCache[keyId]) audioCache[keyId] = [];
                audioCache[keyId][chunkIndex] = chunk;
            } else if (pkt.type === "play_death_sound") {
                const { id, x, y } = pkt.data;
                const keyId = `death_${id}`;
                if (audioCache[keyId]) {
                    const fullData = audioCache[keyId].join('');
                    playRemoteAudio(keyId, fullData, x, y, false);
                }
            } else if (pkt.type === "radio_state") {
                const { id, playing, x, y, startTime } = pkt.data;
                const keyId = `radio_${id}`;
                if (playing && audioCache[keyId]) {
                    const fullData = audioCache[keyId].join('');
                    const elapsed = (Date.now() - startTime) / 1000;
                    playRemoteAudio(keyId, fullData, x, y, true, elapsed);
                } else {
                    stopRemoteAudio(keyId);
                }
            }
        });

        function addChatMessage(id, text) {
            const container = document.getElementById("chat-messages");
            const p = document.createElement("p");
            p.innerHTML = `<strong style="color:#38bdf8">${id}:</strong> ${escapeHtml(text)}`;
            container.appendChild(p);
            if (container.children.length > 50) {
                container.removeChild(container.firstChild);
            }
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Voice Chat Setup (Web Audio API Stream Processor)
        let mediaRecorder = null;
        async function setupVoice() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = async (e) => {
                    if (e.data.size > 0 && isMicActive) {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64 = reader.result;
                            socket.emit("RemoteEvent", { type: "voice_chunk", data: { id: myId, chunk: base64, x: myPos.x, y: myPos.y } });
                        };
                        reader.readAsDataURL(e.data);
                    }
                };
            } catch(err) {
                console.log("Mic access denied/unavailable");
            }
        }
        setupVoice();

        function toggleMic() {
            isMicActive = !isMicActive;
            const micBtn = document.getElementById("mic-btn");
            if (isMicActive) {
                micBtn.classList.add("active");
                if (mediaRecorder && mediaRecorder.state === "inactive") mediaRecorder.start(250);
            } else {
                micBtn.classList.remove("active");
                if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            }
        }

        function playVoiceChunk(base64Chunk, volume) {
            const audio = new Audio(base64Chunk);
            audio.volume = Math.min(1, volume);
            audio.play().catch(() => {});
        }

        // Shop UI Updates
        function updateShopUI() {
            const btnDeath = document.getElementById("btn-buy-death");
            if (myItems.deathSound) {
                btnDeath.innerText = "OWNED | Change Death Sound";
                btnDeath.disabled = false;
                btnDeath.onclick = () => document.getElementById("file-death").click();
            } else {
                btnDeath.disabled = myPoints < 100;
            }

            const btnRadio = document.getElementById("btn-buy-radio");
            if (myItems.radio) {
                btnRadio.innerText = "OWNED | Equip";
                btnRadio.disabled = false;
                btnRadio.onclick = () => {
                    document.getElementById("shop-modal").style.display = "none";
                    document.getElementById("radio-modal").style.display = "block";
                };
            } else {
                btnRadio.disabled = myPoints < 350;
            }

            const btnPhys = document.getElementById("btn-buy-phys");
            if (myItems.physGun) {
                btnPhys.innerText = "OWNED | Press 4 on PC/Mobile to Equip";
                btnPhys.disabled = false;
                document.getElementById("mob-w4").style.display = "flex";
            } else {
                btnPhys.disabled = myPoints < 500;
            }
        }

        document.getElementById("shop-btn-top").onclick = () => {
            const modal = document.getElementById("shop-modal");
            modal.style.display = modal.style.display === "block" ? "none" : "block";
        };

        document.getElementById("btn-buy-death").onclick = () => {
            if (!myItems.deathSound && myPoints >= 100) {
                socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item: "deathSound" } });
            }
        };
        document.getElementById("btn-buy-radio").onclick = () => {
            if (!myItems.radio && myPoints >= 350) {
                socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item: "radio" } });
            }
        };
        document.getElementById("btn-buy-phys").onclick = () => {
            if (!myItems.physGun && myPoints >= 500) {
                socket.emit("RemoteEvent", { type: "buy_item", data: { id: myId, item: "physGun" } });
            }
        };

        // File Chunk Upload Handler with Progress Bar & DDoS Safety Throttle
        async function handleAudioUpload(file, category, maxBytes, maxDurationSec) {
            if (file.size > maxBytes) {
                alert(`File too large! Max allowed: ${Math.round(maxBytes/1024/1024)}MB`);
                return;
            }

            const audioTemp = new Audio(URL.createObjectURL(file));
            audioTemp.onloadedmetadata = async () => {
                if (audioTemp.duration > maxDurationSec) {
                    alert(`Audio duration too long! Max allowed: ${maxDurationSec}s`);
                    return;
                }

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64Data = e.target.result;
                    const chunkSize = 150 * 1024; // 150KB chunks
                    const totalChunks = Math.ceil(base64Data.length / chunkSize);

                    // Show progress GUI
                    const progressModal = document.getElementById("progress-container");
                    const progressFill = document.getElementById("progress-fill");
                    progressModal.style.display = "block";

                    // Notify server validation
                    socket.emit("RemoteEvent", { 
                        type: "upload_start", 
                        data: { id: myId, category, size: file.size, duration: audioTemp.duration, totalChunks } 
                    });

                    for (let i = 0; i < totalChunks; i++) {
                        const chunk = base64Data.substring(i * chunkSize, (i + 1) * chunkSize);
                        socket.emit("RemoteEvent", {
                            type: "upload_chunk",
                            data: { id: myId, category, chunk, chunkIndex: i, totalChunks }
                        });

                        const pct = Math.round(((i + 1) / totalChunks) * 100);
                        progressFill.style.width = `${pct}%`;

                        // Safety delay to prevent >250 req/sec trigger
                        await new Promise(res => setTimeout(res, 25));
                    }

                    setTimeout(() => { progressModal.style.display = "none"; }, 300);
                };
                reader.readAsDataURL(file);
            };
        }

        document.getElementById("file-death").onchange = (e) => {
            if (e.target.files[0]) handleAudioUpload(e.target.files[0], "death", 4 * 1024 * 1024, 10);
        };

        document.getElementById("file-radio").onchange = (e) => {
            if (e.target.files[0]) handleAudioUpload(e.target.files[0], "radio", 10 * 1024 * 1024, 300);
        };

        document.getElementById("btn-radio-play").onclick = () => {
            socket.emit("RemoteEvent", { type: "toggle_radio", data: { id: myId, play: true, x: myPos.x, y: myPos.y } });
        };
        document.getElementById("btn-radio-stop").onclick = () => {
            socket.emit("RemoteEvent", { type: "toggle_radio", data: { id: myId, play: false } });
        };

        // Inputs & Weapon Switching
        const chatInput = document.getElementById("chat-input");
        const chatContainer = document.getElementById("chat-container");

        function toggleChat() {
            chatOpen = !chatOpen;
            chatContainer.style.display = chatOpen ? "block" : "none";
            if (chatOpen) chatInput.focus();
            else chatInput.blur();
        }

        function setWeapon(wId) {
            if (wId === 4 && !myItems.physGun) return;
            currentWeapon = wId;
            document.getElementById("wname").innerText = weaponStats[wId].name;
            document.querySelectorAll(".mob-weapon-btn").forEach(btn => btn.classList.remove("active"));
            if (document.getElementById(`mob-w${wId}`)) {
                document.getElementById(`mob-w${wId}`).classList.add("active");
            }
            socket.emit("RemoteEvent", { type: "switch_weapon", data: { id: myId, weapon: currentWeapon } });
        }

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === 'y' && !chatOpen) {
                e.preventDefault();
                toggleChat();
            } else if (e.key === 'Enter' && chatOpen) {
                sendChat();
            } else if (e.key.toLowerCase() === 'e' && !chatOpen && !isDead) {
                buildWall();
            } else if (e.key.toLowerCase() === 'm' && !chatOpen) {
                toggleMic();
            } else if (e.key.toLowerCase() === 'h' && !chatOpen) {
                const modal = document.getElementById("shop-modal");
                modal.style.display = modal.style.display === "block" ? "none" : "block";
            } else if (e.key.toLowerCase() === 'r' && !chatOpen && myItems.radio) {
                const modal = document.getElementById("radio-modal");
                modal.style.display = modal.style.display === "block" ? "none" : "block";
            } else if (!chatOpen) {
                if (e.key === '1') setWeapon(1);
                if (e.key === '2') setWeapon(2);
                if (e.key === '3') setWeapon(3);
                if (e.key === '4') setWeapon(4);
            }

            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = true;
                if (e.key.toLowerCase() === 'a') keys.a = true;
                if (e.key.toLowerCase() === 's') keys.s = true;
                if (e.key.toLowerCase() === 'd') keys.d = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            if (!chatOpen) {
                if (e.key.toLowerCase() === 'w') keys.w = false;
                if (e.key.toLowerCase() === 'a') keys.a = false;
                if (e.key.toLowerCase() === 's') keys.s = false;
                if (e.key.toLowerCase() === 'd') keys.d = false;
            }
        });

        document.getElementById("chat-btn").onclick = toggleChat;
        document.getElementById("mic-btn").onclick = toggleMic;
        document.getElementById("build-btn").onclick = () => { if (!isDead && !chatOpen) buildWall(); };

        document.getElementById("mob-w1").onclick = () => setWeapon(1);
        document.getElementById("mob-w2").onclick = () => setWeapon(2);
        document.getElementById("mob-w3").onclick = () => setWeapon(3);
        document.getElementById("mob-w4").onclick = () => setWeapon(4);

        function sendChat() {
            const text = chatInput.value.trim();
            if (text.length > 0) {
                socket.emit("RemoteEvent", { type: "send_chat", data: { id: myId, text } });
            }
            chatInput.value = "";
            toggleChat();
        }

        let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };
        window.addEventListener("mousemove", (e) => {
            if (chatOpen) return;
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener("mousedown", (e) => {
            if (chatOpen || isDead) return;
            if (e.button === 2) {
                isMouseDown = true;
                if (currentWeapon === 4) startPhysGunDrag();
                else tryShoot();
            }
        });
        window.addEventListener("mouseup", (e) => {
            if (e.button === 2) {
                isMouseDown = false;
                if (currentWeapon === 4) stopPhysGunDrag();
            }
        });
        window.addEventListener("contextmenu", (e) => e.preventDefault());

        // Joystick
        const joystickEl = document.getElementById("joystick");
        const stickEl = document.getElementById("stick");
        let joyCenter = { x: 0, y: 0 };

        joystickEl.addEventListener("touchstart", (e) => {
            if (chatOpen) return;
            joyActive = true;
            const rect = joystickEl.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        });

        window.addEventListener("touchmove", (e) => {
            if (!joyActive || chatOpen) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joyCenter.x;
            const dy = touch.clientY - joyCenter.y;
            const dist = Math.min(50, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);

            joyVector.x = Math.cos(angle) * (dist / 50);
            joyVector.y = Math.sin(angle) * (dist / 50);
            stickEl.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        });

        window.addEventListener("touchend", () => {
            if (joyActive) {
                joyActive = false;
                joyVector = { x: 0, y: 0 };
                stickEl.style.transform = `translate(0px, 0px)`;
            }
        });

        window.addEventListener("touchstart", (e) => {
            if (isDead || chatOpen) return;
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth - 220 && touch.clientY > window.innerHeight - 150) return;
            if (touch.clientX > 220 || touch.clientY < canvas.height - 180) {
                mousePos.x = touch.clientX;
                mousePos.y = touch.clientY;
                isMouseDown = true;
                if (currentWeapon === 4) startPhysGunDrag();
                else tryShoot();
            }
        });
        window.addEventListener("touchend", () => {
            isMouseDown = false;
            if (currentWeapon === 4) stopPhysGunDrag();
        });

        function tryShoot() {
            const now = Date.now();
            const stat = weaponStats[currentWeapon];
            if (now - lastShot < stat.rate) return;
            lastShot = now;

            socket.emit("RemoteEvent", { type: "fire_bullet", data: { id: myId, angle: aimAngle, weapon: currentWeapon } });
        }

        function buildWall() {
            const now = Date.now();
            if (now - lastBuild < 1000) return;
            lastBuild = now;

            socket.emit("RemoteEvent", { type: "build_wall", data: { id: myId, angle: aimAngle } });
        }

        // Physics Gun Logic
        function startPhysGunDrag() {
            const worldMouseX = myPos.x + (mousePos.x - canvas.width / 2);
            const worldMouseY = myPos.y + (mousePos.y - canvas.height / 2);

            // Check players
            for (let id in renderPlayers) {
                if (id === myId || renderPlayers[id].hp <= 0) continue;
                const p = renderPlayers[id];
                if (Math.hypot(p.x - worldMouseX, p.y - worldMouseY) < 30) {
                    physTarget = { type: 'player', id };
                    return;
                }
            }
            // Check walls
            for (let i = 0; i < walls.length; i++) {
                const w = walls[i];
                if (Math.hypot(w.x - worldMouseX, w.y - worldMouseY) < 40) {
                    physTarget = { type: 'wall', wallIndex: i };
                    return;
                }
            }
        }

        function stopPhysGunDrag() {
            physTarget = null;
        }

        let lastInputEmit = 0;
        function update() {
            if (!isDead && !chatOpen) {
                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2;
                aimAngle = Math.atan2(mousePos.y - screenCenterY, mousePos.x - screenCenterX);

                if (isMouseDown && currentWeapon !== 4) {
                    tryShoot();
                }

                // Dragging item with PhysGun
                if (currentWeapon === 4 && isMouseDown && physTarget) {
                    const targetWorldX = myPos.x + (mousePos.x - screenCenterX);
                    const targetWorldY = myPos.y + (mousePos.y - screenCenterY);
                    socket.emit("RemoteEvent", { 
                        type: "phys_drag", 
                        data: { id: myId, physTarget, targetX: targetWorldX, targetY: targetWorldY } 
                    });
                }

                let inputData = isMobile ? { vector: joyVector } : { w: keys.w, a: keys.a, s: keys.s, d: keys.d };

                const now = Date.now();
                if (now - lastInputEmit >= 1000 / 50) { // strictly throttled to 50 requests/sec
                    lastInputEmit = now;
                    socket.emit("RemoteEvent", { type: "player_input", data: { id: myId, input: inputData, angle: aimAngle, color: myColor, weapon: currentWeapon } });
                }
            }

            // Linear lerp bullet movement smoothly
            for (let bId in renderBullets) {
                const rb = renderBullets[bId];
                if (bullets[bId]) {
                    // Linear lerp towards updated server target coordinates
                    rb.x += (bullets[bId].x - rb.x) * 0.35;
                    rb.y += (bullets[bId].y - rb.y) * 0.35;
                } else {
                    delete renderBullets[bId];
                }
            }
        }

        function drawBubble(x, y, text) {
            ctx.save();
            ctx.font = "13px sans-serif";
            const metrics = ctx.measureText(text);
            const w = metrics.width + 16;
            const h = 26;

            ctx.translate(x, y - 68);
            ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, 6);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        function drawMinimap() {
            mCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            const scale = 150 / 3000;

            mCtx.strokeStyle = "#475569";
            mCtx.lineWidth = 1;
            mCtx.strokeRect(0, 0, 150, 150);

            mCtx.fillStyle = "#64748b";
            walls.forEach(w => {
                mCtx.fillRect(w.x * scale - 1, w.y * scale - 1, 2, 2);
            });

            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                let mx = p.x * scale;
                let my = p.y * scale;

                mCtx.fillStyle = (id === myId) ? "#38bdf8" : (p.color || "#ef4444");
                mCtx.beginPath();
                mCtx.arc(mx, my, (id === myId) ? 3.5 : 2.5, 0, Math.PI * 2);
                mCtx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let id in players) {
                let sp = players[id];
                if (!renderPlayers[id]) {
                    renderPlayers[id] = { x: sp.x, y: sp.y, angle: sp.angle, color: sp.color, hp: sp.hp, weapon: sp.weapon || 1 };
                } else {
                    renderPlayers[id].x += (sp.x - renderPlayers[id].x) * 0.3;
                    renderPlayers[id].y += (sp.y - renderPlayers[id].y) * 0.3;
                    renderPlayers[id].angle = sp.angle;
                    renderPlayers[id].color = sp.color;
                    renderPlayers[id].hp = sp.hp;
                    renderPlayers[id].weapon = sp.weapon || 1;
                }
            }

            ctx.save();
            if (!isDead && renderPlayers[myId]) {
                const isSniperActive = (currentWeapon === 3);
                const zoomFactor = isSniperActive ? 0.5 : 1.0;
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(zoomFactor, zoomFactor);
                ctx.translate(-renderPlayers[myId].x, -renderPlayers[myId].y);
            }

            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 3000, 3000);

            // Walls
            walls.forEach((w, index) => {
                ctx.save();
                ctx.translate(w.x, w.y);
                ctx.rotate(w.angle + Math.PI / 2);

                if (physTarget && physTarget.type === 'wall' && physTarget.wallIndex === index) {
                    ctx.strokeStyle = "#00ffff";
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = "#94a3b8";
                    ctx.lineWidth = 2;
                }

                ctx.fillStyle = "#334155";
                ctx.fillRect(-60, -10, 120, 20);
                ctx.strokeRect(-60, -10, 120, 20);
                ctx.restore();
            });

            // Players
            for (let id in renderPlayers) {
                let p = renderPlayers[id];
                if (p.hp <= 0) continue;

                ctx.save();
                ctx.translate(p.x, p.y);

                // Cyan outline if being dragged by physgun
                if (physTarget && physTarget.type === 'player' && physTarget.id === id) {
                    ctx.strokeStyle = "#00ffff";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(-22, -22, 44, 44);
                }

                ctx.fillStyle = p.color || '#fff';
                ctx.fillRect(-20, -20, 40, 40);

                // Player ID text above head
                ctx.font = "bold 12px sans-serif";
                ctx.fillStyle = "#38bdf8";
                ctx.textAlign = "center";
                ctx.fillText(id, 0, -42);

                // HP Bar
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(-20, -32, 40, 5);
                ctx.fillStyle = "#22c55e";
                ctx.fillRect(-20, -32, 40 * (p.hp / 100), 5);

                // Yellow Radio on Back if equipped
                if (players[id] && players[id].items && players[id].items.radio) {
                    ctx.fillStyle = "#facc15";
                    ctx.fillRect(-8, 18, 16, 8);
                }

                ctx.rotate(p.angle);
                
                // Weapon models
                const wType = p.weapon;
                if (wType === 1) { // Rifle
                    ctx.fillStyle = "#64748b";
                    ctx.fillRect(5, -5, 34, 10);
                } else if (wType === 2) { // SMG
                    ctx.fillStyle = "#475569";
                    ctx.fillRect(4, -4, 22, 8);
                } else if (wType === 3) { // Sniper
                    ctx.fillStyle = "#334155";
                    ctx.fillRect(2, -4, 45, 8);
                    ctx.fillStyle = "#ef4444";
                    ctx.fillRect(15, -9, 10, 5);
                } else if (wType === 4) { // Gmod Physics Gun
                    ctx.fillStyle = "#0284c7";
                    ctx.fillRect(2, -4, 30, 8);
                    ctx.fillStyle = "#00ffff";
                    ctx.fillRect(28, -7, 8, 14); // Cyan prongs
                }

                ctx.restore();

                // Sniper Laser
                if (id === myId && currentWeapon === 3 && !isDead) {
                    ctx.save();
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.7)";
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(p.angle) * 1200, p.y + Math.sin(p.angle) * 1200);
                    ctx.stroke();
                    ctx.restore();
                }

                // Chat bubbles (+10s duration)
                if (chatBubbles[id] && chatBubbles[id].expireTime > Date.now()) {
                    drawBubble(p.x, p.y, chatBubbles[id].text);
                }
            }

            // Lerped Bullets
            ctx.fillStyle = "#facc15";
            for (let bId in renderBullets) {
                const b = renderBullets[bId];
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
            drawMinimap();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
